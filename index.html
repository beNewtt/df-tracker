<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>DF Tracker - Search Preview</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500;600;700&family=Sarabun:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <style>
    :root{--bg:#E8EAF0;--surface:#D5DAE6;--surface2:#C3CADB;--text:#1F365C;--sub:#6E7F9E;--accent:#2F5DAA;--accent-hover:#264C8C;--border:#CBD1DD;--danger:#B75A68}
    *{box-sizing:border-box;margin:0;padding:0}
    body{min-height:100vh;background:var(--bg);color:var(--text);font-family:'Sarabun',sans-serif}
    button,input,select{font:inherit}
    .app{max-width:960px;margin:0 auto;padding:20px 16px 60px}
    .topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;gap:12px;flex-wrap:wrap}
    .brand{display:flex;align-items:center;gap:10px}.mark{width:40px;height:40px;border-radius:10px;background:var(--accent);color:var(--bg);display:grid;place-items:center;font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:800}
    .brand h1{font-family:'IBM Plex Mono',monospace;font-size:18px;letter-spacing:.5px}.brand p{font-size:11px;color:var(--sub);margin-top:1px}
    .tabs{display:flex;gap:4px;background:var(--surface);border-radius:999px;padding:4px}
    .tabs button{border:0;background:transparent;padding:8px 16px;border-radius:999px;font-size:13px;font-weight:700;color:var(--sub);white-space:nowrap}
    .header-actions{display:flex;align-items:center;gap:6px}.icon-btn{width:30px;height:30px;border:0;background:transparent;color:var(--sub);cursor:pointer}.icon-btn.active,.icon-btn:hover{color:var(--accent)}
    .search-head{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;margin:34px 0 18px}
    .eyebrow{font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:700;color:var(--sub);margin-bottom:6px}.search-head h2{font-family:'IBM Plex Mono',monospace;font-size:27px;font-weight:500}
    .close-search{border:0;background:transparent;color:var(--sub);font-size:17px;cursor:pointer}
    .search-box{display:flex;align-items:center;gap:12px;border-bottom:2px solid var(--surface2);padding:10px 2px 12px;transition:.15s}
    .search-box:focus-within{border-color:var(--accent)}.search-box i{color:var(--accent);font-size:18px}.search-box input{width:100%;border:0;outline:0;background:transparent;color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:21px}.search-box input::placeholder{color:var(--surface2)}
    .filters{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin:15px 0 31px}.filter{border:0;border-radius:7px;background:var(--surface);color:var(--text);padding:8px 10px;font-size:11px;font-weight:700;outline:0}.result-count{margin-left:auto;font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--sub)}
    .month-group{margin-top:26px}.month-title{display:flex;align-items:center;gap:8px;font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:700;color:var(--sub);margin-bottom:9px}.month-title span{background:var(--sub);color:var(--bg);padding:3px 7px;border-radius:5px;font-size:9px}
    .results{display:flex;flex-direction:column;gap:3px}.result{display:grid;grid-template-columns:105px minmax(0,1fr) 105px;align-items:center;gap:16px;padding:13px 14px;border-bottom:1px solid var(--border);cursor:pointer}.result:nth-child(odd){background:var(--surface)}.result:hover{background:var(--surface2)}
    .date{font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:700}.shift{display:block;font-family:'Sarabun',sans-serif;font-size:10px;color:var(--sub);margin-top:4px}.clinic{display:flex;align-items:center;gap:7px;font-weight:800;font-size:13px}.dot{width:9px;height:9px;border-radius:3px;flex:none}.details{font-size:11px;color:var(--sub);margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.money{text-align:right}.money strong{display:block;font-family:'IBM Plex Mono',monospace;font-size:14px;color:var(--accent)}.money span{font-size:10px;color:var(--sub)}
    .empty{display:none;text-align:center;color:var(--sub);padding:60px 10px;font-family:'IBM Plex Mono',monospace;font-size:12px}.empty i{display:block;font-size:27px;margin-bottom:12px}
    .hint{margin-top:34px;border-top:1px solid var(--border);padding-top:13px;font-size:10px;color:var(--sub)}
    @media(max-width:680px){
      .tabs{order:3;width:100%;overflow-x:auto}.tabs button{padding:7px 11px;font-size:12px}.search-head{margin-top:28px}.search-head h2{font-size:22px}.search-box input{font-size:17px}.result-count{width:100%;margin:3px 0 0}.result{grid-template-columns:82px minmax(0,1fr);gap:10px;padding:12px 10px}.money{grid-column:2;text-align:left;display:flex;align-items:center;gap:8px}.money strong{font-size:12px}.details{white-space:normal}.brand p{font-size:10px}
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div class="brand"><div class="mark">DF</div><div><h1>DF TRACKER</h1><p>บันทึกรายได้คลินิกรายวัน</p></div></div>
      <nav class="tabs"><button>ปฏิทิน</button><button>คลินิก</button><button>สรุปเดือน</button><button>รายปี/ภาษี</button></nav>
      <div class="header-actions"><button class="icon-btn active" aria-label="Search"><i class="fa-solid fa-magnifying-glass"></i></button><button class="icon-btn" aria-label="Settings"><i class="fa-solid fa-gear"></i></button></div>
    </header>

    <section class="search-head"><div><div class="eyebrow">SEARCH HISTORY</div><h2>Find past entries</h2></div><button class="close-search" aria-label="Close"><i class="fa-solid fa-xmark"></i></button></section>
    <label class="search-box"><i class="fa-solid fa-magnifying-glass"></i><input id="query" type="search" placeholder="Search clinic, case or note..." autocomplete="off"></label>
    <div class="filters">
      <select class="filter" id="clinicFilter" aria-label="Clinic"><option value="all">All clinics</option><option>Hugfun</option><option>CK</option><option>CDC</option><option>Bantoom</option></select>
      <select class="filter" id="yearFilter" aria-label="Year"><option value="all">All years</option><option value="2026" selected>2569</option><option value="2025">2568</option></select>
      <select class="filter" id="shiftFilter" aria-label="Shift"><option value="all">All shifts</option><option value="evening">ช่วงเย็น</option><option value="fullday">ทั้งวัน</option></select>
      <div class="result-count" id="resultCount"></div>
    </div>
    <div id="groups"></div>
    <div class="empty" id="empty"><i class="fa-solid fa-magnifying-glass"></i>No matching entries</div>
    <div class="hint">Search includes clinic name, case description and notes. Select a result to open the original entry.</div>
  </main>
  <script>
    const entries=[
      {date:'2026-07-20',clinic:'Hugfun',color:'#7A6FB0',shift:'evening',cases:'Implant consultation · Crown',note:'Follow-up next month',df:2900,deduct:100,net:2800},
      {date:'2026-07-17',clinic:'Hugfun',color:'#7A6FB0',shift:'evening',cases:'Filling · Scaling',note:'',df:2450,deduct:0,net:2450},
      {date:'2026-07-15',clinic:'CK',color:'#CC2222',shift:'fullday',cases:'Upper denture adjustment',note:'Lab case',df:3550,deduct:205,net:3345},
      {date:'2026-07-12',clinic:'CDC',color:'#C9A227',shift:'fullday',cases:'Extraction · Suture',note:'ปกส. 1 case',df:1800,deduct:100,net:1700},
      {date:'2026-06-26',clinic:'CK',color:'#CC2222',shift:'evening',cases:'Root canal treatment',note:'',df:1800,deduct:0,net:1800},
      {date:'2026-06-18',clinic:'CK',color:'#CC2222',shift:'evening',cases:'Implant follow-up',note:'X-ray included',df:1700,deduct:0,net:1700},
      {date:'2026-06-12',clinic:'Bantoom',color:'#2E8FAE',shift:'fullday',cases:'Crown preparation',note:'Lab fee deducted',df:3550,deduct:250,net:3300},
      {date:'2026-05-29',clinic:'CDC',color:'#C9A227',shift:'evening',cases:'Scaling · Filling',note:'ปกส. 2 cases',df:2200,deduct:200,net:2000}
    ];
    const months=['January','February','March','April','May','June','July','August','September','October','November','December'];
    const money=n=>'฿'+n.toLocaleString('en-US');
    const query=document.getElementById('query'),clinic=document.getElementById('clinicFilter'),year=document.getElementById('yearFilter'),shift=document.getElementById('shiftFilter');
    function render(){
      const q=query.value.trim().toLowerCase();
      const filtered=entries.filter(e=>(clinic.value==='all'||e.clinic===clinic.value)&&(year.value==='all'||e.date.startsWith(year.value))&&(shift.value==='all'||e.shift===shift.value)&&(!q||`${e.clinic} ${e.cases} ${e.note}`.toLowerCase().includes(q)));
      document.getElementById('resultCount').textContent=`${filtered.length} results · ${money(filtered.reduce((s,e)=>s+e.net,0))} net`;
      const grouped={};filtered.forEach(e=>{const key=e.date.slice(0,7);(grouped[key]??=[]).push(e)});
      document.getElementById('groups').innerHTML=Object.entries(grouped).map(([key,list])=>{const[y,m]=key.split('-').map(Number);return `<section class="month-group"><div class="month-title"><span>${months[m-1].slice(0,3).toUpperCase()}</span>${months[m-1]} ${y+543}</div><div class="results">${list.map(e=>`<article class="result"><div class="date">${e.date.slice(8,10)}/${e.date.slice(5,7)}/${Number(e.date.slice(0,4))+543}<span class="shift"><i class="fa-solid fa-${e.shift==='evening'?'moon':'sun'}"></i> ${e.shift==='evening'?'ช่วงเย็น':'ทั้งวัน'}</span></div><div><div class="clinic"><i class="dot" style="background:${e.color}"></i>${e.clinic}</div><div class="details">${e.cases}${e.note?' · '+e.note:''}</div></div><div class="money"><strong>${money(e.net)}</strong><span>${e.deduct?`หัก ${money(e.deduct)}`:'No deductions'}</span></div></article>`).join('')}</div></section>`}).join('');
      document.getElementById('empty').style.display=filtered.length?'none':'block';
    }
    [query,clinic,year,shift].forEach(el=>el.addEventListener(el===query?'input':'change',render));render();
  </script>
</body>
</html>
