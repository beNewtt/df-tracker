/* ---------- Firestore-backed storage shim ----------
   Same get/set/delete/list signature as before, but now reads/writes
   Firestore under users/{uid}/data/{key} so data syncs across devices.
   Requires signing in first (see AuthGate below). */
window.storage = {
  async get(key, shared) {
    if (!currentUid) throw new Error('not signed in');
    const ref = shared
      ? db.collection('shared').doc(key)
      : db.collection('users').doc(currentUid).collection('data').doc(key);
    const snap = await ref.get();
    if (!snap.exists) throw new Error('key not found');
    return { key, value: snap.data().value, shared: !!shared };
  },
  async set(key, value, shared) {
    if (!currentUid) throw new Error('not signed in');
    const ref = shared
      ? db.collection('shared').doc(key)
      : db.collection('users').doc(currentUid).collection('data').doc(key);
    await ref.set({ value, updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
    return { key, value, shared: !!shared };
  },
  async delete(key, shared) {
    if (!currentUid) throw new Error('not signed in');
    const ref = shared
      ? db.collection('shared').doc(key)
      : db.collection('users').doc(currentUid).collection('data').doc(key);
    await ref.delete();
    return { key, deleted: true, shared: !!shared };
  },
  async list(prefix, shared) {
    if (!currentUid) throw new Error('not signed in');
    const col = shared ? db.collection('shared') : db.collection('users').doc(currentUid).collection('data');
    const snap = await col.get();
    const keys = snap.docs.map(d => d.id).filter(k => !prefix || k.startsWith(prefix));
    return { keys, prefix: prefix || '', shared: !!shared };
  },
};

function CuteIcon({ name, size = 12, tone = 'yellow', box = 23 }) {

  </span>;
}

function CleanSelect({ value, onChange, options, style = {}, className = '', ariaLabel = 'Select option', iconOnly = false, iconName = 'plumpFilter' }) {
  const [open, setOpen] = useState(false);
  const ref = useRef(null);
  const selected = options.find(o => String(o.value) === String(value)) || options[0];
  useEffect(() => {
    const close = e => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener('pointerdown', close);
    return () => document.removeEventListener('pointerdown', close);
  }, []);
  return (
    <div ref={ref} className={`clean-select ${className}`} style={{ position: 'relative', display: 'inline-block' }}>
      <button type="button" aria-label={`${ariaLabel}: ${selected?.label ?? selected?.value}`} title={iconOnly ? (selected?.label ?? selected?.value) : undefined} aria-expanded={open} onClick={() => setOpen(!open)}
        style={{ ...style, display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 12, border: 'none', cursor: 'pointer' }}>
        {iconOnly ? <Icon name={iconName} size={32} /> : <><span>{selected?.label ?? selected?.value}</span><span className="clean-select-arrow">⌄</span></>}
      </button>
      {open && (
        <div className="clean-select-menu">
          {options.map(o => <button type="button" key={String(o.value)} className={String(o.value) === String(value) ? 'selected' : ''} onClick={() => { onChange(o.value); setOpen(false); }}><span>{o.label ?? o.value}</span></button>)}
        </div>
      )}
    </div>
  );
}

function pad(n) { return n < 10 ? '0' + n : '' + n; }

function timeToMin(t) { if (!t) return 0; const [h, m] = t.split(':').map(Number); return h * 60 + m; }

function mergeCasesByHn(input) {
  const source = Object.values(input || {});
  const firstVisitKey = c => {
    const first = [...(c.visits || [])].sort((a, b) => ((a.date || '') + (a.time || '')).localeCompare((b.date || '') + (b.time || '')))[0];
    return first ? (first.date || '') + (first.time || '') : '9999-99-99';
  };
  source.sort((a, b) => firstVisitKey(a).localeCompare(firstVisitKey(b)));
  const merged = {};
  const hnOwner = {};
  source.forEach(c => {
    const hnKey = String(c.hn || '').replace(/\D/g, '');
    if (!hnKey) {
      merged[c.id] = { ...c, visits: [...(c.visits || [])] };
      return;
    }
    const ownerId = hnOwner[hnKey];
    if (!ownerId) {
      hnOwner[hnKey] = c.id;
      merged[c.id] = { ...c, hn: hnKey, visits: [...(c.visits || [])] };
      return;
    }
    const owner = merged[ownerId];
    const extraVisits = (c.visits || []).map(v => ({ ...v, step: v.step || (c.name !== owner.name ? c.name : '') }));
    owner.visits = [...(owner.visits || []), ...extraVisits].sort((a, b) => ((a.date || '') + (a.time || '')).localeCompare((b.date || '') + (b.time || '')));
    if (!owner.phone && c.phone) owner.phone = c.phone;
  });
  return merged;
}

function parseHnCategory(text) {
  let rest = (text || '').trim();
  let hn = '';
  const hnMatch = rest.match(/^(\d{4,7})\s+/);
  if (hnMatch) { hn = hnMatch[1]; rest = rest.slice(hnMatch[0].length).trim(); }
  let category = 'อื่นๆ';
  for (const [kw, cat] of CATEGORY_KEYWORDS) {
    const re = new RegExp('(^|[^a-zA-Zก-๙])' + kw.replace('/', '\\/') + '([^a-zA-Zก-๙]|$)', 'i');
    if (re.test(rest)) { category = cat; break; }
  }
  return { hn, name: rest || text.trim(), category };
}

function parseLegacyToCases(apps) {
  const out = [];
  if (!apps) return out;
  for (const line of apps) {
    const m = line.match(TIME_RE);
    if (!m) continue;
    const time = m[1];
    const rest = m[2].trim();
    if (!rest || SKIP_WORDS.has(rest)) continue;
    const { hn, name, category } = parseHnCategory(rest);
    out.push({ time, hn, name, category });
  }
  return out;
}

function normalizeClockValue(raw, fallback = '13:00') {
  const text = String(raw || '').trim().toUpperCase();
  const meridiem = text.match(/\b(AM|PM)\b/)?.[1];
  const parts = text.replace(/[^0-9:]/g, '').split(':');
  let h, m;
  if (parts.length >= 2) { h = Number(parts[0]); m = Number(parts[1]); }
  else { const digits = text.replace(/\D/g, ''); if (digits.length < 3) return fallback; const padded = digits.padStart(4, '0').slice(-4); h = Number(padded.slice(0, 2)); m = Number(padded.slice(2)); }
  if (!Number.isFinite(h) || !Number.isFinite(m)) return fallback;
  if (meridiem) h = h % 12 + (meridiem === 'PM' ? 12 : 0);
  h = Math.min(23, Math.max(0, h)); m = Math.min(59, Math.max(0, m));
  return `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}`;
}

  const offset = new Date(cursor.y, cursor.m - 1, 1).getDay();
  const move = delta => setCursor(({ y, m }) => { const d = new Date(y, m - 1 + delta, 1); return { y: d.getFullYear(), m: d.getMonth() + 1 }; });
  const choose = day => { onChange(`${cursor.y}-${String(cursor.m).padStart(2,'0')}-${String(day).padStart(2,'0')}`); setOpen(false); };
  const selectedDay = value?.startsWith(`${cursor.y}-${String(cursor.m).padStart(2,'0')}-`) ? Number(value.slice(-2)) : -1;
  const toggle = () => { if (!open && ref.current) { const r = ref.current.getBoundingClientRect(); setPopupPos({ left: Math.max(10, Math.min(r.left, window.innerWidth - 282)), top: r.bottom + 7 }); } setOpen(v => !v); };
  return <div ref={ref} className="custom-date-field" style={{ ...style, position: 'relative' }}>
    <button type="button" onClick={toggle} aria-label="เลือกวันที่"><span>{value || 'เลือกวันที่'}</span><Icon name="calendarSolid" size={15} /></button>
    {open && ReactDOM.createPortal(<div ref={popRef} className="custom-date-popover" style={{ left: popupPos.left, top: popupPos.top }}>
      <div className="custom-date-head"><button type="button" onClick={() => move(-1)}><Icon name="chevronLeft" size={17}/></button><strong>{new Date(cursor.y, cursor.m - 1).toLocaleDateString('en-US',{month:'long'})} {cursor.y}</strong><button type="button" onClick={() => move(1)}><Icon name="chevronRight" size={17}/></button></div>
      <div className="custom-date-grid">{['SUN','MON','TUE','WED','THU','FRI','SAT'].map(x => <b key={x}>{x}</b>)}{Array.from({length: offset},(_,i)=><span key={`e${i}`} />)}{Array.from({length: days},(_,i)=>i+1).map(day => <button type="button" key={day} className={day === selectedDay ? 'selected' : ''} onClick={() => choose(day)}>{day}</button>)}</div>
    </div>, document.body)}
  </div>;
}

function ScheduleCalendar() {
  const [view, setView] = useState('calendar');
  const today0 = new Date();
  const todayStr = dateKey(today0.getFullYear(), today0.getMonth() + 1, today0.getDate());
  const [year, setYear] = useState(today0.getFullYear());
  const [month, setMonth] = useState(today0.getMonth() + 1);
  const [selected, setSelected] = useState(null);
  const [shiftNotes, setShiftNotes] = useState(SHIFT_DEFAULTS);
  const [editingLegend, setEditingLegend] = useState(false);
  const [cases, setCases] = useState({});
  const [shiftOverrides, setShiftOverrides] = useState({});
  const [categories, setCategories] = useState(DEFAULT_CATEGORIES);
  const [newCategory, setNewCategory] = useState('');
  const [categoryStyles, setCategoryStyles] = useState(CATEGORY_STYLE);
  const [newCategoryTheme, setNewCategoryTheme] = useState('pistachio');
  const [holidays, setHolidays] = useState({});
  const [newHolidayDate, setNewHolidayDate] = useState(todayStr);
  const [newHolidayName, setNewHolidayName] = useState('');
  const [loaded, setLoaded] = useState(false);

  const [addMode, setAddMode] = useState('new');
  const [addPanelOpen, setAddPanelOpen] = useState(false);
  const [addChoiceOpen, setAddChoiceOpen] = useState(false);
  const [searchQuery, setSearchQuery] = useState('');
  const [pickedCaseId, setPickedCaseId] = useState(null);
  const [historyCaseId, setHistoryCaseId] = useState(null);
  const [patientListQuery, setPatientListQuery] = useState('');
  const [patientSort, setPatientSort] = useState('date');
  const [overviewPicker, setOverviewPicker] = useState(null);
  const overviewPressTimer = useRef(null);
  const openOverviewPicker = (e, c, m) => setOverviewPicker({ date: c.dstr, year, month: m, x: e.clientX, y: e.clientY });
  const startOverviewPress = (e, c, m) => {
    if (!window.matchMedia('(max-width: 600px)').matches) return;
    const point = { clientX: e.clientX, clientY: e.clientY };
    overviewPressTimer.current = setTimeout(() => openOverviewPicker(point, c, m), 480);
  };
  const cancelOverviewPress = () => { if (overviewPressTimer.current) clearTimeout(overviewPressTimer.current); overviewPressTimer.current = null; };
  const [editingCase, setEditingCase] = useState(false);
  const [editCaseForm, setEditCaseForm] = useState({ hn: '', name: '', phone: '', category: 'ตรวจ' });
  const [calendarEdit, setCalendarEdit] = useState(null);
  const [calendarEditForm, setCalendarEditForm] = useState({ hn: '', name: '', phone: '', category: 'ตรวจ', time: '13:00', duration: 30, step: '' });
  useEffect(() => { setEditingCase(false); }, [historyCaseId]);
  useEffect(() => { if (view !== 'patients') { setHistoryCaseId(null); setEditingCase(false); } }, [view]);
  useEffect(() => { setAddPanelOpen(false); setAddChoiceOpen(false); setCalendarEdit(null); if (selected) setFDate(selected); }, [selected]);

  const [fHn, setFHn] = useState('');
  const [fName, setFName] = useState('');
  const [fPhone, setFPhone] = useState('');
  const [fCategory, setFCategory] = useState('ตรวจ');
  const [fDate, setFDate] = useState(todayStr);
  const [fTime, setFTime] = useState('13:00');
  const [fDuration, setFDuration] = useState(30);
  const [fStep, setFStep] = useState('');

  useEffect(() => {
    (async () => {
      try {
        const legendRes = await window.storage.get('legend-notes', false);
        if (legendRes?.value) {
          const parsed = JSON.parse(legendRes.value);
          if (parsed.shift) setShiftNotes({ ...SHIFT_DEFAULTS, ...parsed.shift });
        }
      } catch (e) {}

      try {
        const ovrRes = await window.storage.get('shift-overrides', false);
        if (ovrRes?.value) setShiftOverrides(JSON.parse(ovrRes.value));
      } catch (e) {}
      try {
        const holidayRes = await window.storage.get('holidays', false);
        if (holidayRes?.value) setHolidays(JSON.parse(holidayRes.value));
      } catch (e) {}

      try {
        const catRes = await window.storage.get('categories', false);
        if (catRes?.value) setCategories(JSON.parse(catRes.value));
      } catch (e) {}
      try {
        const styleRes = await window.storage.get('category-styles', false);
        if (styleRes?.value) setCategoryStyles({ ...CATEGORY_STYLE, ...JSON.parse(styleRes.value) });
      } catch (e) {}

      let caseData = null;
      try {
        const caseRes = await window.storage.get('cases', false);
        if (caseRes?.value) caseData = JSON.parse(caseRes.value);
      } catch (e) {}

      if (caseData) {
        const mergedCases = mergeCasesByHn(caseData);
        setCases(mergedCases);
        try { await window.storage.set('cases', JSON.stringify(mergedCases), false); } catch (e) {}
      } else {
        let migrated = {};
        let oldPatients = null;
        try {
          const oldRes = await window.storage.get('patient-entries', false);
          if (oldRes?.value) oldPatients = JSON.parse(oldRes.value);
        } catch (e) {}

        if (oldPatients) {
          Object.keys(oldPatients).forEach(dstr => {
            (oldPatients[dstr] || []).forEach(entry => {
              const { hn, name, category } = parseHnCategory(entry.name);
              const id = uid();
              migrated[id] = {
                id, hn, name, phone: '', category,
                visits: [{ id: uid(), date: dstr, time: entry.time, duration: entry.duration || 30, step: entry.note || '' }],
              };
            });
          });
        } else {
          Object.keys(SCHEDULE_DATA).forEach(dstr => {
            const parsed = parseLegacyToCases(SCHEDULE_DATA[dstr].appointments);
            parsed.forEach(p => {
              const id = uid();
              migrated[id] = {
                id, hn: p.hn, name: p.name, phone: '', category: p.category,
                visits: [{ id: uid(), date: dstr, time: p.time, duration: 30, step: '' }],
              };
            });
          });
        }
        const mergedCases = mergeCasesByHn(migrated);
        setCases(mergedCases);
        try { await window.storage.set('cases', JSON.stringify(mergedCases), false); } catch (e) {}
      }
      setLoaded(true);
    })();
  }, []);

  const saveCases = async (next) => {
    const mergedCases = mergeCasesByHn(next);
    setCases(mergedCases);
    try { await window.storage.set('cases', JSON.stringify(mergedCases), false); } catch (e) { console.error(e); }
  };
  const saveLegend = async (next) => {
    setShiftNotes(next);
    try { await window.storage.set('legend-notes', JSON.stringify({ shift: next }), false); } catch (e) {}
  };
  const saveOverrides = async (next) => {
    setShiftOverrides(next);
    try { await window.storage.set('shift-overrides', JSON.stringify(next), false); } catch (e) {}
  };
  const saveHolidays = async (next) => {
    setHolidays(next);
    try { await window.storage.set('holidays', JSON.stringify(next), false); } catch (e) {}
  };
  const addHoliday = () => {
    if (!newHolidayDate) return;
    saveHolidays({ ...holidays, [newHolidayDate]: newHolidayName.trim() || 'วันหยุด' });
    saveOverrides({ ...shiftOverrides, [newHolidayDate]: 'off' });
    setNewHolidayName('');
  };
  const removeHoliday = (dstr) => {
    const nextHolidays = { ...holidays }; delete nextHolidays[dstr]; saveHolidays(nextHolidays);
    const nextOverrides = { ...shiftOverrides }; delete nextOverrides[dstr]; saveOverrides(nextOverrides);
  };
  const saveCategories = async (next) => {
    setCategories(next);
    try { await window.storage.set('categories', JSON.stringify(next), false); } catch (e) {}
  };
  const saveCategoryStyles = async (next) => {
    setCategoryStyles(next);
    try { await window.storage.set('category-styles', JSON.stringify(next), false); } catch (e) {}
  };
  const addCategory = () => {
    const name = newCategory.trim();
    if (!name || categories.includes(name)) return;
    saveCategories([...categories, name]);
    const theme = CATEGORY_THEME_OPTIONS[newCategoryTheme] || CATEGORY_THEME_OPTIONS.pistachio;
    saveCategoryStyles({ ...categoryStyles, [name]: { bg: theme.bg, text: theme.text } });
    setNewCategory('');
  };
  const removeCategory = (name) => {
    if (DEFAULT_CATEGORIES.includes(name)) return;
    saveCategories(categories.filter(c => c !== name));
    const next = { ...categoryStyles }; delete next[name]; saveCategoryStyles(next);
  };

  const getShift = (dstr) => shiftOverrides[dstr] !== undefined ? shiftOverrides[dstr] : (SCHEDULE_DATA[dstr]?.shift || null);
  const setShift = (dstr, code) => saveOverrides({ ...shiftOverrides, [dstr]: code || null });

  const buildCells = (y, m) => {
    const fw = firstWeekday(y, m);
    const nd = daysInMonth(y, m);
    const arr = [];
    for (let i = 0; i < fw; i++) arr.push(null);
    for (let d = 1; d <= nd; d++) {
      const dstr = dateKey(y, m, d);
      arr.push({ day: d, dstr, info: SCHEDULE_DATA[dstr] || null, shift: getShift(dstr) });
    }
    return arr;
  };

  const visitsForDate = (dstr) => {
    const out = [];
    Object.values(cases).forEach(c => {
      (c.visits || []).forEach(v => { if (v.date === dstr) out.push({ case: c, visit: v }); });
    });
    return out.sort((a, b) => timeToMin(a.visit.time) - timeToMin(b.visit.time));
  };
  const countForDate = (dstr) => Object.values(cases).reduce((n, c) => n + (c.visits || []).filter(v => v.date === dstr && v.status !== 'cancelled').length, 0);

  const cells = useMemo(() => buildCells(year, month), [year, month, shiftOverrides]);
  const selInfo = selected ? SCHEDULE_DATA[selected] : null;
  const selShift = selected ? getShift(selected) : null;
  const dayVisits = selected ? visitsForDate(selected) : [];
  const leftoverNotes = (selInfo?.appointments || []).filter(line => {
    const m = line.match(TIME_RE);
    return !m || SKIP_WORDS.has((m[2] || '').trim());
  });


  const searchResults = useMemo(() => {
    if (!searchQuery.trim()) return [];
    const q = searchQuery.trim().toLowerCase();
    return Object.values(cases).filter(c => c.hn.includes(q) || c.name.toLowerCase().includes(q)).slice(0, 8);
  }, [searchQuery, cases]);

  const patientListResults = useMemo(() => {
    const q = patientListQuery.trim().toLowerCase();
    let list = Object.values(cases);
    if (q) list = list.filter(c => c.hn.includes(q) || c.name.toLowerCase().includes(q) || c.category.toLowerCase().includes(q));
    return list.map(c => {
      const active = c.visits.filter(v => v.status !== 'cancelled');
      const cancelledCount = c.visits.length - active.length;
      const future = active.filter(v => v.date >= todayStr).sort((a, b) => (a.date + a.time).localeCompare(b.date + b.time));
      const past = active.filter(v => v.date < todayStr).sort((a, b) => (b.date + b.time).localeCompare(a.date + a.time));
      const nextVisit = future[0] || null;
      const lastVisit = past[0] || null;
      return { ...c, activeCount: active.length, cancelledCount, nextVisit, lastVisit };
    }).sort((a, b) => {
      if (patientSort === 'name') return a.name.localeCompare(b.name, 'th');
      if (patientSort === 'hn') return (a.hn || '').localeCompare(b.hn || '', undefined, { numeric: true });
      if (patientSort === 'category') return (a.category || '').localeCompare(b.category || '', 'th') || a.name.localeCompare(b.name, 'th');
      const aDate = a.nextVisit?.date || a.lastVisit?.date || '9999-12-31';
      const bDate = b.nextVisit?.date || b.lastVisit?.date || '9999-12-31';
      return aDate.localeCompare(bDate);
    });
  }, [patientListQuery, patientSort, cases]);

  const resetNewForm = () => { setFHn(''); setFName(''); setFPhone(''); setFCategory('ตรวจ'); setFDate(selected || todayStr); setFTime('13:00'); setFDuration(30); setFStep(''); };

  const createCase = () => {
    if (!fDate || !fName.trim()) return;
    const id = uid();
    const next = {
      ...cases,
      [id]: {
        id, hn: fHn.trim(), name: fName.trim(), phone: fPhone.trim(), category: fCategory,
        visits: [{ id: uid(), date: fDate, time: fTime, duration: fDuration, step: fStep.trim() }],
      },
    };
    saveCases(next);
    resetNewForm();
    setAddPanelOpen(false);
  };

  const addVisitToCase = () => {
    if (!fDate || !pickedCaseId || !cases[pickedCaseId]) return;
    const c = cases[pickedCaseId];
    const nextCase = { ...c, visits: [...c.visits, { id: uid(), date: fDate, time: fTime, duration: fDuration, step: fStep.trim() }] };
    saveCases({ ...cases, [pickedCaseId]: nextCase });
    setPickedCaseId(null); setSearchQuery(''); resetNewForm();
    setAddPanelOpen(false);
  };

  const removeVisit = (caseId, visitId) => {
    const c = cases[caseId]; if (!c) return;
    const nextVisits = c.visits.filter(v => v.id !== visitId);
    const next = { ...cases };
    if (nextVisits.length === 0) delete next[caseId]; else next[caseId] = { ...c, visits: nextVisits };
    saveCases(next);
    if (nextVisits.length === 0 && historyCaseId === caseId) setHistoryCaseId(null);
  };

  const toggleCancelVisit = (caseId, visitId) => {
    const c = cases[caseId]; if (!c) return;
    const nextVisits = c.visits.map(v => v.id === visitId ? { ...v, status: v.status === 'cancelled' ? undefined : 'cancelled' } : v);
    saveCases({ ...cases, [caseId]: { ...c, visits: nextVisits } });
  };

  const deleteCase = (caseId) => {
    const next = { ...cases }; delete next[caseId]; saveCases(next);
    if (historyCaseId === caseId) setHistoryCaseId(null);
  };
  const startEditCase = (c) => { setEditCaseForm({ hn: c.hn || '', name: c.name || '', phone: c.phone || '', category: c.category || 'อื่นๆ' }); setEditingCase(true); };
  const saveCaseEdit = () => {
    if (!historyCase || !editCaseForm.name.trim()) return;
    saveCases({ ...cases, [historyCase.id]: { ...historyCase, ...editCaseForm, hn: editCaseForm.hn.trim(), name: editCaseForm.name.trim(), phone: editCaseForm.phone.trim() } });
    setEditingCase(false);
  };

  const goMonth = (delta) => {
    let m = month + delta, y = year;
    if (m < 1) { m = 12; y -= 1; } else if (m > 12) { m = 1; y += 1; }
    setMonth(m); setYear(y); setSelected(null);
  };
  const openDay = (dstr, y, m) => { setYear(y); setMonth(m); setSelected(dstr); setView('calendar'); };
  const jumpToVisit = (dstr) => { const [y, m] = dstr.split('-').map(Number); setYear(y); setMonth(m); setSelected(dstr); setView('calendar'); setHistoryCaseId(null); };
  const openPatientHistory = (caseId) => {
    setHistoryCaseId(caseId); setEditingCase(false); setView('patients');
    setTimeout(() => window.scrollTo({ top: 0, behavior: 'smooth' }), 0);
  };
  const editPatientFromCalendar = (c, v) => {
    setCalendarEdit({ caseId: c.id, visitId: v.id });
    setCalendarEditForm({ hn: c.hn || '', name: c.name || '', phone: c.phone || '', category: c.category || 'อื่นๆ', time: v.time || '13:00', duration: v.duration || 30, step: v.step || '' });
  };
  const saveCalendarPatientEdit = () => {
    if (!calendarEdit || !calendarEditForm.name.trim()) return;
    const c = cases[calendarEdit.caseId]; if (!c) return;
    const visits = c.visits.map(v => v.id === calendarEdit.visitId ? { ...v, time: calendarEditForm.time, duration: Math.max(5, Number(calendarEditForm.duration) || 30), step: calendarEditForm.step.trim() } : v);
    saveCases({ ...cases, [c.id]: { ...c, hn: calendarEditForm.hn.trim(), name: calendarEditForm.name.trim(), phone: calendarEditForm.phone.trim(), category: calendarEditForm.category, visits } });
    setCalendarEdit(null);
  };

  const historyCase = historyCaseId ? cases[historyCaseId] : null;
  const historyVisitsSorted = historyCase ? [...historyCase.visits].sort((a, b) => (a.date + a.time).localeCompare(b.date + b.time)) : [];

  const VisitRow = ({ c, v, showJump }) => {
    const cs = categoryStyles[c.category] || categoryStyles['อื่นๆ'] || CATEGORY_STYLE['อื่นๆ'];

    return (
      <div style={{ padding: '8px 10px', borderRadius: 8, background: cancelled ? '#F3EDE9' : '#FAF6EF', marginBottom: 6, opacity: cancelled ? 0.7 : 1 }}>

          <button type="button" onClick={() => editPatientFromCalendar(c, v)} title="แก้เวลา" style={{ fontFamily: "'Kanit', sans-serif", fontSize: 13, fontWeight: 600, color: cancelled ? '#B9AF9A' : '#000000', minWidth: 92, textDecoration: cancelled ? 'line-through' : 'none', border: 'none', background: 'transparent', padding: 0, textAlign: 'left', cursor: 'pointer' }}>
            {v.time}–{minToTime(timeToMin(v.time) + v.duration)}
          </button>
          <div style={{ flex: '1 1 180px', minWidth: 0 }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 6, flexWrap: 'wrap' }}>
              {c.hn && <span style={{ fontSize: 12, fontFamily: "'IBM Plex Sans Thai', sans-serif", fontWeight: 700, color: '#6777B6' }}>HN {c.hn}</span>}
              <span style={{ fontSize: 13.5, fontWeight: 600, color: cancelled ? '#B9AF9A' : '#1F3A35', textDecoration: cancelled ? 'line-through' : 'none' }}>{c.name}</span>
              {cancelled && <span style={{ fontSize: 10, fontWeight: 700, color: '#A33636' }}>ยกเลิกแล้ว</span>}
            </div>
            {v.step && <div style={{ fontSize: 12, color: '#5C6D68', marginTop: 2 }}>{v.step}</div>}
            {showJump && <button onClick={() => jumpToVisit(v.date)} style={{ fontSize: 11, color: '#1F5B54', background: 'none', border: 'none', cursor: 'pointer', textDecoration: 'underline', padding: 0, marginTop: 2 }}>{v.date} — ไปที่วันนัด</button>}
          </div>
          <span style={{ fontSize: 10.5, fontWeight: 700, padding: '3px 7px', borderRadius: 4, background: cs.bg, color: cs.text, whiteSpace: 'nowrap' }}>{c.category}</span>
          {!showJump && !cancelled && <button onClick={() => { const d = new Date((selected || v.date) + 'T00:00:00'); d.setDate(d.getDate() + 1); setFDate(`${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`); setAddMode('existing'); setPickedCaseId(c.id); setSearchQuery(''); setFTime(v.time || '13:00'); setFDuration(v.duration || 30); setFStep(''); setAddChoiceOpen(false); setAddPanelOpen(true); }} title="นัดต่อวันถัดไป" aria-label="นัดต่อวันถัดไป" style={{ minWidth: 58, height: 30, border: 'none', borderRadius: 9, background: '#E5E9D0', color: '#1F5B54', cursor: 'pointer', padding: '2px 8px', display: 'inline-flex', alignItems: 'center', justifyContent: 'center', gap: 4, fontSize: 11.5, fontWeight: 800 }}><span aria-hidden="true">🗓</span><span>นัดต่อ</span></button>}
          {!showJump && <button onClick={() => editPatientFromCalendar(c, v)} title="แก้ไขข้อมูลคนไข้และหมายเหตุ" style={{ width: 30, height: 30, border: 'none', background: 'transparent', cursor: 'pointer', padding: 2, display: 'flex', alignItems: 'center', justifyContent: 'center' }}><Icon name="plumpEdit" size={27} /></button>}
          <button onClick={() => openPatientHistory(c.id)} title="ดูประวัติเคส" aria-label="ดูประวัติเคส" style={{ width: 30, height: 30, border: 'none', background: 'transparent', cursor: 'pointer', padding: 1, display: 'inline-flex', alignItems: 'center', justifyContent: 'center' }}><Icon name="plumpHistory" size={28} /></button>
          <button onClick={() => toggleCancelVisit(c.id, v.id)} title={cancelled ? 'เอากลับมา' : 'ยกเลิกนัด'} aria-label={cancelled ? 'เอากลับมา' : 'ยกเลิกนัด'} style={{ width: 30, height: 30, borderRadius: 8, border: 'none', background: 'transparent', cursor: 'pointer', padding: 1, display: 'inline-flex', alignItems: 'center', justifyContent: 'center' }}>
            <Icon name={cancelled ? 'plumpRestore' : 'plumpCancel'} size={28} />
          </button>
          <button onClick={() => removeVisit(c.id, v.id)} title="ลบนัดนี้" style={{ border: 'none', background: 'none', cursor: 'pointer', padding: 2 }}><Icon name="x" size={14} color="#B9AF9A" /></button>
        </div>
      </div>
    );
  };

  return (
    <div style={{ fontFamily: "'Sarabun', sans-serif", background: '#F3EAE3', minHeight: '100vh', color: '#2B2B23', padding: '20px 14px 0', display: 'flex', flexDirection: 'column' }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@500;600;700&family=Nunito:wght@400;500;600;700;800;900&family=Noto+Sans+Thai+Looped:wght@400;500;600;700&display=swap');
        :root {
          --font-thai-body: 'Noto Sans Thai Looped', sans-serif;
          --font-heading: 'Kanit', sans-serif;
          --font-latin: 'Nunito', sans-serif;
        }
        [style*="Sarabun"] { font-family: var(--font-thai-body) !important; }
        [style*="IBM Plex Sans Thai"] { font-family: var(--font-thai-body) !important; }
        [style*="IBM Plex Mono"] { font-family: var(--font-latin) !important; }
        [style*="Manrope"] { font-family: var(--font-latin) !important; }
        input, select, textarea { font-family: var(--font-thai-body); }
        .page-head h1 { letter-spacing: -.25px; }
        .patient-scroll, .history-panel { font-family: var(--font-thai-body); }
        .patient-scroll [style*="letter-spacing"], .history-panel [style*="letter-spacing"] { font-family: var(--font-latin); }

              onTouchStart={e => { if (deckGlideTimer.current) clearTimeout(deckGlideTimer.current); deckGlideTimer.current = null; deckTouchY.current = e.touches[0].clientY; deckTouchTime.current = Date.now(); deckMoved.current = false; setDeckDragging(true); setDeckDragY(0); }}
              onTouchMove={e => { if (deckTouchY.current === null) return; const drag = e.touches[0].clientY - deckTouchY.current; if (Math.abs(drag) > 5) deckMoved.current = true; setDeckDragY(Math.max(-150, Math.min(150, drag))); }}
              onTouchCancel={() => { deckTouchY.current = null; setDeckDragging(false); setDeckDragY(0); }}
              onTouchEnd={e => { const drag = e.changedTouches[0].clientY - (deckTouchY.current ?? e.changedTouches[0].clientY); const velocity = drag / Math.max(1, Date.now() - deckTouchTime.current); if (Math.abs(drag) > 32 || Math.abs(velocity) > .3) glideDeck(drag < 0 ? 1 : -1, 1); deckTouchY.current = null; setDeckDragging(false); setDeckDragY(0); }}
              onWheel={e => { if (Math.abs(e.deltaY) < 1 || deckWheelCooldown.current) return; if (deckGlideTimer.current) { clearTimeout(deckGlideTimer.current); deckGlideTimer.current = null; } deckWheelAccum.current += e.deltaY; setDeckDragging(true); setDeckDragY(Math.max(-110, Math.min(110, -deckWheelAccum.current))); if (deckWheelTimer.current) clearTimeout(deckWheelTimer.current); deckWheelTimer.current = setTimeout(() => { const delta = deckWheelAccum.current; deckWheelAccum.current = 0; setDeckDragging(false); setDeckDragY(0); deckWheelCooldown.current = true; glideDeck(delta > 0 ? 1 : -1, 1); setTimeout(() => { deckWheelCooldown.current = false; }, 420); }, 85); }}>

function App() {
  const [user, setUser] = useState(undefined); // undefined = loading, null = signed out

  useEffect(() => {
    const unsub = auth.onAuthStateChanged(u => {
      currentUid = u ? u.uid : null;
      setUser(u);
    });
    return unsub;
  }, []);

  if (user === undefined) return <LoadingScreen />;
  if (!user) return <SignInScreen />;

  return (
    <div>
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'flex-end', gap: 10, padding: '8px 14px', background: '#F0EBDD', fontFamily: "'Sarabun', sans-serif" }}>
        <span style={{ fontSize: 11.5, color: '#5C6D68' }}>{user.email}</span>
        <button onClick={() => auth.signOut()} style={{ fontSize: 11.5, border: '1px solid #DCD4C4', background: '#FFFFFF', color: '#5C6D68', borderRadius: 6, padding: '4px 10px', cursor: 'pointer' }}>ออกจากระบบ</button>
      </div>
      <ScheduleCalendar key={user.uid} />
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
