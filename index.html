<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DF Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
<style>
:root{
  /* Theme tokens */
--bg: var(--cream);
--surface: var(--cream-dk);
--surface2: var(--cream-dk2);

--text: var(--blue);
--subtext: var(--green);

--accent: var(--blue-dk);
--accent-hover: #D96A3B;

--border: var(--cream-dk2);
}
*{box-sizing:border-box;margin:0;padding:0;}
html{background:var(--cream);}
body{font-family:'Sarabun',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
#app{max-width:960px;margin:0 auto;padding:20px 16px 60px;}

.login-screen{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:22px;padding:20px;text-align:center;
}
.login-screen .mark-big{
  width:76px;height:76px;border-radius:18px;background:var(--blue);color:var(--cream);
  display:flex;align-items:center;justify-content:center;font-weight:800;
  font-family:'IBM Plex Mono',monospace;font-size:22px;
}
.login-screen h1{color:var(--blue);font-size:24px;font-weight:800;letter-spacing:.5px;}
.login-screen p{color:rgba(237,234,217,.7);font-size:13px;max-width:280px;}
.gbtn{
  display:flex;align-items:center;gap:10px;background:#F3F1E9;color:#202124;
  border:none;border-radius:12px;padding:13px 22px;font-family:'Sarabun',sans-serif;
  font-size:15px;font-weight:700;cursor:pointer;transition:.15s;box-shadow:0 4px 14px rgba(0,0,0,.15);
}
.gbtn:hover{background:#fff;}
.gbtn svg{width:20px;height:20px;flex-shrink:0;}
.login-err{color:#FFB4B4;font-size:12px;max-width:280px;}
.loading-screen{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  color:var(--blue);font-size:14px;font-weight:700;opacity:.7;
}

.topbar{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:20px;gap:12px;flex-wrap:wrap;
}
.brand{display:flex;align-items:center;gap:10px;}
.brand .mark{
  width:40px;height:40px;border-radius:10px;
  background:var(--accent);color:var(--bg);
  display:flex;align-items:center;justify-content:center;
  font-weight:800;font-family:'IBM Plex Mono',monospace;font-size:13px;flex-shrink:0;
}
.brand h1{font-size:18px;font-weight:800;color:var(--text);;letter-spacing:.5px;}
.brand .sub{font-size:11px;color:var(--subtext);margin-top:1px;}
nav.tabs{display:flex;gap:4px;background:var(--surface);border-radius:999px;padding:4px;}
nav.tabs button{
  border:none;background:transparent;padding:8px 16px;border-radius:999px;
  font-family:'Sarabun',sans-serif;font-size:13px;font-weight:700;
  color:var(--subtext);cursor:pointer;transition:.15s;white-space:nowrap;
}
nav.tabs button.active{background:var(--accent);color:var(--bg);}

.user-chip{display:flex;align-items:center;gap:8px;}
.user-chip img{width:30px;height:30px;border-radius:50%;border:2px solid var(--blue);}
.user-chip .uname{color:var(--text);font-size:12px;font-weight:700;max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#7CE0A8;flex-shrink:0;}
.sync-dot.saving{background:#F2C14E;}

/* Settings gear + dropdown panel (theme picker + logout) */
.settings-wrap{position:relative;display:flex;align-items:center;}
.fa-solid{
  font-size:13px;
  line-height:1;
}

.icon-inline{
  margin-right:4px;
  color:var(--accent);
}
  .gear-btn{
    width:30px;
    height:30px;
    border:none;
    background:transparent;
    color:var(--green);
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    transition:.15s;
    padding:0;
}

.gear-btn i{
    font-size:16px;
}

.gear-btn:hover{
    color:var(--blue-dk);
    background:transparent;
}
.settings-panel{
  position:absolute;top:calc(100% + 10px);right:0;z-index:60;
  width:280px;background:var(--cream);border-radius:14px;
  padding:14px;box-shadow:0 10px 28px rgba(0,0,0,.18);
  border:1px solid var(--cream-dk2);
}
.settings-panel-title{
  font-size:11px;font-weight:800;color:var(--blue-dk);
  opacity:.7;letter-spacing:.3px;margin-bottom:10px;
}
.theme-list{
  display:flex;flex-direction:column;gap:7px;
  max-height:320px;overflow-y:auto;padding-right:0;  
  scrollbar-width:none;
  -ms-overflow-style:none;
}
.theme-list::-webkit-scrollbar{
  display:none;
}
}
.theme-btn{
  display:flex;align-items:center;justify-content:space-between;gap:12px;
  width:100%;border:1.5px solid transparent;border-radius:12px;
  padding:10px 12px;cursor:pointer;font-family:'Sarabun',sans-serif;
  font-size:13px;font-weight:800;transition:.15s;text-align:left;
}
.theme-btn:hover{
  transform:translateY(-1px);
  filter:saturate(1.08);
}
.theme-btn.active{
  border:2px solid var(--accent);
}
.theme-dots{
  display:flex;gap:5px;flex-shrink:0;
}
.theme-dot{
  width:13px;height:13px;border-radius:50%;flex-shrink:0;
  border:1.5px solid rgba(0,0,0,.16);
}
.settings-divider{
  height:1px;background:var(--cream-dk2);margin:12px 0;
}

.cal-wrap{
  background:var(--bg);
  border-radius:18px;
  overflow:hidden;
}

.cal-header{
  display:flex;
  align-items:flex-end;
  justify-content:space-between;
  padding:22px 24px 18px;
  border-bottom:2px solid var(--border);
}

.cal-header .month-num{
  font-size:clamp(72px,12vw,110px);
  font-weight:800;
  line-height:1;
  font-family:'IBM Plex Mono',monospace;
  color:transparent;
  -webkit-text-stroke:2.5px var(--subtext);
  letter-spacing:-4px;
  flex-shrink:0;
}

.cal-header .month-right{text-align:right;}

.cal-header .month-name{
  font-size:clamp(22px,4vw,38px);
  font-weight:800;
  color:var(--text);
  letter-spacing:1px;
  line-height:1.1;
}

.cal-header .year-label{
  font-size:clamp(14px,2.5vw,20px);
  color:var(--subtext);
  opacity:1;
  margin-top:2px;
  font-weight:600;
}

.mnav{
  display:flex;
  gap:6px;
  margin-top:10px;
  justify-content:flex-end;
}

.mnav button{
  width:30px;
  height:30px;
  border-radius:50%;
  border:2px solid var(--border);
  background:transparent;
  color:var(--text);
  font-size:14px;
  font-weight:700;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  transition:.12s;
}

.mnav button:hover{
  background:var(--accent);
  color:var(--bg);
  border-color:var(--accent);
}

.cal-grid{padding:0;}

.weekdays{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  border-bottom:2px solid var(--border);
}

.weekdays div{
  text-align:center;
  font-size:11px;
  font-weight:700;
  color:var(--subtext);
  padding:8px 4px;
  letter-spacing:.5px;
  border-right:1px solid var(--border);
}

.weekdays div:last-child{border-right:none;}

.daygrid{
  display:grid;
  grid-template-columns:repeat(7,1fr);
}

.cell{
  border-right:1px solid var(--border);
  border-bottom:1px solid var(--border);
  min-height:80px;
  padding:6px 8px 6px;
  cursor:pointer;
  position:relative;
  transition:.1s;
  background:var(--bg);
}

.cell:nth-child(7n){border-right:none;}

.cell:hover{
  background:var(--surface);
}

.cell.empty{
  cursor:default;
  background:var(--bg);
}

.cell.empty:hover{
  background:var(--bg);
}

.cell .dnum{
  font-size:13px;
  font-weight:700;
  color:var(--subtext);
  text-align:right;
  opacity:1;
}

.cell.has-data .dnum{
  color:var(--text);
}

.cell.today{
  background:var(--accent);
}

.cell.today .dnum{
  color:var(--bg);
  opacity:1;
}

.cell.today:hover{
  background:var(--accent-hover);
}

.cell .cdots{
  display:flex;
  flex-wrap:wrap;
  gap:3px;
  margin-top:5px;
}

.cdot{
  width:6px;
  height:6px;
  border-radius:50%;
}

.cell.today .cdot{
  outline:1px solid color-mix(in srgb,var(--bg) 60%,transparent);
}

.cell .cnet{
  position:absolute;
  bottom:6px;
  left:6px;
  right:6px;
  font-size:10px;
  font-family:'IBM Plex Mono',monospace;
  font-weight:600;
  color:var(--text);
  text-align:right;
}

.cell.today .cnet{
  color:var(--bg);
}

.cell .cbar{
  position:absolute;
  left:0;
  bottom:0;
  height:3px;
  background:var(--accent);
  transform-origin:left;
  opacity:.45;
}

.card{
  background:var(--bg);
  border-radius:18px;
  padding:20px 22px;
  margin-bottom:14px;
}

.clinic-filter{
  display:flex;
  gap:6px;
  flex-wrap:wrap;
  margin-top:12px;
}

.cf-chip{
  display:flex;
  align-items:center;
  gap:6px;
  border:none;
  border-radius:999px;
  padding:7px 13px;
  background:var(--surface);
  color:var(--subtext);
  font-family:'Sarabun',sans-serif;
  font-size:12px;
  font-weight:700;
  cursor:pointer;
  transition:.15s;
}

.cf-chip:hover{
  background:var(--surface2);
  color:var(--text);
}

.cf-chip.active{
  background:var(--accent);
  color:var(--bg);
}

.cf-chip .cdot{
  width:7px;
  height:7px;
}

.quick-df{
  background:var(--bg);
  border-radius:16px;
  padding:16px 18px;
  margin-top:12px;
}

.qd-title{
  font-size:12px;
  font-weight:800;
  color:var(--subtext);
  opacity:1;
  letter-spacing:.3px;
  margin-bottom:10px;
}

.qd-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(100px,1fr));
  gap:8px;
}

.qd-item{
  display:flex;
  flex-direction:column;
  gap:3px;
  border:1.5px solid var(--border);
  border-radius:10px;
  padding:9px 11px;
  background:var(--surface);
}

.qd-item.hilite{
  background:var(--accent);
  border-color:var(--accent);
}

.qd-item.hilite .qd-l{
  color:color-mix(in srgb,var(--bg) 75%,var(--accent));
}

.qd-item.hilite .qd-v{
  color:var(--bg);
}

.qd-l{
  font-size:10px;
  font-weight:700;
  color:var(--subtext);
  opacity:1;
  letter-spacing:.3px;
}

.qd-v{
  font-family:'IBM Plex Mono',monospace;
  font-size:15px;
  font-weight:800;
  color:var(--text);
}

.qd-v.neg{
  color:var(--red);
}

.stat-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(130px,1fr));
  gap:10px;
  margin-bottom:16px;
}

.stat{
  border:2px solid var(--text);
  border-radius:12px;
  padding:13px 14px;
  background:transparent;
}

.stat .sl{
  font-size:11px;
  font-weight:700;
  color:var(--subtext);
  opacity:1;
  margin-bottom:5px;
  letter-spacing:.3px;
}

.stat .sv{
  font-size:19px;
  font-weight:800;
  color:var(--text);
  font-family:'IBM Plex Mono',monospace;
}

.stat.hilite{
  background:var(--text);
  border-color:var(--text);
}

.stat.hilite .sl{
  color:var(--subtext);
}

.stat.hilite .sv{
  color:var(--bg);
}

.stat.deduct .sv{
  color:var(--red);
}

/* ---------- Section ---------- */

.sec-title{
  display:flex;
  align-items:center;
  gap:8px;
  font-size:13px;
  font-weight:800;
  color:var(--text);
  margin:20px 0 10px;
}

.sec-title .badge{
  background:var(--surface2);
  color:var(--subtext);
  font-family:'IBM Plex Mono',monospace;
  font-size:10px;
  padding:3px 8px;
  border-radius:6px;
}

/* ---------- Tax ---------- */

.tax-note{
  background:transparent;
  border:none;
  border-radius:0;
  padding:18px 0 20px;
  margin-bottom:16px;
  font-size:13px;
  line-height:1.6;
  color:var(--text);
  font-weight:500;
}

.tax-note strong{
  color:var(--accent);
  font-weight:800;
}
/* ---------- Table ---------- */

table{
  width:100%;
  border-collapse:collapse;
  background:transparent;
  border-radius:12px;
  overflow:hidden;
  border:none;
}

th,td{
  padding:9px 12px;
  text-align:left;
  font-size:12px;
  border-bottom:1px solid var(--border);
}

th{
  background:var(--text);
  color:var(--bg);
  font-weight:700;
  font-size:11px;
  letter-spacing:.3px;
}

tr:last-child td{
  border-bottom:none;
}

td{
  color:var(--text);
  font-weight:500;
}

td.r,th.r{
  text-align:right;
  font-family:'IBM Plex Mono',monospace;
}

td.net-col{
  font-weight:800;
  color:var(--text);
}

/* ---------- Clinic ---------- */

.clist{
  display:flex;
  flex-direction:column;
  gap:8px;
}

.ccard{
  background:var(--surface);
  border:1.5px solid var(--border);
  border-radius:12px;
  padding:13px 15px;
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:10px;
  flex-wrap:wrap;
}

.ccard .cn{
  display:flex;
  align-items:center;
  gap:7px;
  color:var(--text);
  font-size:15px;
  font-weight:800;
}

.swatch{
  width:12px;
  height:12px;
  border-radius:3px;
}

.pills{
  display:flex;
  flex-wrap:wrap;
  gap:5px;
  margin-top:7px;
}

.pill{
  border:1px solid var(--border);
  border-radius:999px;
  padding:3px 9px;
  background:var(--bg);
  color:var(--subtext);
  font-size:11px;
  font-weight:700;
}

.pill.off{
  opacity:.45;
}

/* ---------- Constant ---------- */

.const-banner{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin-bottom:16px;
}

.cbadge{
  background:var(--surface);
  border:1px solid var(--border);
  color:var(--text);
  padding:5px 12px;
  border-radius:8px;
  font-family:'IBM Plex Mono',monospace;
  font-size:11px;
  font-weight:700;
}

.btn{
  border:none;
  border-radius:9px;
  padding:9px 16px;
  font-family:'Sarabun',sans-serif;
  font-weight:700;
  font-size:13px;
  cursor:pointer;
  transition:.15s;
}

.btn-primary{
  background:var(--accent);
  color:var(--bg);
}

.btn-primary:hover{
  background:var(--accent-hover);
}

.btn-ghost{
  background:transparent;
  border:1.5px solid var(--border);
  color:var(--text);
}

.btn-ghost:hover{
  background:var(--surface);
  border-color:var(--surface2);
}

.btn-danger{
  background:transparent;
  border:1.5px solid var(--red);
  color:var(--red);
}

.btn-danger:hover{
  background:var(--red-lt);
}

.btn-sm{
  padding:5px 10px;
  font-size:12px;
}

.btn-icon{
  width:28px;
  height:28px;
  border-radius:7px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:14px;
  flex-shrink:0;
  border:1.5px solid var(--border);
  background:transparent;
  cursor:pointer;
  color:var(--subtext);
  transition:.1s;
}

.btn-icon:hover{
  border-color:var(--red);
  color:var(--red);
  background:var(--red-lt);
}

.add-row{
  display:flex;
  justify-content:flex-end;
  margin-top:12px;
}

/* ---------- Modal ---------- */

.overlay{
  position:fixed;
  inset:0;
  background:color-mix(in srgb,var(--text) 38%,transparent);
  display:flex;
  align-items:flex-end;
  justify-content:center;
  z-index:50;
}

@media(min-width:600px){
  .overlay{
    align-items:center;
    padding:20px;
  }
}

.modal{
  background:var(--bg);
  border-radius:18px 18px 0 0;
  max-width:500px;
  width:100%;
  max-height:92vh;
  overflow-y:auto;
  padding:22px 20px 28px;
  border:1px solid var(--border);
}

@media(min-width:600px){
  .modal{
    border-radius:16px;
  }
}

.modal-h{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:16px;
}

.modal-h h2{
  font-size:18px;
  font-weight:800;
  color:var(--text);
}

/* ---------- Fields ---------- */

.field{
  margin-bottom:13px;
}

.field label{
  display:block;
  font-size:11px;
  font-weight:700;
  color:var(--subtext);
  margin-bottom:5px;
  letter-spacing:.3px;
}

.field input,
.field select{
  width:100%;
  border:1.5px solid var(--border);
  border-radius:9px;
  padding:9px 11px;
  font-family:'Sarabun',sans-serif;
  font-size:14px;
  background:var(--surface);
  color:var(--text);
}

.field input:focus,
.field select:focus{
  outline:none;
  border-color:var(--accent);
  background:var(--bg);
}

/* ---------- Segment ---------- */

.seg{
  display:flex;
  border:1.5px solid var(--border);
  border-radius:9px;
  overflow:hidden;
}

.seg button{
  flex:1;
  border:none;
  background:var(--surface);
  padding:9px;
  font-family:'Sarabun',sans-serif;
  font-size:13px;
  font-weight:700;
  cursor:pointer;
  color:var(--subtext);
  transition:.12s;
}

.seg button.active{
  background:var(--accent);
  color:var(--bg);
}

/* ---------- Cases ---------- */

.cases-wrap{
  border:1.5px solid var(--border);
  border-radius:10px;
  overflow:hidden;
  margin-bottom:13px;
  background:var(--bg);
}

.cases-hd{
  display:grid;
  grid-template-columns:1fr 100px 30px;
  gap:8px;
  padding:7px 10px;
  background:var(--surface);
  font-size:11px;
  font-weight:800;
  color:var(--text);
  letter-spacing:.3px;
}

.case-row{
  display:grid;
  grid-template-columns:1fr 100px 30px;
  gap:8px;
  align-items:center;
  padding:7px 10px;
  border-top:1px solid var(--border);
}

.case-row input[type=text],
.case-row input[type=number]{
  width:100%;
  border:1.5px solid var(--border);
  border-radius:7px;
  padding:6px 8px;
  background:var(--surface);
  color:var(--text);
}

.case-row input[type=text]{
  font-family:'Sarabun',sans-serif;
  font-size:13px;
}

.case-row input[type=number]{
  font-family:'IBM Plex Mono',monospace;
  font-size:13px;
  text-align:right;
}

.case-row input:focus{
  outline:none;
  border-color:var(--accent);
  background:var(--bg);
}

.add-case-btn{
  display:flex;
  align-items:center;
  gap:6px;
  width:100%;
  border:none;
  background:transparent;
  padding:9px 10px;
  font-family:'Sarabun',sans-serif;
  font-size:13px;
  font-weight:700;
  color:var(--accent);
  cursor:pointer;
  border-top:1px solid var(--border);
}

.add-case-btn:hover{
  background:var(--surface);
}

.cases-total{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:8px 10px;
  background:var(--surface);
  border-top:1px solid var(--border);
  font-size:12px;
  font-weight:700;
  color:var(--text);
}

.cases-total .tv{
  font-family:'IBM Plex Mono',monospace;
  font-size:14px;
}

/* ---------- Deduct / Lab Boxes ---------- */

.ss-box,
.lab-box{
  border:1.5px solid var(--border);
  border-radius:10px;
  padding:12px 13px;
  margin-bottom:13px;
  background:var(--surface);
}

function hexToRgb(hex){
  const h=hex.replace('#','');
  return {r:parseInt(h.slice(0,2),16),g:parseInt(h.slice(2,4),16),b:parseInt(h.slice(4,6),16)};
}

function mixHex(hex,target,amt){
  const c1=hexToRgb(hex),c2=hexToRgb(target);
  const r=Math.round(c1.r+(c2.r-c1.r)*amt);
  const g=Math.round(c1.g+(c2.g-c1.g)*amt);
  const b=Math.round(c1.b+(c2.b-c1.b)*amt);
  return '#'+[r,g,b].map(v=>Math.max(0,Math.min(255,v)).toString(16).padStart(2,'0')).join('');
}

function loadThemeKey(){

  localStorage.setItem(THEME_KEY,key);

}

const byId=id=>clinics.find(c=>c.id===id);
const pad2=n=>String(n).padStart(2,'0');

/* ═══════════ Math ═══════════ */
function calc(e){
  const cases=e.cases||[];
  const gross=cases.reduce((s,c)=>s+(Number(c.amount)||0),0);
  const dfPct=Number(e.dfPct)||0;
  const dfIncome=Math.round(gross*dfPct/100);
  const totalCases=cases.length;
  const ssCases=Number(e.ssCaseCount)||0;
  const labTot=Number(e.labFeeTotal)||0;
  const labShare=Math.round(labTot*LAB_SPLIT_PCT/100);
  const ss=e.ssDeduct?ssCases*SS_PER_CASE:0;
  const wht=e.whtDeduct?Math.round(dfIncome*WHT_PCT/100):0;
  const net=dfIncome-ss-labShare;
  const netAfterWht=net-wht;
  return{gross,dfPct,dfIncome,totalCases,ssCases,labTot,labShare,ss,wht,net,netAfterWht};
}
function dayE(d){return entries[d]||[];}
function yearE(y){
  const out=[];
  Object.keys(entries).forEach(d=>{
    const yy=Number(d.split('-')[0]);
    if(yy===y) entries[d].forEach(e=>out.push({date:d,...e}));
  });
  return out;
}
function monthE(y,m){
  const out=[];
  Object.keys(entries).forEach(d=>{
    const[yy,mm]=d.split('-').map(Number);
    if(yy===y&&mm-1===m) entries[d].forEach(e=>out.push({date:d,...e}));
  });
  return out;
}

/* ═══════════ Calendar ═══════════ */
function renderCalendar(el){
  const y=S.y,m=S.m;
  const startDow=new Date(y,m,1).getDay();
  const dim=new Date(y,m+1,0).getDate();
  const filt=S.clinicFilter;
  const me=monthE(y,m).filter(e=>filt==='all'||e.clinicId===filt);
  const netMap={};
  me.forEach(e=>{const{net}=calc(e);netMap[e.date]=(netMap[e.date]||0)+net;});
  const maxNet=Math.max(1,...Object.values(netMap));
  const today=ds(new Date().getFullYear(),new Date().getMonth(),new Date().getDate());

  let cells='';
  for(let i=0;i<startDow;i++) cells+=`<div class="cell empty"></div>`;
  for(let d=1;d<=dim;d++){
    const date=ds(y,m,d);
    const de=dayE(date).filter(e=>filt==='all'||e.clinicId===filt);
    const net=netMap[date]||0;
    const pct=de.length?Math.max(6,Math.min(100,net/maxNet*100)):0;
    const dots=de.map(e=>{const c=byId(e.clinicId);return`<span class="cdot" style="background:${c?c.color:'#aaa'}"></span>`;}).join('');
    const isToday=date===today;
    cells+=`
      <div class="cell ${isToday?'today':''} ${de.length?'has-data':''}" data-date="${date}">
        <div class="dnum">${d}</div>
        <div class="cdots">${dots}</div>
        ${de.length?`<div class="cbar" style="width:${pct}%"></div><div class="cnet">฿${fmt(net)}</div>`:''}
      </div>`;
  }
  const total=startDow+dim;
  const rem=(7-total%7)%7;
  for(let i=0;i<rem;i++) cells+=`<div class="cell empty"></div>`;

  // Quick DF summary for the filtered set
  let qGross=0,qDf=0,qSS=0,qLab=0,qNet=0,qCases=0;
  me.forEach(e=>{
    const{gross,dfIncome,ss,labShare,net,totalCases}=calc(e);
    qGross+=gross;qDf+=dfIncome;qSS+=ss;qLab+=labShare;qNet+=net;qCases+=totalCases;
  });
  const qDays=new Set(me.map(e=>e.date)).size;

  el.innerHTML=`
    <div class="cal-wrap">
      <div class="cal-header">
        <div class="month-num">${pad2(m+1)}</div>
        <div class="month-right">
          <div class="month-name">${MN[m].toUpperCase()}.</div>
          <div class="year-label">${y+543}</div>
          <div class="mnav">
            <button id="pM"><i class="fa-solid fa-chevron-left"></i></button>
            <button id="nM"><i class="fa-solid fa-chevron-right"></i></button>
          </div>
        </div>
      </div>
      <div class="cal-grid">
        <div class="weekdays">${WD.map(w=>`<div>${w}</div>`).join('')}</div>
        <div class="daygrid">${cells}</div>
      </div>
    </div>
    <div class="clinic-filter">
      <button class="cf-chip ${filt==='all'?'active':''}" data-filt="all">ทั้งหมด</button>
      ${clinics.map(c=>`
        <button class="cf-chip ${filt===c.id?'active':''}" data-filt="${c.id}">
          <span class="cdot" style="background:${c.color}"></span>${c.name}
        </button>`).join('')}
    </div>
    <div class="quick-df">
      <div class="qd-title">${filt==='all'?'สรุป DF ทั้งเดือน':'สรุป DF · '+(byId(filt)?.name||'')}</div>
      <div class="qd-grid">
        <div class="qd-item"><span class="qd-l">Gross</span><span class="qd-v">฿${fmt(qGross)}</span></div>
        <div class="qd-item"><span class="qd-l">DF Income</span><span class="qd-v">฿${fmt(qDf)}</span></div>
        <div class="qd-item"><span class="qd-l">หักปกส./แลป</span><span class="qd-v neg">−฿${fmt(qSS+qLab)}</span></div>
        <div class="qd-item hilite"><span class="qd-l">สุทธิ</span><span class="qd-v">฿${fmt(qNet)}</span></div>
      </div>
    </div>`;
  el.querySelector('#pM').onclick=()=>shiftM(-1);
  el.querySelector('#nM').onclick=()=>shiftM(1);
  el.querySelectorAll('.cell[data-date]').forEach(c=>c.onclick=()=>{S.dayModal=c.dataset.date;renderModals();});
  el.querySelectorAll('.cf-chip').forEach(b=>b.onclick=()=>{S.clinicFilter=b.dataset.filt;renderContent();});
}
function shiftM(d){let m=S.m+d,y=S.y;if(m<0){m=11;y--;}if(m>11){m=0;y++;}S.m=m;S.y=y;renderContent();}

                ${(e.cases||[]).map((cs,i)=>`
                  <div class="case-line">
                    <span class="ca">${i+1}. ${cs.desc||'—'}</span>
                    <span class="cv">฿${fmt(cs.amount)}</span>
                  </div>`).join('')}
              </div>`:''}
            ${ss>0||labShare>0||wht>0?`
              <div class="ec-deduct">
                ${ss>0?`<span>−ปกส. ฿${fmt(ss)} (${ssCases} เคส)</span>`:''}
                ${labShare>0?`<span>−แลป ฿${fmt(labShare)}</span>`:''}
                ${wht>0?`<span>−หัก ณ ที่จ่าย ฿${fmt(wht)} (${WHT_PCT}%)</span>`:''}
              </div>`:''}
            ${e.note?`<div class="ec-note">📝 ${e.note}</div>`:''}
          </div>`;
        }).join('')}
      <div class="modal-footer">
        <button class="btn btn-ghost" id="closeDay">ปิด</button>
        <button class="btn btn-primary" id="addEntry"><i class="fa-solid fa-plus icon-inline"></i>เพิ่มรายการ</button>
      </div>
    </div>`;
  wrap.querySelector('#closeDay').onclick=()=>{S.dayModal=null;renderModals();};
  wrap.querySelector('#addEntry').onclick=()=>{S.entryEditor={date,entry:null};renderModals();};
  wrap.querySelectorAll('[data-edit]').forEach(b=>{
    b.onclick=()=>{
      const e=list.find(e=>e.id===b.dataset.edit);
      S.entryEditor={date,entry:{...e,cases:(e.cases||[]).map(c=>({...c}))}};renderModals();
    };
  });
  return wrap;
}

/* Entry editor */
function buildEntryEditor(ctx){
  const wrap=document.createElement('div');
  wrap.className='overlay';
  wrap.onclick=ev=>{if(ev.target===wrap){S.entryEditor=null;renderModals();}};
  const isNew=!ctx.entry;
  let draft=ctx.entry
    ?{...ctx.entry,cases:(ctx.entry.cases||[]).map(c=>({...c}))}
    :{id:uid(),clinicId:'',shift:'evening',dfPct:40,cases:[],ssDeduct:false,ssCaseCount:0,xrayFee:false,whtDeduct:false,labFeeTotal:0,note:''};

  function formula(){
    const{gross,dfPct,dfIncome,ssCases,ss,labShare,net}=calc(draft);
    let f=`฿${fmt(gross)} × ${dfPct}% = ฿${fmt(dfIncome)}`;
    if(ss>0)       f+=` <span class="neg">− ฿${fmt(ss)} (ปกส.×${ssCases})</span>`;
    if(labShare>0) f+=` <span class="neg">− ฿${fmt(labShare)} (แลป${LAB_SPLIT_PCT}%)</span>`;
    f+=` = <span class="pos">฿${fmt(net)}</span>`;
    return f;
  }

  function paint(){
    const{gross,dfIncome,totalCases,ssCases,ss,labShare,labTot,wht,net,netAfterWht}=calc(draft);
    const cl=byId(draft.clinicId);
    wrap.innerHTML=`
      <div class="modal">
        <div class="modal-h"><h2>${isNew?'เพิ่มรายการ':'แก้ไขรายการ'}</h2></div>
        <div class="field">
          <label>คลินิก</label>
          <select id="fClin">
            <option value=""${!draft.clinicId?' selected':''}>- เลือกคลินิก -</option>
            ${clinics.map(c=>`<option value="${c.id}"${c.id===draft.clinicId?' selected':''}>${c.name}</option>`).join('')}
          </select>
        </div>
        <div class="field">
          <label>DF % (สัดส่วนที่หมอได้)</label>
          <div style="display:flex;align-items:center;gap:10px;">
            <input type="number" id="fDF" value="${draft.dfPct||0}" min="0" max="100" style="width:90px;border:2px solid var(--blue);border-radius:9px;padding:8px 10px;font-family:'IBM Plex Mono',monospace;font-size:16px;font-weight:700;text-align:center;color:var(--blue);background:rgba(255,255,255,.05);"/>
            <span style="font-size:13px;color:var(--blue);opacity:.6;">% จาก Gross ฿${fmt(gross)} = <strong>฿${fmt(dfIncome)}</strong></span>
          </div>
        </div>
        <div class="field">
          <label>ช่วงที่ทำ</label>
          <div class="seg">
            <button type="button" data-sh="evening" class="${draft.shift==='evening'?'active':''}">🌌 ช่วงเย็น</button>
            <button type="button" data-sh="fullday"  class="${draft.shift==='fullday' ?'active':''}">☀️ ทั้งวัน</button>
          </div>
        </div>

        <div style="font-size:11px;font-weight:700;color:var(--blue);opacity:.6;margin-bottom:5px;letter-spacing:.3px;">รายการเคส</div>
        <div class="cases-wrap">
          <div class="cases-hd"><span>งานที่ทำ</span><span style="text-align:right;">ได้รับ (฿)</span><span></span></div>
          ${draft.cases.map((c,i)=>`
            <div class="case-row">
              <input type="text" class="cdesc" data-i="${i}" placeholder="เคส ${i+1}" value="${c.desc||''}"/>
              <input type="number" class="camt"  data-i="${i}" value="${c.amount||''}" placeholder="0" min="0"/>
              <button class="btn-icon" data-rm="${i}"><i class="fa-solid fa-xmark"></i></button>
            </div>`).join('')}
          ${totalCases>0?`<div class="cases-total"><span>รวม ${totalCases} เคส</span><span class="tv">฿${fmt(gross)}</span></div>`:''}
          <button class="add-case-btn" id="addCase"><i class="fa-solid fa-plus icon-inline"></i>เพิ่มเคส</button>
        </div>

        <div class="ss-box">
          <div class="ss-top">
            <div>
              <div class="ss-label">หักประกันสังคม</div>
              <div class="ss-hint">ระบุจำนวนเคสที่เป็นงาน ปกส. แยกจากเคสทั้งหมด</div>
            </div>
            <label class="switch"><input type="checkbox" id="fSS"${draft.ssDeduct?' checked':''}><span class="slider"></span></label>
          </div>
          ${draft.ssDeduct?`
            <div class="ss-count-row">
              <label>จำนวนเคส ปกส.</label>
              <input type="number" id="fSSCount" value="${draft.ssCaseCount||0}" min="0" placeholder="0"/>
              <span style="font-size:12px;color:var(--blue);opacity:.6;">เคส × ฿${SS_PER_CASE}</span>
            </div>
            ${ssCases>0?`<div class="ss-calc"><span>${ssCases} เคส × ฿${SS_PER_CASE}</span><span class="sv">−฿${fmt(ss)}</span></div>`:''}
          `:``}
        </div>

        <div class="lab-box">
          <label>ค่าแลปรวม (บาท) — หมอออก ${LAB_SPLIT_PCT}%</label>
          <input type="number" id="fLab" value="${draft.labFeeTotal||''}" placeholder="0" min="0"/>
          ${labTot>0?`<div class="lab-calc"><span>หมอออก ${LAB_SPLIT_PCT}% (คลินิก ${100-LAB_SPLIT_PCT}%)</span><span class="lv">−฿${fmt(labShare)}</span></div>`:''}
        </div>

        <div class="ss-box">
          <div class="ss-top">
            <div>
              <div class="ss-label">หัก ณ ที่จ่าย ${WHT_PCT}% (40(2))</div>
              <div class="ss-hint">คำนวณจาก DF Income — ใช้สำหรับสรุปยื่นภาษีรายปี</div>
            </div>
            <label class="switch"><input type="checkbox" id="fWht"${draft.whtDeduct?' checked':''}><span class="slider"></span></label>
          </div>
          ${draft.whtDeduct&&wht>0?`<div class="ss-calc wht-calc"><span>DF ฿${fmt(dfIncome)} × ${WHT_PCT}%</span><span class="sv">−฿${fmt(wht)}</span></div>`:''}
        </div>

        ${cl?.xrayFee?`<div style="margin-bottom:12px;"><span class="pill">📷 คลินิกนี้ได้ค่าฟิล์ม</span></div>`:''}

        <div class="field">
          <label>หมายเหตุ</label>
          <input type="text" id="fNote" value="${draft.note||''}" placeholder="เคสพิเศษ, โน้ตอื่นๆ"/>
        </div>

        <div style="font-size:12px;color:var(--blue);opacity:.55;margin-top:10px;margin-bottom:4px;font-family:'IBM Plex Mono',monospace;">
          Gross ฿${fmt(gross)} × ${draft.dfPct||0}% → DF ฿${fmt(dfIncome)}
        </div>
        <div class="net-box">
          <div class="nl">รายได้สุทธิ</div>
          <div class="nv">฿${fmt(net)}</div>
        </div>
        <div class="formula">${formula()}</div>

        <div class="modal-footer">
          ${!isNew?`<button class="btn btn-danger" id="delE">ลบ</button>`:''}
          <button class="btn btn-ghost" id="cancelE">ยกเลิก</button>
          <button class="btn btn-primary" id="saveE">บันทึก</button>
        </div>
      </div>`;
    wire();
  }

  function wire(){
    wrap.querySelector('#fClin').onchange=e=>{
      draft.clinicId=e.target.value;
      const c=byId(draft.clinicId);
      if(c && isNew){draft.dfPct=c.dfPct||40;draft.ssDeduct=!!c.ssDeduct;draft.xrayFee=!!c.xrayFee;draft.whtDeduct=!!c.whtDeduct;}
      paint();
    };
    wrap.querySelector('#fDF').oninput=e=>{draft.dfPct=e.target.value;paint();};
    wrap.querySelectorAll('[data-sh]').forEach(b=>b.onclick=()=>{draft.shift=b.dataset.sh;paint();});
    wrap.querySelectorAll('.cdesc').forEach(inp=>inp.oninput=e=>{draft.cases[+e.target.dataset.i].desc=e.target.value;});
    wrap.querySelectorAll('.camt').forEach(inp=>inp.oninput=e=>{draft.cases[+e.target.dataset.i].amount=e.target.value;refreshNet();});
    wrap.querySelectorAll('[data-rm]').forEach(b=>b.onclick=()=>{draft.cases.splice(+b.dataset.rm,1);paint();});
    wrap.querySelector('#addCase').onclick=()=>{draft.cases.push({id:uid(),desc:'',amount:''});paint();};
    wrap.querySelector('#fSS').onchange=e=>{draft.ssDeduct=e.target.checked;paint();};
    wrap.querySelector('#fWht').onchange=e=>{draft.whtDeduct=e.target.checked;paint();};
    const ssc=wrap.querySelector('#fSSCount');if(ssc) ssc.oninput=e=>{draft.ssCaseCount=e.target.value;refreshNet();};
    wrap.querySelector('#fLab').oninput=e=>{draft.labFeeTotal=e.target.value;refreshNet();};
    wrap.querySelector('#fNote').oninput=e=>{draft.note=e.target.value;};
    wrap.querySelector('#cancelE').onclick=()=>{S.entryEditor=null;renderModals();};
    wrap.querySelector('#saveE').onclick=save;
    const del=wrap.querySelector('#delE');if(del) del.onclick=del2;
  }

  function refreshNet(){
    const{gross,dfIncome,totalCases,ssCases,ss,labShare,labTot,wht,net,netAfterWht}=calc(draft);
    const nv=wrap.querySelector('.nv');if(nv) nv.textContent=`฿${fmt(net)}`;
    const fo=wrap.querySelector('.formula');if(fo) fo.innerHTML=formula();
    const ct=wrap.querySelector('.cases-total');
    if(ct) ct.innerHTML=`<span>รวม ${totalCases} เคส</span><span class="tv">฿${fmt(gross)}</span>`;
    const sc=wrap.querySelector('.ss-calc:not(.wht-calc)');
    if(sc) sc.innerHTML=`<span>${ssCases} เคส × ฿${SS_PER_CASE}</span><span class="sv">−฿${fmt(ss)}</span>`;
    const lc=wrap.querySelector('.lab-calc');
    if(lc) lc.innerHTML=`<span>หมอออก ${LAB_SPLIT_PCT}% (คลินิก ${100-LAB_SPLIT_PCT}%)</span><span class="lv">−฿${fmt(labShare)}</span>`;
    const wc=wrap.querySelector('.wht-calc');
    if(wc) wc.innerHTML=`<span>DF ฿${fmt(dfIncome)} × ${WHT_PCT}%</span><span class="sv">−฿${fmt(wht)}</span>`;
  }

  function save(){
    if(!draft.clinicId){alert('กรุณาเลือกคลินิก');return;}
    const clean={...draft,cases:draft.cases.map(c=>({...c,amount:Number(c.amount)||0})),dfPct:Number(draft.dfPct)||0,labFeeTotal:Number(draft.labFeeTotal)||0,ssCaseCount:Number(draft.ssCaseCount)||0};
    const list=entries[ctx.date]||[];
    const idx=list.findIndex(e=>e.id===clean.id);
    if(idx>=0) list[idx]=clean; else list.push(clean);
    const newEntries={...entries,[ctx.date]:list};
    saveE(newEntries);S.entryEditor=null;renderModals();renderContent();
  }
  function del2(){
    if(!confirm('ลบรายการนี้?')) return;
    const newEntries={...entries};
    newEntries[ctx.date]=(newEntries[ctx.date]||[]).filter(e=>e.id!==draft.id);
    if(!newEntries[ctx.date].length) delete newEntries[ctx.date];
    saveE(newEntries);S.entryEditor=null;renderModals();renderContent();
  }
  paint(); return wrap;
}

/* Clinic editor */
function buildClinicEditor(c){
  const wrap=document.createElement('div');
  wrap.className='overlay';
  wrap.onclick=ev=>{if(ev.target===wrap){S.clinicEditor=null;renderModals();}};
  let d={...c};const isNew=!d.id;
  function paint(){
    wrap.innerHTML=`
      <div class="modal">
        <div class="modal-h"><h2>${isNew?'เพิ่มคลินิก':'แก้ไขคลินิก'}</h2></div>
        <div class="field"><label>ชื่อคลินิก</label><input type="text" id="cN" value="${d.name}" placeholder="ชื่อคลินิก"/></div>
        <div class="field">
          <label>DF % ของคลินิกนี้ (ค่าตั้งต้น)</label>
          <div style="display:flex;align-items:center;gap:10px;">
            <input type="number" id="cDF" value="${d.dfPct||0}" min="0" max="100" style="width:90px;border:2px solid var(--blue);border-radius:9px;padding:8px 10px;font-family:'IBM Plex Mono',monospace;font-size:16px;font-weight:700;text-align:center;color:var(--blue);background:rgba(255,255,255,.05);"/>
            <span style="font-size:12px;color:var(--blue);opacity:.6;">% จาก Gross — ปรับได้ทีละรายการ</span>
          </div>
        </div>
        <div class="field">
          <label>สีประจำคลินิก</label>
          <div style="display:flex;gap:7px;flex-wrap:wrap;margin-top:2px;">
            ${PAL.map(p=>`<div data-col="${p}" style="width:32px;height:32px;border-radius:8px;background:${p};cursor:pointer;border:3px solid ${d.color===p?'var(--blue)':'transparent'};transition:.1s;"></div>`).join('')}
          </div>
        </div>
        <div class="ss-box" style="margin-bottom:10px;">
          <div class="ss-top">
            <div><div class="ss-label">หักปกส. เป็นค่าตั้งต้น</div><div class="ss-hint">฿${SS_PER_CASE} × เคส ปกส. — ปรับได้ทีละวัน</div></div>
            <label class="switch"><input type="checkbox" id="cSS"${d.ssDeduct?' checked':''}><span class="slider"></span></label>
          </div>
        </div>
        <div class="ss-box">
          <div class="ss-top">
            <div><div class="ss-label">ได้ค่าฟิล์มเอ็กซเรย์</div><div class="ss-hint">บันทึกเป็นข้อมูล ไม่นำไปคำนวณ</div></div>
            <label class="switch"><input type="checkbox" id="cXr"${d.xrayFee?' checked':''}><span class="slider"></span></label>
          </div>
        </div>
        <div class="ss-box">
          <div class="ss-top">
            <div><div class="ss-label">หัก ณ ที่จ่าย ${WHT_PCT}% (เงินได้ 40(2))</div><div class="ss-hint">คลินิกนี้หักภาษี ณ ที่จ่ายจาก DF Income หรือไม่ — ใช้สำหรับสรุปยื่นภาษี</div></div>
            <label class="switch"><input type="checkbox" id="cWht"${d.whtDeduct?' checked':''}><span class="slider"></span></label>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-ghost" id="cancelC">ยกเลิก</button>
          <button class="btn btn-primary" id="saveC">บันทึก</button>
        </div>
      </div>`;
    wrap.querySelectorAll('[data-col]').forEach(el=>el.onclick=()=>{d.color=el.dataset.col;paint();});
    wrap.querySelector('#cN').oninput=e=>d.name=e.target.value;
    wrap.querySelector('#cDF').oninput=e=>d.dfPct=Number(e.target.value)||0;
    wrap.querySelector('#cSS').onchange=e=>d.ssDeduct=e.target.checked;
    wrap.querySelector('#cXr').onchange=e=>d.xrayFee=e.target.checked;
    wrap.querySelector('#cWht').onchange=e=>d.whtDeduct=e.target.checked;
    wrap.querySelector('#cancelC').onclick=()=>{S.clinicEditor=null;renderModals();};
    wrap.querySelector('#saveC').onclick=()=>{
      if(!d.name.trim()){alert('กรุณาใส่ชื่อคลินิก');return;}
      const clean={...d,id:d.id||uid()};
      const idx=clinics.findIndex(c=>c.id===clean.id);
      let newList;
      if(idx>=0){ newList=[...clinics]; newList[idx]=clean; }
      else{ newList=[...clinics, clean]; }
      saveC(newList);S.clinicEditor=null;renderModals();renderContent();
    };
  }
  paint(); return wrap;
}
</script>
</body>
