<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DF Tracker · Round 3 Calendar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  /* DF Tracker v2 theme tokens */
  --bg:#F5EFE6;
  --surface:#EFE5D7;
  --surface2:#E7DAC7;
  --surface-hover:#EADCCA;
  --surface-active:#E2D0BA;

  --text:#14353C;
  --text-soft:#577579;
  --text-muted:#8EA2A4;
  --text-inverse:#F5EFE6;

  --accent:#E67C49;
  --accent-hover:#D86B39;
  --accent-soft:#F5C6AA;
  --highlight:#6D9194;

  --success:#49756B;
  --success-soft:#DCEAE4;
  --warning:#C7973E;
  --warning-soft:#F2DEB6;
  --danger:#B7523E;
  --danger-soft:rgba(183,82,62,.14);

  --border:#D8C7B3;
  --border-soft:rgba(20,53,60,.14);
  --shadow:0 12px 36px rgba(20,53,60,.14);
  --overlay:rgba(20,53,60,.45);

  /* backwards compatibility with old CSS */
  --blue:var(--accent);
  --blue-dk:var(--accent-hover);
  --blue-lt:var(--accent-soft);
  --cream:var(--bg);
  --cream-dk:var(--surface);
  --cream-dk2:var(--surface2);
  --red:var(--danger);
  --red-lt:var(--danger-soft);
  --green:var(--success);
  --green-lt:var(--success-soft);
  --gold:var(--warning);
  --r:12px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{background:var(--cream);}
body{font-family:'Sarabun',sans-serif;background:var(--cream);color:var(--blue);min-height:100vh;}
#app{max-width:960px;margin:0 auto;padding:20px 16px 60px;}

.login-screen{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:22px;padding:20px;text-align:center;
}
.login-screen .mark-big{
  width:76px;height:76px;border-radius:18px;background:var(--blue);color:var(--cream);
  display:flex;align-items:center;justify-content:center;font-weight:800;
  font-family:'IBM Plex Mono',monospace;font-size:22px;
}
.login-screen h1{color:var(--blue);font-size:24px;font-weight:800;letter-spacing:.5px;}
.login-screen p{color:rgba(237,234,217,.7);font-size:13px;max-width:280px;}
.gbtn{
  display:flex;align-items:center;gap:10px;background:#F3F1E9;color:#202124;
  border:none;border-radius:12px;padding:13px 22px;font-family:'Sarabun',sans-serif;
  font-size:15px;font-weight:700;cursor:pointer;transition:.15s;box-shadow:0 4px 14px rgba(0,0,0,.15);
}
.gbtn:hover{background:#fff;}
.gbtn svg{width:20px;height:20px;flex-shrink:0;}
.login-err{color:#FFB4B4;font-size:12px;max-width:280px;}
.loading-screen{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  color:var(--blue);font-size:14px;font-weight:700;opacity:.7;
}

.topbar{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:20px;gap:12px;flex-wrap:wrap;
}
.brand{display:flex;align-items:center;gap:10px;}
.brand .mark{
  width:40px;height:40px;border-radius:10px;
  background:var(--blue);color:var(--cream);
  display:flex;align-items:center;justify-content:center;
  font-weight:800;font-family:'IBM Plex Mono',monospace;font-size:13px;flex-shrink:0;
}
.brand h1{font-size:18px;font-weight:800;color:var(--blue);letter-spacing:.5px;}
.brand .sub{font-size:11px;color:rgba(237,234,217,.6);margin-top:1px;}
nav.tabs{display:flex;gap:4px;background:rgba(237,234,217,.15);border-radius:999px;padding:4px;}
nav.tabs button{
  border:none;background:transparent;padding:8px 16px;border-radius:999px;
  font-family:'Sarabun',sans-serif;font-size:13px;font-weight:700;
  color:rgba(237,234,217,.7);cursor:pointer;transition:.15s;white-space:nowrap;
}
nav.tabs button.active{background:var(--blue);color:var(--cream);}

.user-chip{display:flex;align-items:center;gap:8px;}
.user-chip img{width:30px;height:30px;border-radius:50%;border:2px solid var(--blue);}
.user-chip .uname{color:var(--blue);font-size:12px;font-weight:700;max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#7CE0A8;flex-shrink:0;}
.sync-dot.saving{background:#F2C14E;}

/* Settings gear + dropdown panel (theme picker + logout) */
.settings-wrap{position:relative;display:flex;align-items:center;}
.gear-btn{
  width:30px;height:30px;border-radius:8px;border:none;flex-shrink:0;
  background:rgba(237,234,217,.15);color:var(--blue);font-size:15px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s;
}
.gear-btn:hover{background:rgba(237,234,217,.28);}
.settings-panel{
  position:absolute;top:calc(100% + 10px);right:0;z-index:60;
  width:280px;background:var(--surface);border:1px solid var(--border);
  border-radius:16px;padding:14px;box-shadow:var(--shadow);
}
.settings-panel-title{font-size:11px;font-weight:800;color:var(--text-soft);letter-spacing:.3px;margin-bottom:8px;}
.theme-list{display:flex;flex-direction:column;gap:7px;max-height:340px;overflow-y:auto;padding-right:2px;}
.theme-btn{
  display:flex;align-items:center;justify-content:space-between;gap:10px;
  width:100%;border:1.5px solid var(--border);border-radius:12px;
  padding:10px 12px;cursor:pointer;font-family:'Sarabun',sans-serif;
  font-size:13px;font-weight:800;transition:.15s;text-align:left;
  box-shadow:0 1px 0 rgba(255,255,255,.18) inset;
}
.theme-btn:hover{transform:translateY(-1px);filter:saturate(1.08);}
.theme-btn.active{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-soft);}
.theme-dots{display:flex;gap:5px;flex-shrink:0;}
.theme-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0;border:1.5px solid rgba(255,255,255,.55);}
.settings-divider{height:1px;background:var(--border);margin:12px 0;}


/* ═══════════ Round 3 · Premium Calendar ═══════════ */
.cal-wrap{
  background:linear-gradient(180deg,var(--surface),var(--surface2));
  border:1px solid var(--border);
  border-radius:24px;
  overflow:hidden;
  box-shadow:var(--shadow);
}
.cal-header{
  display:flex;align-items:flex-end;justify-content:space-between;
  padding:26px 28px 22px;
  border-bottom:1px solid var(--border);
  background:
    radial-gradient(circle at 12% 12%, var(--accent-soft), transparent 34%),
    linear-gradient(135deg,var(--surface),var(--surface2));
}
.cal-header .month-num{
  font-size:clamp(72px,12vw,118px);font-weight:800;line-height:.92;
  font-family:'IBM Plex Mono',monospace;
  color:transparent;-webkit-text-stroke:2px var(--accent);
  letter-spacing:-6px;flex-shrink:0;
  opacity:.95;
  filter:drop-shadow(0 6px 18px rgba(0,0,0,.08));
}
.cal-header .month-right{text-align:right;display:flex;flex-direction:column;align-items:flex-end;gap:3px;}
.cal-header .month-name{
  font-size:clamp(23px,4vw,40px);font-weight:800;color:var(--text);
  letter-spacing:.8px;line-height:1.05;
}
.cal-header .year-label{font-size:clamp(14px,2.5vw,20px);color:var(--text-soft);margin-top:1px;font-weight:700;}
.mnav{display:flex;gap:8px;margin-top:12px;justify-content:flex-end;}
.mnav button{
  width:34px;height:34px;border-radius:999px;border:1px solid var(--border);
  background:var(--surface);color:var(--text);font-size:16px;font-weight:800;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:.18s ease;
  box-shadow:0 4px 14px rgba(0,0,0,.06);
}
.mnav button:hover{background:var(--accent);border-color:var(--accent);color:var(--text-inverse);transform:translateY(-1px);}
.mnav button:active{transform:translateY(0) scale(.97);}
.cal-grid{padding:0;background:var(--surface);}
.weekdays{
  display:grid;grid-template-columns:repeat(7,1fr);
  border-bottom:1px solid var(--border);
  background:var(--surface2);
}
.weekdays div{
  text-align:center;font-size:11px;font-weight:800;
  color:var(--text-soft);padding:10px 4px;letter-spacing:.6px;
  border-right:1px solid var(--border-soft);
  text-transform:uppercase;
}
.weekdays div:last-child{border-right:none;}
.daygrid{display:grid;grid-template-columns:repeat(7,1fr);background:var(--border-soft);gap:1px;}
.cell{
  min-height:88px;padding:8px 9px 8px;cursor:pointer;
  position:relative;transition:.18s ease;
  background:var(--surface);
  border:none;
  overflow:hidden;
}
.cell:before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,.12),transparent 42%);
  opacity:0;transition:.18s ease;pointer-events:none;
}
.cell:hover{background:var(--surface-hover);transform:translateY(-1px);z-index:1;box-shadow:0 8px 24px rgba(0,0,0,.08);}
.cell:hover:before{opacity:1;}
.cell.empty{cursor:default;background:color-mix(in srgb,var(--surface2) 70%,var(--bg));opacity:.62;}
.cell.empty:hover{background:color-mix(in srgb,var(--surface2) 70%,var(--bg));transform:none;box-shadow:none;}
.cell .dnum{font-size:13px;font-weight:800;color:var(--text-muted);text-align:right;opacity:.75;position:relative;z-index:2;}
.cell.has-data .dnum{color:var(--text);opacity:1;}
.cell.today{
  background:linear-gradient(135deg,var(--accent),var(--highlight));
  color:var(--text-inverse);
  box-shadow:inset 0 0 0 1px rgba(255,255,255,.18);
}
.cell.today:after{
  content:'TODAY';position:absolute;left:8px;top:8px;
  font-family:'IBM Plex Mono',monospace;font-size:8px;font-weight:800;letter-spacing:.7px;
  color:rgba(255,255,255,.74);
}
.cell.today .dnum{color:var(--text-inverse);opacity:1;}
.cell.today:hover{filter:saturate(1.04) brightness(1.02);}
.cell .cdots{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px;position:relative;z-index:2;}
.cdot{width:7px;height:7px;border-radius:50%;box-shadow:0 0 0 1px rgba(0,0,0,.08);}
.cell.today .cdot{outline:1px solid rgba(255,255,255,.55);box-shadow:none;}
.cell .cnet{
  position:absolute;bottom:9px;left:8px;right:8px;
  font-size:10px;font-family:'IBM Plex Mono',monospace;font-weight:800;
  color:var(--text);text-align:right;z-index:2;
}
.cell.today .cnet{color:var(--text-inverse);}
.cell .cbar{
  position:absolute;left:0;bottom:0;height:4px;
  background:linear-gradient(90deg,var(--accent),var(--highlight));
  transform-origin:left;opacity:.75;border-radius:0 999px 0 0;
}
.cell.today .cbar{background:rgba(255,255,255,.72);opacity:.9;}

/* Round 3 · Calendar filters */
.clinic-filter{
  display:flex;gap:7px;flex-wrap:wrap;margin-top:14px;
}
.cf-chip{
  display:flex;align-items:center;gap:7px;
  border:1px solid var(--border);border-radius:999px;padding:8px 14px;
  background:var(--surface);color:var(--text-soft);
  font-family:'Sarabun',sans-serif;font-size:12px;font-weight:800;
  cursor:pointer;transition:.18s ease;box-shadow:0 4px 14px rgba(0,0,0,.04);
}
.cf-chip:hover{background:var(--surface-hover);color:var(--text);transform:translateY(-1px);}
.cf-chip.active{background:var(--accent);border-color:var(--accent);color:var(--text-inverse);}
.cf-chip .cdot{width:8px;height:8px;}
.cf-chip.active .cdot{outline:1px solid rgba(255,255,255,.55);}

/* Round 3 · Quick DF summary strip */
.quick-df{
  background:var(--surface);border:1px solid var(--border);
  border-radius:20px;padding:17px 18px;margin-top:14px;
  box-shadow:0 8px 24px rgba(0,0,0,.06);
}
.qd-title{font-size:12px;font-weight:900;color:var(--text-soft);letter-spacing:.35px;margin-bottom:11px;}
.qd-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(112px,1fr));gap:9px;}
.qd-item{
  display:flex;flex-direction:column;gap:4px;
  border:1px solid var(--border-soft);border-radius:14px;padding:11px 12px;
  background:var(--surface2);transition:.18s ease;
}
.qd-item:hover{background:var(--surface-hover);transform:translateY(-1px);}
.qd-item.hilite{background:linear-gradient(135deg,var(--accent),var(--highlight));border-color:transparent;box-shadow:0 8px 20px rgba(0,0,0,.10);}
.qd-item.hilite .qd-l{color:rgba(255,255,255,.75);}
.qd-item.hilite .qd-v{color:var(--text-inverse);}
.qd-l{font-size:10px;font-weight:800;color:var(--text-muted);letter-spacing:.35px;}
.qd-v{font-family:'IBM Plex Mono',monospace;font-size:16px;font-weight:900;color:var(--text);}
.qd-v.neg{color:var(--danger);}

.card{background:var(--cream);border-radius:18px;padding:20px 22px;margin-bottom:14px;}

/* Clinic filter chips (calendar tab) */
.clinic-filter{
  display:flex;gap:6px;flex-wrap:wrap;margin-top:12px;
}
.cf-chip{
  display:flex;align-items:center;gap:6px;
  border:none;border-radius:999px;padding:7px 13px;
  background:rgba(237,234,217,.16);color:var(--blue);
  font-family:'Sarabun',sans-serif;font-size:12px;font-weight:700;
  cursor:pointer;transition:.15s;
}
.cf-chip:hover{background:rgba(237,234,217,.28);}
.cf-chip.active{background:var(--blue);color:var(--cream);}
.cf-chip .cdot{width:7px;height:7px;}

/* Quick DF summary strip below calendar */
.quick-df{
  background:var(--cream);border-radius:16px;padding:16px 18px;margin-top:12px;
}
.qd-title{font-size:12px;font-weight:800;color:var(--blue);opacity:.6;letter-spacing:.3px;margin-bottom:10px;}
.qd-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:8px;}
.qd-item{
  display:flex;flex-direction:column;gap:3px;
  border:1.5px solid rgba(255,255,255,.2);border-radius:10px;padding:9px 11px;
}
.qd-item.hilite{background:var(--blue);border-color:var(--blue);}
.qd-item.hilite .qd-l{color:rgba(237,234,217,.7);}
.qd-item.hilite .qd-v{color:var(--cream);}
.qd-l{font-size:10px;font-weight:700;color:var(--blue);opacity:.55;letter-spacing:.3px;}
.qd-v{font-family:'IBM Plex Mono',monospace;font-size:15px;font-weight:800;color:var(--blue);}
.qd-v.neg{color:var(--red);}

.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:16px;}
.stat{border:2px solid var(--blue);border-radius:12px;padding:13px 14px;background:var(--cream);}
.stat .sl{font-size:11px;font-weight:700;color:var(--blue);opacity:.6;margin-bottom:5px;letter-spacing:.3px;}
.stat .sv{font-size:19px;font-weight:800;color:var(--blue);font-family:'IBM Plex Mono',monospace;}
.stat.hilite{background:var(--blue);}
.stat.hilite .sl{color:var(--cream);}
.stat.hilite .sv{color:var(--cream);}
.stat.deduct .sv{color:var(--red);}

.sec-title{
  display:flex;align-items:center;gap:8px;
  font-size:13px;font-weight:800;color:var(--blue);
  margin:20px 0 10px;letter-spacing:.3px;
}
.sec-title .badge{
  font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:700;
  background:rgba(237,234,217,.2);color:var(--blue);padding:3px 8px;border-radius:6px;
}
.tax-note{
  background:rgba(237,234,217,.15);border:1px solid rgba(237,234,217,.3);
  border-radius:12px;padding:12px 14px;margin-bottom:16px;
  font-size:12px;color:var(--blue);line-height:1.6;
}
.tax-note strong{color:var(--blue);}

table{width:100%;border-collapse:collapse;background:var(--cream);border-radius:12px;overflow:hidden;border:2px solid var(--blue);}
th,td{padding:9px 12px;text-align:left;font-size:12px;border-bottom:1px solid rgba(255,255,255,.15);}
th{background:var(--blue);color:var(--cream);font-weight:700;font-size:11px;letter-spacing:.3px;}
tr:last-child td{border-bottom:none;}
td.r,th.r{text-align:right;font-family:'IBM Plex Mono',monospace;}
td.net-col{font-weight:800;color:var(--blue);}

.clist{display:flex;flex-direction:column;gap:8px;}
.ccard{
  border:2px solid var(--blue);border-radius:12px;padding:13px 15px;background:var(--cream);
  display:flex;justify-content:space-between;align-items:flex-start;gap:10px;flex-wrap:wrap;
}
.ccard .cn{display:flex;align-items:center;gap:7px;font-weight:800;font-size:15px;color:var(--blue);}
.swatch{width:12px;height:12px;border-radius:3px;flex-shrink:0;display:inline-block;}
.pills{display:flex;flex-wrap:wrap;gap:5px;margin-top:7px;}
.pill{font-size:11px;padding:3px 9px;border-radius:999px;border:1.5px solid var(--blue);color:var(--blue);font-weight:600;}
.pill.off{opacity:.4;}
.const-banner{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;}
.cbadge{
  font-size:11px;font-weight:700;font-family:'IBM Plex Mono',monospace;
  background:rgba(237,234,217,.18);color:var(--cream);padding:5px 12px;
  border-radius:8px;border:1px solid rgba(237,234,217,.3);
}

.btn{border:none;border-radius:9px;padding:9px 16px;font-family:'Sarabun',sans-serif;font-weight:700;font-size:13px;cursor:pointer;transition:.15s;}
.btn-primary{background:var(--blue);color:var(--cream);}
.btn-primary:hover{background:var(--blue-dk);}
.btn-ghost{background:transparent;border:2px solid var(--blue);color:var(--blue);}
.btn-ghost:hover{background:var(--blue-lt);}
.btn-danger{background:transparent;border:2px solid var(--red);color:var(--red);}
.btn-danger:hover{background:var(--red-lt);}
.btn-sm{padding:5px 10px;font-size:12px;}
.btn-icon{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;border:1.5px solid rgba(255,255,255,.3);background:transparent;cursor:pointer;color:var(--blue);transition:.1s;}
.btn-icon:hover{border-color:var(--red);color:var(--red);background:var(--red-lt);}
.add-row{display:flex;justify-content:flex-end;margin-top:12px;}

.overlay{
  position:fixed;inset:0;background:rgba(12,12,100,.55);
  display:flex;align-items:flex-end;justify-content:center;z-index:50;
}
@media(min-width:600px){.overlay{align-items:center;padding:20px;}}
.modal{
  background:var(--cream);border-radius:18px 18px 0 0;
  max-width:500px;width:100%;max-height:92vh;overflow-y:auto;
  padding:22px 20px 28px;
}
@media(min-width:600px){.modal{border-radius:16px;}}
.modal-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.modal-h h2{font-size:18px;font-weight:800;color:var(--blue);}

.field{margin-bottom:13px;}
.field label{display:block;font-size:11px;font-weight:700;color:var(--blue);opacity:.6;margin-bottom:5px;letter-spacing:.3px;}
.field input,.field select{
  width:100%;border:2px solid rgba(255,255,255,.3);border-radius:9px;
  padding:9px 11px;font-family:'Sarabun',sans-serif;font-size:14px;
  background:rgba(255,255,255,.05);color:var(--blue);
}
.field input:focus,.field select:focus{outline:none;border-color:var(--blue);}
.seg{display:flex;border:2px solid var(--blue);border-radius:9px;overflow:hidden;}
.seg button{
  flex:1;border:none;background:transparent;padding:9px;
  font-family:'Sarabun',sans-serif;font-size:13px;font-weight:700;
  cursor:pointer;color:var(--blue);transition:.12s;
}
.seg button.active{background:var(--blue);color:var(--cream);}

.cases-wrap{border:2px solid var(--blue);border-radius:10px;overflow:hidden;margin-bottom:13px;}
.cases-hd{
  display:grid;grid-template-columns:1fr 100px 30px;gap:8px;
  padding:7px 10px;background:var(--blue);
  font-size:11px;font-weight:700;color:var(--cream);letter-spacing:.3px;
}
.case-row{
  display:grid;grid-template-columns:1fr 100px 30px;gap:8px;align-items:center;
  padding:7px 10px;border-top:1px solid rgba(255,255,255,.15);
}
.case-row input[type=text]{
  width:100%;border:1.5px solid rgba(255,255,255,.25);border-radius:7px;
  padding:6px 8px;font-family:'Sarabun',sans-serif;font-size:13px;
  background:rgba(255,255,255,.05);color:var(--blue);
}
.case-row input[type=number]{
  width:100%;border:1.5px solid rgba(255,255,255,.25);border-radius:7px;
  padding:6px 8px;font-family:'IBM Plex Mono',monospace;font-size:13px;
  text-align:right;background:rgba(255,255,255,.05);color:var(--blue);
}
.case-row input:focus{outline:none;border-color:var(--blue);}
.add-case-btn{
  display:flex;align-items:center;gap:6px;width:100%;border:none;background:transparent;

}
.add-case-btn:hover{background:var(--blue-lt);}
.cases-total{
  display:flex;justify-content:space-between;align-items:center;

}
.cases-total .tv{font-family:'IBM Plex Mono',monospace;font-size:14px;}

.ss-box{border:2px solid var(--blue);border-radius:10px;padding:12px 13px;margin-bottom:13px;}

.ss-label{font-size:13px;font-weight:700;color:var(--blue);}
.ss-hint{font-size:11px;color:var(--blue);opacity:.55;margin-top:2px;}
.ss-count-row{display:flex;align-items:center;gap:10px;margin-top:10px;}
.ss-count-row label{font-size:12px;font-weight:700;color:var(--blue);white-space:nowrap;}
.ss-count-row input{
  width:80px;border:2px solid var(--blue);border-radius:7px;
  padding:6px 8px;font-family:'IBM Plex Mono',monospace;font-size:14px;
  font-weight:700;text-align:center;color:var(--blue);background:rgba(255,255,255,.05);
}
.ss-count-row input:focus{outline:none;}
.ss-calc{
  margin-top:8px;padding:8px 10px;background:var(--red-lt);border-radius:8px;
  display:flex;align-items:center;justify-content:space-between;
  font-size:12px;font-weight:700;color:var(--red);
}
.ss-calc .sv{font-family:'IBM Plex Mono',monospace;font-size:15px;}

.lab-box{border:2px solid var(--blue);border-radius:10px;padding:12px 13px;margin-bottom:13px;}

.lab-box input{
  width:100%;border:2px solid rgba(255,255,255,.3);border-radius:8px;
  padding:8px 10px;font-family:'IBM Plex Mono',monospace;font-size:14px;
  background:rgba(255,255,255,.05);color:var(--blue);
}
.lab-box input:focus{outline:none;border-color:var(--blue);}
.lab-calc{
  margin-top:8px;padding:8px 10px;background:var(--red-lt);border-radius:8px;
  display:flex;align-items:center;justify-content:space-between;
  font-size:12px;font-weight:700;color:var(--red);
}
.lab-calc .lv{font-family:'IBM Plex Mono',monospace;font-size:15px;}

.switch{position:relative;width:40px;height:22px;flex-shrink:0;}
.switch input{opacity:0;width:0;height:0;}
.slider{position:absolute;inset:0;background:rgba(255,255,255,.18);border-radius:999px;cursor:pointer;transition:.15s;}
.slider:before{content:'';position:absolute;width:16px;height:16px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.15s;}
input:checked+.slider{background:var(--blue);}
input:checked+.slider:before{transform:translateX(18px);}

.net-box{
  background:var(--blue);border-radius:12px;padding:14px 16px;margin-top:10px;
  display:flex;justify-content:space-between;align-items:center;
}
.net-box .nl{font-size:13px;font-weight:700;color:rgba(237,234,217,.7);}
.net-box .nv{font-family:'IBM Plex Mono',monospace;font-size:24px;font-weight:800;color:var(--cream);}
.formula{font-size:11px;color:var(--blue);opacity:.6;margin-top:6px;font-family:'IBM Plex Mono',monospace;padding:0 2px;}
.formula .neg{color:var(--red);opacity:1;}
.formula .pos{color:var(--green);opacity:1;}

.modal-footer{display:flex;gap:8px;margin-top:16px;}
.modal-footer .btn{flex:1;}

.entry-card{border:2px solid var(--blue);border-radius:10px;padding:12px 13px;margin-bottom:8px;}
.ec-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;}
.ec-name{display:flex;align-items:center;gap:6px;font-weight:800;font-size:14px;color:var(--blue);}
.ec-meta{font-size:11px;color:var(--blue);opacity:.55;margin-top:3px;}
.ec-net{font-family:'IBM Plex Mono',monospace;font-weight:800;font-size:17px;color:var(--blue);white-space:nowrap;}
.ec-cases{margin-top:9px;border-top:1px solid rgba(255,255,255,.15);padding-top:7px;}
.case-line{display:flex;justify-content:space-between;font-size:12px;padding:3px 0;border-bottom:1px dashed rgba(255,255,255,.15);}
.case-line:last-child{border-bottom:none;}
.case-line .ca{color:var(--blue);}
.case-line .cv{font-family:'IBM Plex Mono',monospace;font-weight:600;color:var(--blue);}
.ec-deduct{margin-top:6px;font-size:11px;color:var(--red);display:flex;gap:10px;flex-wrap:wrap;}
.ec-note{margin-top:7px;font-size:12px;color:var(--blue);opacity:.6;border-top:1px solid rgba(255,255,255,.15);padding-top:6px;font-style:italic;}

.empty-state{text-align:center;color:var(--blue);opacity:.6;font-size:13px;padding:32px 10px;}
.empty-state .big{font-size:30px;margin-bottom:6px;opacity:1;}
.empty-state-cream{text-align:center;color:var(--blue);opacity:.5;font-size:13px;padding:28px 10px;}
.empty-state-cream .big{font-size:28px;margin-bottom:6px;opacity:.7;}

@media(max-width:520px){
  .cal-header{padding:18px 18px 14px;}

  .cal-header .month-name{font-size:22px;}

function hexToRgb(hex){
  const h=String(hex||'#000000').replace('#','');
  return {r:parseInt(h.slice(0,2),16),g:parseInt(h.slice(2,4),16),b:parseInt(h.slice(4,6),16)};
}
function mixHex(hex,target,amt){
  const c1=hexToRgb(hex),c2=hexToRgb(target);
  const r=Math.round(c1.r+(c2.r-c1.r)*amt);
  const g=Math.round(c1.g+(c2.g-c1.g)*amt);
  const b=Math.round(c1.b+(c2.b-c1.b)*amt);
  return '#'+[r,g,b].map(v=>Math.max(0,Math.min(255,v)).toString(16).padStart(2,'0')).join('');
}
function alphaHex(hex,alpha){
  const {r,g,b}=hexToRgb(hex);
  return `rgba(${r},${g},${b},${alpha})`;
}
function contrastText(bg){
  const {r,g,b}=hexToRgb(bg);
  const lum=(0.2126*r+0.7152*g+0.0722*b)/255;
  return lum>0.58 ? '#111827' : '#FFFFFF';
}
function themeSoft(th,color,amt=.78){
  return mixHex(color, th.bg, amt);
}
function loadThemeKey(){
  const saved=localStorage.getItem(THEME_KEY);
  return (saved && THEMES[saved]) ? saved : 'terrazzo';
}
function applyTheme(key){
  const th=THEMES[key]||THEMES.terrazzo;
  const root=document.documentElement.style;
  const tokens={
    '--bg':th.bg,
    '--surface':th.surface,
    '--surface2':th.surface2,
    '--surface-hover':mixHex(th.surface, th.accent, .08),
    '--surface-active':mixHex(th.surface2, th.accent, .12),
    '--text':th.text,
    '--text-soft':th.textSoft,
    '--text-muted':th.textMuted,
    '--text-inverse':contrastText(th.accent),
    '--accent':th.accent,
    '--accent-hover':mixHex(th.accent,'#000000',0.16),
    '--accent-soft':themeSoft(th,th.accent,.78),
    '--highlight':th.highlight,
    '--success':th.success,
    '--success-soft':themeSoft(th,th.success,.84),
    '--warning':th.warning,
    '--warning-soft':themeSoft(th,th.warning,.82),
    '--danger':th.danger,
    '--danger-soft':alphaHex(th.danger,.14),
    '--border':th.border,
    '--border-soft':alphaHex(th.text,.14),
    '--shadow':`0 12px 36px ${th.shadow||alphaHex(th.text,.14)}`,
    '--overlay':alphaHex(th.text,.45),

    // compatibility vars used by old CSS during migration
    '--blue':th.accent,
    '--blue-dk':mixHex(th.accent,'#000000',0.16),
    '--blue-lt':themeSoft(th,th.accent,.78),
    '--cream':th.bg,
    '--cream-dk':th.surface,
    '--cream-dk2':th.surface2,
    '--red':th.danger,
    '--red-lt':alphaHex(th.danger,.14),
    '--green':th.success,
    '--green-lt':themeSoft(th,th.success,.84),
    '--gold':th.warning
  };
  Object.entries(tokens).forEach(([k,v])=>root.setProperty(k,v));
  localStorage.setItem(THEME_KEY,key);
  if(typeof S!=='undefined') S.themeKey=key;
}

  }catch(err){

  }
}

function startListening(uidVal){
  clinicsLoaded=false; entriesLoaded=false;
  unsubClinics = onSnapshot(clinicsDocRef(uidVal), async snap=>{
    if(snap.exists()){
      clinics = snap.data().list || [];
    } else {
      clinics = defaultClinics();
      try{ await setDoc(clinicsDocRef(uidVal), {list:clinics}); }catch(e){}
    }
    clinicsLoaded=true;
    tryFirstRender();
    if(clinicsLoaded && entriesLoaded) renderContent();
  }, err=>{
    console.error(err);
    alert('เชื่อมต่อ Firestore ไม่สำเร็จ (คลินิก): '+err.message);
  });
  unsubEntries = onSnapshot(entriesDocRef(uidVal), snap=>{
    entries = snap.exists() ? (snap.data().data || {}) : {};
    entriesLoaded=true;
    tryFirstRender();
    if(clinicsLoaded && entriesLoaded) renderContent();
  }, err=>{
    console.error(err);
    alert('เชื่อมต่อ Firestore ไม่สำเร็จ (รายการ): '+err.message);
  });
}
function stopListening(){
  if(unsubClinics){unsubClinics();unsubClinics=null;}
  if(unsubEntries){unsubEntries();unsubEntries=null;}
}

function tryFirstRender(){
  if(clinicsLoaded && entriesLoaded && document.getElementById('content')===null){
    renderApp();
  }
}

/* ═══════════ Math ═══════════ */
function calc(e){
  const cases=e.cases||[];
  const gross=cases.reduce((s,c)=>s+(Number(c.amount)||0),0);
  const dfPct=Number(e.dfPct)||0;
  const dfIncome=Math.round(gross*dfPct/100);
  const totalCases=cases.length;
  const ssCases=Number(e.ssCaseCount)||0;
  const labTot=Number(e.labFeeTotal)||0;
  const labShare=Math.round(labTot*LAB_SPLIT_PCT/100);
  const ss=e.ssDeduct?ssCases*SS_PER_CASE:0;
  const wht=e.whtDeduct?Math.round(dfIncome*WHT_PCT/100):0;
  const net=dfIncome-ss-labShare;
  const netAfterWht=net-wht;
  return{gross,dfPct,dfIncome,totalCases,ssCases,labTot,labShare,ss,wht,net,netAfterWht};
}
function dayE(d){return entries[d]||[];}
function yearE(y){
  const out=[];
  Object.keys(entries).forEach(d=>{
    const yy=Number(d.split('-')[0]);
    if(yy===y) entries[d].forEach(e=>out.push({date:d,...e}));
  });
  return out;
}
function monthE(y,m){
  const out=[];
  Object.keys(entries).forEach(d=>{
    const[yy,mm]=d.split('-').map(Number);
    if(yy===y&&mm-1===m) entries[d].forEach(e=>out.push({date:d,...e}));
  });
  return out;
}

/* ═══════════ Calendar ═══════════ */
function renderCalendar(el){
  const y=S.y,m=S.m;
  const startDow=new Date(y,m,1).getDay();
  const dim=new Date(y,m+1,0).getDate();
  const filt=S.clinicFilter;
  const me=monthE(y,m).filter(e=>filt==='all'||e.clinicId===filt);
  const netMap={};
  me.forEach(e=>{const{net}=calc(e);netMap[e.date]=(netMap[e.date]||0)+net;});
  const maxNet=Math.max(1,...Object.values(netMap));
  const today=ds(new Date().getFullYear(),new Date().getMonth(),new Date().getDate());

  let cells='';
  for(let i=0;i<startDow;i++) cells+=`<div class="cell empty"></div>`;
  for(let d=1;d<=dim;d++){
    const date=ds(y,m,d);
    const de=dayE(date).filter(e=>filt==='all'||e.clinicId===filt);
    const net=netMap[date]||0;
    const pct=de.length?Math.max(6,Math.min(100,net/maxNet*100)):0;
    const dots=de.map(e=>{const c=byId(e.clinicId);return`<span class="cdot" style="background:${c?c.color:'#aaa'}"></span>`;}).join('');
    const isToday=date===today;
    cells+=`
      <div class="cell ${isToday?'today':''} ${de.length?'has-data':''}" data-date="${date}">
        <div class="dnum">${d}</div>
        <div class="cdots">${dots}</div>
        ${de.length?`<div class="cbar" style="width:${pct}%"></div><div class="cnet">฿${fmt(net)}</div>`:''}
      </div>`;
  }
  const total=startDow+dim;
  const rem=(7-total%7)%7;
  for(let i=0;i<rem;i++) cells+=`<div class="cell empty"></div>`;

  // Quick DF summary for the filtered set
  let qGross=0,qDf=0,qSS=0,qLab=0,qNet=0,qCases=0;
  me.forEach(e=>{
    const{gross,dfIncome,ss,labShare,net,totalCases}=calc(e);
    qGross+=gross;qDf+=dfIncome;qSS+=ss;qLab+=labShare;qNet+=net;qCases+=totalCases;
  });
  const qDays=new Set(me.map(e=>e.date)).size;

  el.innerHTML=`

      </div>
    </div>
    <div class="clinic-filter">
      <button class="cf-chip ${filt==='all'?'active':''}" data-filt="all">ทั้งหมด</button>
      ${clinics.map(c=>`
        <button class="cf-chip ${filt===c.id?'active':''}" data-filt="${c.id}">
          <span class="cdot" style="background:${c.color}"></span>${c.name}
        </button>`).join('')}
    </div>
    <div class="quick-df">
      <div class="qd-title">${filt==='all'?'สรุป DF ทั้งเดือน':'สรุป DF · '+(byId(filt)?.name||'')}</div>
      <div class="qd-grid">
        <div class="qd-item"><span class="qd-l">Gross</span><span class="qd-v">฿${fmt(qGross)}</span></div>
        <div class="qd-item"><span class="qd-l">DF Income</span><span class="qd-v">฿${fmt(qDf)}</span></div>
        <div class="qd-item"><span class="qd-l">หักปกส./แลป</span><span class="qd-v neg">−฿${fmt(qSS+qLab)}</span></div>

      </div>

  el.querySelector('#pM').onclick=()=>shiftM(-1);
  el.querySelector('#nM').onclick=()=>shiftM(1);
  el.querySelectorAll('.cell[data-date]').forEach(c=>c.onclick=()=>{S.dayModal=c.dataset.date;renderModals();});
  el.querySelectorAll('.cf-chip').forEach(b=>b.onclick=()=>{S.clinicFilter=b.dataset.filt;renderContent();});
}
function shiftM(d){let m=S.m+d,y=S.y;if(m<0){m=11;y--;}if(m>11){m=0;y++;}S.m=m;S.y=y;renderContent();}

/* ═══════════ Clinics ═══════════ */

}

/* ═══════════ Summary ═══════════ */
function renderSummary(el){
  const y=S.y,m=S.m;
  const me=monthE(y,m);
  let tGross=0,tDfIncome=0,tSS=0,tLab=0,tNet=0;
  const byC={};
  me.forEach(e=>{
    const{gross,dfIncome,ss,labShare,net,totalCases,ssCases}=calc(e);
    tGross+=gross;tDfIncome+=dfIncome;tSS+=ss;tLab+=labShare;tNet+=net;
    byC[e.clinicId]=byC[e.clinicId]||{gross:0,dfIncome:0,ss:0,lab:0,net:0,days:new Set(),cases:0,ssCases:0};
    const b=byC[e.clinicId];
    b.gross+=gross;b.dfIncome+=dfIncome;b.ss+=ss;b.lab+=labShare;b.net+=net;b.days.add(e.date);b.cases+=totalCases;b.ssCases+=ssCases;
  });
  const days=new Set(me.map(e=>e.date)).size;
  el.innerHTML=`
    <div class="sec-title"><span class="badge">MONTH</span> ${MN[m]} ${y+543}</div>
    <div style="display:flex;gap:8px;margin-bottom:14px;">
      <button class="btn btn-ghost btn-sm" id="pM">‹ เดือนก่อน</button>
      <button class="btn btn-ghost btn-sm" id="nM">เดือนหน้า ›</button>
    </div>
    <div class="stat-grid">
      <div class="stat"><div class="sl">Gross รวม</div><div class="sv">฿${fmt(tGross)}</div></div>
      <div class="stat"><div class="sl">รายได้ DF</div><div class="sv">฿${fmt(tDfIncome)}</div></div>
      <div class="stat deduct"><div class="sl">หารค่าแลป ${LAB_SPLIT_PCT}%</div><div class="sv">฿${fmt(tLab)}</div></div>
      <div class="stat hilite"><div class="sl">รายได้สุทธิ</div><div class="sv">฿${fmt(tNet)}</div></div>
      <div class="stat"><div class="sl">วันที่ลงทำ</div><div class="sv">${days} วัน</div></div>
    </div>
    <div class="sec-title"><span class="badge">BY CLINIC</span> แยกตามคลินิก</div>
    ${!Object.keys(byC).length?`<div class="empty-state"><div class="big">📅</div>ยังไม่มีข้อมูลเดือนนี้</div>`:`
    <table>
      <thead><tr><th>คลินิก</th><th class="r">วัน</th><th class="r">Gross</th><th class="r">DF Income</th><th class="r">แลป</th><th class="r">สุทธิ</th></tr></thead>
      <tbody>
        ${Object.entries(byC).map(([id,b])=>{
          const c=byId(id);
          return`<tr>
            <td><span class="swatch" style="background:${c?c.color:'#aaa'}"></span> ${c?c.name:'(ลบแล้ว)'}</td>
            <td class="r">${b.days.size}</td>
            <td class="r">฿${fmt(b.gross)}</td>
            <td class="r">฿${fmt(b.dfIncome)}</td>
            <td class="r">฿${fmt(b.lab)}</td>
            <td class="r net-col">฿${fmt(b.net)}</td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>`}`;
  el.querySelector('#pM').onclick=()=>shiftM(-1);
  el.querySelector('#nM').onclick=()=>shiftM(1);
}

/* ═══════════ Yearly / Tax ═══════════ */
function shiftYear(d){ S.taxYear+=d; renderContent(); }
function renderYearly(el){
  const y=S.taxYear;
  const ye=yearE(y);
  let tGross=0,tDf=0,tSS=0,tLab=0,tWht=0,tNet=0,tNetAfterWht=0;
  const byC={};
  ye.forEach(e=>{
    const{gross,dfIncome,ss,labShare,wht,net,netAfterWht}=calc(e);
    tGross+=gross;tDf+=dfIncome;tSS+=ss;tLab+=labShare;tWht+=wht;tNet+=net;tNetAfterWht+=netAfterWht;
    byC[e.clinicId]=byC[e.clinicId]||{dfIncome:0,wht:0,net:0,netAfterWht:0,days:new Set()};
    const b=byC[e.clinicId];
    b.dfIncome+=dfIncome;b.wht+=wht;b.net+=net;b.netAfterWht+=netAfterWht;b.days.add(e.date);
  });
  const days=new Set(ye.map(e=>e.date)).size;

  el.innerHTML=`
    <div class="sec-title"><span class="badge">TAX YEAR</span> ปีภาษี ${y+543}</div>
    <div style="display:flex;gap:8px;margin-bottom:14px;">
      <button class="btn btn-ghost btn-sm" id="pY">‹ ปีก่อน</button>
      <button class="btn btn-ghost btn-sm" id="nY">ปีหน้า ›</button>
    </div>
    <div class="tax-note">
      📋 เงินได้ประเภทนี้จัดเป็น <strong>มาตรา 40(2)</strong> — ใช้ยอด "เงินได้ 40(2) รวม" ด้านล่างเป็นฐานยื่นภาษีเงินได้บุคคลธรรมดา ส่วนยอดหัก ณ ที่จ่ายใช้เป็นเครดิตภาษีตอนยื่นแบบได้
    </div>
    <div class="stat-grid">
      <div class="stat"><div class="sl">วันที่ลงทำทั้งปี</div><div class="sv">${days} วัน</div></div>
      <div class="stat"><div class="sl">เงินได้ 40(2) รวม</div><div class="sv">฿${fmt(tDf)}</div></div>
      <div class="stat deduct"><div class="sl">หัก ณ ที่จ่าย ${WHT_PCT}%</div><div class="sv">฿${fmt(tWht)}</div></div>
      <div class="stat"><div class="sl">รายได้สุทธิ (หลัง ปกส./แลป)</div><div class="sv">฿${fmt(tNet)}</div></div>
      <div class="stat hilite"><div class="sl">คงเหลือหลังหัก ณ ที่จ่าย</div><div class="sv">฿${fmt(tNetAfterWht)}</div></div>
    </div>
    <div class="sec-title"><span class="badge">BY CLINIC</span> แยกตามคลินิก (สำหรับยื่นภาษี)</div>
    ${!Object.keys(byC).length?`<div class="empty-state"><div class="big">🧾</div>ยังไม่มีข้อมูลปีนี้</div>`:`
    <table>
      <thead><tr><th>คลินิก</th><th class="r">วัน</th><th class="r">เงินได้ 40(2)</th><th class="r">หัก ${WHT_PCT}%</th><th class="r">คงเหลือ</th></tr></thead>
      <tbody>
        ${Object.entries(byC).map(([id,b])=>{
          const c=byId(id);
          return`<tr>
            <td><span class="swatch" style="background:${c?c.color:'#aaa'}"></span> ${c?c.name:'(ลบแล้ว)'}${c&&c.whtDeduct?' <span class="pill" style="font-size:9px;padding:1px 6px;">หัก 3%</span>':''}</td>
            <td class="r">${b.days.size}</td>
            <td class="r">฿${fmt(b.dfIncome)}</td>
            <td class="r">฿${fmt(b.wht)}</td>
            <td class="r net-col">฿${fmt(b.netAfterWht)}</td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>`}`;
  el.querySelector('#pY').onclick=()=>shiftYear(-1);
  el.querySelector('#nY').onclick=()=>shiftYear(1);
}


function renderModals(){
  let host=document.getElementById('mhost');
  if(!host){host=document.createElement('div');host.id='mhost';document.body.appendChild(host);}
  host.innerHTML='';
  if(S.dayModal)     host.appendChild(buildDayModal(S.dayModal));
  if(S.entryEditor)  host.appendChild(buildEntryEditor(S.entryEditor));
  if(S.clinicEditor) host.appendChild(buildClinicEditor(S.clinicEditor));
}

/* Day overview */
function buildDayModal(date){
  const wrap=document.createElement('div');
  wrap.className='overlay';
  wrap.onclick=ev=>{if(ev.target===wrap){S.dayModal=null;renderModals();}};
  const list=dayE(date);
  const[yy,mm,dd]=date.split('-').map(Number);
  wrap.innerHTML=`
    <div class="modal">
      <div class="modal-h">
        <h2>${dd} ${MN[mm-1]} ${yy+543}</h2>
      </div>
      ${!list.length?`<div class="empty-state-cream"><div class="big">🗓️</div>ยังไม่มีรายการวันนี้</div>`:
        list.map(e=>{
          const c=byId(e.clinicId);
          const{gross,dfPct,dfIncome,totalCases,ssCases,ss,labShare,wht,net}=calc(e);
          return`<div class="entry-card">
            <div class="ec-top">
              <div>
                <div class="ec-name"><span class="cdot" style="background:${c?c.color:'#aaa'}"></span>${c?c.name:'(ลบแล้ว)'}</div>
                <div class="ec-meta">${e.shift==='evening'?'🌌 ช่วงเย็น':'☀️ ทั้งวัน'} · ${totalCases} เคส · Gross ฿${fmt(gross)} → DF${dfPct}% = ฿${fmt(dfIncome)}</div>
              </div>
              <div style="display:flex;align-items:center;gap:8px;">
                <div class="ec-net">฿${fmt(net)}</div>
                <button class="btn btn-ghost btn-sm" data-edit="${e.id}">แก้ไข</button>
              </div>
            </div>
            ${(e.cases||[]).length?`
              <div class="ec-cases">
                ${(e.cases||[]).map((cs,i)=>`
                  <div class="case-line">
                    <span class="ca">${i+1}. ${cs.desc||'—'}</span>
                    <span class="cv">฿${fmt(cs.amount)}</span>
                  </div>`).join('')}
              </div>`:''}
            ${ss>0||labShare>0||wht>0?`
              <div class="ec-deduct">
                ${ss>0?`<span>−ปกส. ฿${fmt(ss)} (${ssCases} เคส)</span>`:''}
                ${labShare>0?`<span>−แลป ฿${fmt(labShare)}</span>`:''}
                ${wht>0?`<span>−หัก ณ ที่จ่าย ฿${fmt(wht)} (${WHT_PCT}%)</span>`:''}
              </div>`:''}
            ${e.note?`<div class="ec-note">📝 ${e.note}</div>`:''}
          </div>`;
        }).join('')}
      <div class="modal-footer">
        <button class="btn btn-ghost" id="closeDay">ปิด</button>
        <button class="btn btn-primary" id="addEntry">+ เพิ่มรายการ</button>
      </div>
    </div>`;
  wrap.querySelector('#closeDay').onclick=()=>{S.dayModal=null;renderModals();};
  wrap.querySelector('#addEntry').onclick=()=>{S.entryEditor={date,entry:null};renderModals();};
  wrap.querySelectorAll('[data-edit]').forEach(b=>{
    b.onclick=()=>{
      const e=list.find(e=>e.id===b.dataset.edit);
      S.entryEditor={date,entry:{...e,cases:(e.cases||[]).map(c=>({...c}))}};renderModals();
    };
  });
  return wrap;
}

/* Entry editor */
function buildEntryEditor(ctx){
  const wrap=document.createElement('div');
  wrap.className='overlay';
  wrap.onclick=ev=>{if(ev.target===wrap){S.entryEditor=null;renderModals();}};
  const isNew=!ctx.entry;
  let draft=ctx.entry
    ?{...ctx.entry,cases:(ctx.entry.cases||[]).map(c=>({...c}))}
    :{id:uid(),clinicId:'',shift:'evening',dfPct:40,cases:[],ssDeduct:false,ssCaseCount:0,xrayFee:false,whtDeduct:false,labFeeTotal:0,note:''};

  function formula(){
    const{gross,dfPct,dfIncome,ssCases,ss,labShare,net}=calc(draft);
    let f=`฿${fmt(gross)} × ${dfPct}% = ฿${fmt(dfIncome)}`;
    if(ss>0)       f+=` <span class="neg">− ฿${fmt(ss)} (ปกส.×${ssCases})</span>`;
    if(labShare>0) f+=` <span class="neg">− ฿${fmt(labShare)} (แลป${LAB_SPLIT_PCT}%)</span>`;
    f+=` = <span class="pos">฿${fmt(net)}</span>`;
    return f;
  }

  function paint(){
    const{gross,dfIncome,totalCases,ssCases,ss,labShare,labTot,wht,net,netAfterWht}=calc(draft);
    const cl=byId(draft.clinicId);
    wrap.innerHTML=`
      <div class="modal">
        <div class="modal-h"><h2>${isNew?'เพิ่มรายการ':'แก้ไขรายการ'}</h2></div>
        <div class="field">
          <label>คลินิก</label>
          <select id="fClin">
            <option value=""${!draft.clinicId?' selected':''}>- เลือกคลินิก -</option>
            ${clinics.map(c=>`<option value="${c.id}"${c.id===draft.clinicId?' selected':''}>${c.name}</option>`).join('')}
          </select>
        </div>
        <div class="field">
          <label>DF % (สัดส่วนที่หมอได้)</label>
          <div style="display:flex;align-items:center;gap:10px;">
            <input type="number" id="fDF" value="${draft.dfPct||0}" min="0" max="100" style="width:90px;border:2px solid var(--blue);border-radius:9px;padding:8px 10px;font-family:'IBM Plex Mono',monospace;font-size:16px;font-weight:700;text-align:center;color:var(--blue);background:rgba(255,255,255,.05);"/>
            <span style="font-size:13px;color:var(--blue);opacity:.6;">% จาก Gross ฿${fmt(gross)} = <strong>฿${fmt(dfIncome)}</strong></span>
          </div>
        </div>
        <div class="field">
          <label>ช่วงที่ทำ</label>
          <div class="seg">
            <button type="button" data-sh="evening" class="${draft.shift==='evening'?'active':''}">🌌 ช่วงเย็น</button>
            <button type="button" data-sh="fullday"  class="${draft.shift==='fullday' ?'active':''}">☀️ ทั้งวัน</button>
          </div>
        </div>

        <div style="font-size:11px;font-weight:700;color:var(--blue);opacity:.6;margin-bottom:5px;letter-spacing:.3px;">รายการเคส</div>
        <div class="cases-wrap">
          <div class="cases-hd"><span>งานที่ทำ</span><span style="text-align:right;">ได้รับ (฿)</span><span></span></div>
          ${draft.cases.map((c,i)=>`
            <div class="case-row">
              <input type="text" class="cdesc" data-i="${i}" placeholder="เคส ${i+1}" value="${c.desc||''}"/>
              <input type="number" class="camt"  data-i="${i}" value="${c.amount||''}" placeholder="0" min="0"/>
              <button class="btn-icon" data-rm="${i}">✕</button>
            </div>`).join('')}
          ${totalCases>0?`<div class="cases-total"><span>รวม ${totalCases} เคส</span><span class="tv">฿${fmt(gross)}</span></div>`:''}
          <button class="add-case-btn" id="addCase">＋ เพิ่มเคส</button>
        </div>

        <div class="ss-box">
          <div class="ss-top">
            <div>
              <div class="ss-label">หักประกันสังคม</div>
              <div class="ss-hint">ระบุจำนวนเคสที่เป็นงาน ปกส. แยกจากเคสทั้งหมด</div>
            </div>
            <label class="switch"><input type="checkbox" id="fSS"${draft.ssDeduct?' checked':''}><span class="slider"></span></label>
          </div>
          ${draft.ssDeduct?`
            <div class="ss-count-row">
              <label>จำนวนเคส ปกส.</label>
              <input type="number" id="fSSCount" value="${draft.ssCaseCount||0}" min="0" placeholder="0"/>
              <span style="font-size:12px;color:var(--blue);opacity:.6;">เคส × ฿${SS_PER_CASE}</span>
            </div>
            ${ssCases>0?`<div class="ss-calc"><span>${ssCases} เคส × ฿${SS_PER_CASE}</span><span class="sv">−฿${fmt(ss)}</span></div>`:''}
          `:``}
        </div>

        <div class="lab-box">
          <label>ค่าแลปรวม (บาท) — หมอออก ${LAB_SPLIT_PCT}%</label>
          <input type="number" id="fLab" value="${draft.labFeeTotal||''}" placeholder="0" min="0"/>
          ${labTot>0?`<div class="lab-calc"><span>หมอออก ${LAB_SPLIT_PCT}% (คลินิก ${100-LAB_SPLIT_PCT}%)</span><span class="lv">−฿${fmt(labShare)}</span></div>`:''}
        </div>

        <div class="ss-box">
          <div class="ss-top">
            <div>
              <div class="ss-label">หัก ณ ที่จ่าย ${WHT_PCT}% (40(2))</div>
              <div class="ss-hint">คำนวณจาก DF Income — ใช้สำหรับสรุปยื่นภาษีรายปี</div>
            </div>
            <label class="switch"><input type="checkbox" id="fWht"${draft.whtDeduct?' checked':''}><span class="slider"></span></label>
          </div>
          ${draft.whtDeduct&&wht>0?`<div class="ss-calc wht-calc"><span>DF ฿${fmt(dfIncome)} × ${WHT_PCT}%</span><span class="sv">−฿${fmt(wht)}</span></div>`:''}
        </div>

        ${cl?.xrayFee?`<div style="margin-bottom:12px;"><span class="pill">📷 คลินิกนี้ได้ค่าฟิล์ม</span></div>`:''}

        <div class="field">
          <label>หมายเหตุ</label>
          <input type="text" id="fNote" value="${draft.note||''}" placeholder="เคสพิเศษ, โน้ตอื่นๆ"/>
        </div>

        <div style="font-size:12px;color:var(--blue);opacity:.55;margin-top:10px;margin-bottom:4px;font-family:'IBM Plex Mono',monospace;">
          Gross ฿${fmt(gross)} × ${draft.dfPct||0}% → DF ฿${fmt(dfIncome)}
        </div>
        <div class="net-box">
          <div class="nl">รายได้สุทธิ</div>
          <div class="nv">฿${fmt(net)}</div>
        </div>
        <div class="formula">${formula()}</div>

        <div class="modal-footer">
          ${!isNew?`<button class="btn btn-danger" id="delE">ลบ</button>`:''}
          <button class="btn btn-ghost" id="cancelE">ยกเลิก</button>
          <button class="btn btn-primary" id="saveE">บันทึก</button>
        </div>
      </div>`;
    wire();
  }

  function wire(){
    wrap.querySelector('#fClin').onchange=e=>{
      draft.clinicId=e.target.value;
      const c=byId(draft.clinicId);
      if(c && isNew){draft.dfPct=c.dfPct||40;draft.ssDeduct=!!c.ssDeduct;draft.xrayFee=!!c.xrayFee;draft.whtDeduct=!!c.whtDeduct;}
      paint();
    };
    wrap.querySelector('#fDF').oninput=e=>{draft.dfPct=e.target.value;paint();};
    wrap.querySelectorAll('[data-sh]').forEach(b=>b.onclick=()=>{draft.shift=b.dataset.sh;paint();});
    wrap.querySelectorAll('.cdesc').forEach(inp=>inp.oninput=e=>{draft.cases[+e.target.dataset.i].desc=e.target.value;});
    wrap.querySelectorAll('.camt').forEach(inp=>inp.oninput=e=>{draft.cases[+e.target.dataset.i].amount=e.target.value;refreshNet();});
    wrap.querySelectorAll('[data-rm]').forEach(b=>b.onclick=()=>{draft.cases.splice(+b.dataset.rm,1);paint();});
    wrap.querySelector('#addCase').onclick=()=>{draft.cases.push({id:uid(),desc:'',amount:''});paint();};
    wrap.querySelector('#fSS').onchange=e=>{draft.ssDeduct=e.target.checked;paint();};
    wrap.querySelector('#fWht').onchange=e=>{draft.whtDeduct=e.target.checked;paint();};
    const ssc=wrap.querySelector('#fSSCount');if(ssc) ssc.oninput=e=>{draft.ssCaseCount=e.target.value;refreshNet();};
    wrap.querySelector('#fLab').oninput=e=>{draft.labFeeTotal=e.target.value;refreshNet();};
    wrap.querySelector('#fNote').oninput=e=>{draft.note=e.target.value;};
    wrap.querySelector('#cancelE').onclick=()=>{S.entryEditor=null;renderModals();};
    wrap.querySelector('#saveE').onclick=save;
    const del=wrap.querySelector('#delE');if(del) del.onclick=del2;
  }

  function refreshNet(){
    const{gross,dfIncome,totalCases,ssCases,ss,labShare,labTot,wht,net,netAfterWht}=calc(draft);
    const nv=wrap.querySelector('.nv');if(nv) nv.textContent=`฿${fmt(net)}`;
    const fo=wrap.querySelector('.formula');if(fo) fo.innerHTML=formula();
    const ct=wrap.querySelector('.cases-total');
    if(ct) ct.innerHTML=`<span>รวม ${totalCases} เคส</span><span class="tv">฿${fmt(gross)}</span>`;
    const sc=wrap.querySelector('.ss-calc:not(.wht-calc)');
    if(sc) sc.innerHTML=`<span>${ssCases} เคส × ฿${SS_PER_CASE}</span><span class="sv">−฿${fmt(ss)}</span>`;
    const lc=wrap.querySelector('.lab-calc');
    if(lc) lc.innerHTML=`<span>หมอออก ${LAB_SPLIT_PCT}% (คลินิก ${100-LAB_SPLIT_PCT}%)</span><span class="lv">−฿${fmt(labShare)}</span>`;
    const wc=wrap.querySelector('.wht-calc');
    if(wc) wc.innerHTML=`<span>DF ฿${fmt(dfIncome)} × ${WHT_PCT}%</span><span class="sv">−฿${fmt(wht)}</span>`;
  }

  function save(){
    if(!draft.clinicId){alert('กรุณาเลือกคลินิก');return;}
    const clean={...draft,cases:draft.cases.map(c=>({...c,amount:Number(c.amount)||0})),dfPct:Number(draft.dfPct)||0,labFeeTotal:Number(draft.labFeeTotal)||0,ssCaseCount:Number(draft.ssCaseCount)||0};
    const list=entries[ctx.date]||[];
    const idx=list.findIndex(e=>e.id===clean.id);
    if(idx>=0) list[idx]=clean; else list.push(clean);
    const newEntries={...entries,[ctx.date]:list};
    saveE(newEntries);S.entryEditor=null;renderModals();renderContent();
  }
  function del2(){
    if(!confirm('ลบรายการนี้?')) return;
    const newEntries={...entries};
    newEntries[ctx.date]=(newEntries[ctx.date]||[]).filter(e=>e.id!==draft.id);
    if(!newEntries[ctx.date].length) delete newEntries[ctx.date];
    saveE(newEntries);S.entryEditor=null;renderModals();renderContent();
  }
  paint(); return wrap;
}

/* Clinic editor */
function buildClinicEditor(c){
  const wrap=document.createElement('div');
  wrap.className='overlay';
  wrap.onclick=ev=>{if(ev.target===wrap){S.clinicEditor=null;renderModals();}};
  let d={...c};const isNew=!d.id;
  function paint(){
    wrap.innerHTML=`
      <div class="modal">
        <div class="modal-h"><h2>${isNew?'เพิ่มคลินิก':'แก้ไขคลินิก'}</h2></div>
        <div class="field"><label>ชื่อคลินิก</label><input type="text" id="cN" value="${d.name}" placeholder="ชื่อคลินิก"/></div>
        <div class="field">
          <label>DF % ของคลินิกนี้ (ค่าตั้งต้น)</label>
          <div style="display:flex;align-items:center;gap:10px;">
            <input type="number" id="cDF" value="${d.dfPct||0}" min="0" max="100" style="width:90px;border:2px solid var(--blue);border-radius:9px;padding:8px 10px;font-family:'IBM Plex Mono',monospace;font-size:16px;font-weight:700;text-align:center;color:var(--blue);background:rgba(255,255,255,.05);"/>
            <span style="font-size:12px;color:var(--blue);opacity:.6;">% จาก Gross — ปรับได้ทีละรายการ</span>
          </div>
        </div>
        <div class="field">
          <label>สีประจำคลินิก</label>
          <div style="display:flex;gap:7px;flex-wrap:wrap;margin-top:2px;">
            ${PAL.map(p=>`<div data-col="${p}" style="width:32px;height:32px;border-radius:8px;background:${p};cursor:pointer;border:3px solid ${d.color===p?'var(--blue)':'transparent'};transition:.1s;"></div>`).join('')}
          </div>
        </div>
        <div class="ss-box" style="margin-bottom:10px;">
          <div class="ss-top">
            <div><div class="ss-label">หักปกส. เป็นค่าตั้งต้น</div><div class="ss-hint">฿${SS_PER_CASE} × เคส ปกส. — ปรับได้ทีละวัน</div></div>
            <label class="switch"><input type="checkbox" id="cSS"${d.ssDeduct?' checked':''}><span class="slider"></span></label>
          </div>
        </div>
        <div class="ss-box">
          <div class="ss-top">
            <div><div class="ss-label">ได้ค่าฟิล์มเอ็กซเรย์</div><div class="ss-hint">บันทึกเป็นข้อมูล ไม่นำไปคำนวณ</div></div>
            <label class="switch"><input type="checkbox" id="cXr"${d.xrayFee?' checked':''}><span class="slider"></span></label>
          </div>
        </div>
        <div class="ss-box">
          <div class="ss-top">
            <div><div class="ss-label">หัก ณ ที่จ่าย ${WHT_PCT}% (เงินได้ 40(2))</div><div class="ss-hint">คลินิกนี้หักภาษี ณ ที่จ่ายจาก DF Income หรือไม่ — ใช้สำหรับสรุปยื่นภาษี</div></div>
            <label class="switch"><input type="checkbox" id="cWht"${d.whtDeduct?' checked':''}><span class="slider"></span></label>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-ghost" id="cancelC">ยกเลิก</button>
          <button class="btn btn-primary" id="saveC">บันทึก</button>
        </div>
      </div>`;
    wrap.querySelectorAll('[data-col]').forEach(el=>el.onclick=()=>{d.color=el.dataset.col;paint();});
    wrap.querySelector('#cN').oninput=e=>d.name=e.target.value;
    wrap.querySelector('#cDF').oninput=e=>d.dfPct=Number(e.target.value)||0;
    wrap.querySelector('#cSS').onchange=e=>d.ssDeduct=e.target.checked;
    wrap.querySelector('#cXr').onchange=e=>d.xrayFee=e.target.checked;
    wrap.querySelector('#cWht').onchange=e=>d.whtDeduct=e.target.checked;
    wrap.querySelector('#cancelC').onclick=()=>{S.clinicEditor=null;renderModals();};
    wrap.querySelector('#saveC').onclick=()=>{
      if(!d.name.trim()){alert('กรุณาใส่ชื่อคลินิก');return;}
      const clean={...d,id:d.id||uid()};
      const idx=clinics.findIndex(c=>c.id===clean.id);
      let newList;
      if(idx>=0){ newList=[...clinics]; newList[idx]=clean; }
      else{ newList=[...clinics, clean]; }
      saveC(newList);S.clinicEditor=null;renderModals();renderContent();
    };
  }
  paint(); return wrap;
}
</script>
