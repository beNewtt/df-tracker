<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DF Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
<style>
:root{
  /* Theme tokens */
--bg: var(--cream);
--surface: var(--cream-dk);
--surface2: var(--cream-dk2);

--text: var(--blue);
--subtext: var(--green);

--accent: var(--blue-dk);
--accent-hover: #D96A3B;

--border: var(--cream-dk2);
}
*{box-sizing:border-box;margin:0;padding:0;}
html{background:var(--cream);}
body{font-family:'Sarabun',sans-serif;background:var(--bg);color: var(--subtext);min-height:100vh;}
#app{max-width:960px;margin:0 auto;padding:20px 16px 60px;}

.content-narrow{
  max-width:760px;
  margin:0 auto;
}

.login-screen{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:22px;padding:20px;text-align:center;
}
.login-screen .mark-big{
  width:76px;height:76px;border-radius:18px;background:var(--blue);color:var(--cream);
  display:flex;align-items:center;justify-content:center;font-weight:800;
  font-family:'IBM Plex Mono',monospace;font-size:22px;
}
.login-screen h1{color:var(--blue);font-size:24px;font-weight:800;letter-spacing:.5px;}
.login-screen p{color:rgba(237,234,217,.7);font-size:13px;max-width:280px;}
.gbtn{
  display:flex;align-items:center;gap:10px;background:#F3F1E9;color:#202124;
  border:none;border-radius:12px;padding:13px 22px;font-family:'Sarabun',sans-serif;
  font-size:15px;font-weight:700;cursor:pointer;transition:.15s;box-shadow:0 4px 14px rgba(0,0,0,.15);
}
.gbtn:hover{background:#fff;}
.gbtn svg{width:20px;height:20px;flex-shrink:0;}
.login-err{color:#FFB4B4;font-size:12px;max-width:280px;}
.loading-screen{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  color:var(--blue);font-size:14px;font-weight:700;opacity:.7;
}

.topbar{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:20px;gap:12px;flex-wrap:wrap;
}
.brand{display:flex;align-items:center;gap:10px;}
.brand .mark{
  width:40px;height:40px;border-radius:10px;
  background:var(--accent);color:var(--bg);
  display:flex;align-items:center;justify-content:center;
  font-weight:800;font-family:'IBM Plex Mono',monospace;font-size:13px;flex-shrink:0;
}
.brand h1{font-size:18px;font-weight:800;color:var(--text);;letter-spacing:.5px;}
.brand .sub{font-size:11px;color:var(--subtext);margin-top:1px;}
nav.tabs{display:flex;gap:4px;background:var(--surface);border-radius:999px;padding:4px;}
nav.tabs button{
  border:none;background:transparent;padding:8px 16px;border-radius:999px;
  font-family:'Sarabun',sans-serif;font-size:13px;font-weight:700;
  color:var(--subtext);cursor:pointer;transition:.15s;white-space:nowrap;
}
nav.tabs button.active{background:var(--accent);color:var(--bg);}

.user-chip{display:flex;align-items:center;gap:8px;}
.user-chip img{width:30px;height:30px;border-radius:50%;border:2px solid var(--blue);}
.user-chip .uname{color:var(--text);font-size:12px;font-weight:700;max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#7CE0A8;flex-shrink:0;}
.sync-dot.saving{background:#F2C14E;}

/* Settings gear + dropdown panel (theme picker + logout) */
.settings-wrap{position:relative;display:flex;align-items:center;}
.fa-solid{
  font-size:13px;
  line-height:1;
}

.icon-inline{
  margin-right:4px;
  color:var(--accent);
}
  .gear-btn{
    width:30px;
    height:30px;
    border:none;
    background:transparent;
    color:var(--green);
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    transition:.15s;
    padding:0;
}

.gear-btn i{
    font-size:16px;
}

.gear-btn:hover{
    color:var(--blue-dk);
    background:transparent;
}
.settings-panel{
  position:absolute;top:calc(100% + 10px);right:0;z-index:60;
  width:280px;background:var(--cream);border-radius:14px;
  padding:14px;box-shadow:0 10px 28px rgba(0,0,0,.18);
  border:1px solid var(--cream-dk2);
}
.settings-panel-title{
  font-size:11px;font-weight:800;color:var(--blue-dk);
  opacity:.7;letter-spacing:.3px;margin-bottom:10px;
}
.theme-list{
  display:flex;flex-direction:column;gap:7px;
  max-height:320px;overflow-y:auto;padding-right:2px;scrollbar-width:none;
}
.theme-btn{
  display:flex;align-items:center;justify-content:space-between;gap:12px;
  width:100%;border:3px solid transparent;border-radius:12px;
  padding:10px 12px;cursor:pointer;font-family:'Sarabun',sans-serif;
  font-size:13px;font-weight:800;transition:.15s;text-align:left;
}
.theme-btn:hover{
  transform:translateY(-1px);
  filter:saturate(1.08);
}
.theme-btn.active{
  border-color:var(--blue);
}
.theme-dots{
  display:flex;gap:5px;flex-shrink:0;
}
.theme-dot{
  width:13px;height:13px;border-radius:50%;flex-shrink:0;
}
.settings-divider{
  height:1px;background:var(--cream-dk2);margin:12px 0;
}
.settings-data-actions{
  display:grid;grid-template-columns:1fr 1fr;gap:8px;
}
.settings-data-btn{
  display:flex;align-items:center;justify-content:center;gap:6px;
  width:100%;padding:8px 6px;background:var(--surface);color:var(--text);
}
.settings-data-btn:hover{
  background:var(--surface2);color:var(--bg);
}

.cal-wrap{
  background:var(--bg);
  border-radius:18px;
  overflow:hidden;
}

.cal-header{
  display:flex;
  align-items:flex-end;
  justify-content:space-between;
  padding:22px 24px 18px;
  border-bottom:2px solid var(--border);
}

.cal-header .month-num{
  font-size:clamp(72px,12vw,110px);
  font-weight:800;
  line-height:1;
  font-family:'IBM Plex Mono',monospace;
  color:transparent;
  -webkit-text-stroke:2.5px var(--subtext);
  letter-spacing:-4px;
  flex-shrink:0;
}

.cal-header .month-right{text-align:right;}

.cal-header .month-name{
  font-size:clamp(22px,4vw,38px);
  font-weight:800;
  color:var(--text);
  letter-spacing:1px;
  line-height:1.1;
}

.cal-header .year-label{
  font-size:clamp(14px,2.5vw,20px);
  color:var(--subtext);
  opacity:1;
  margin-top:2px;
  font-weight:600;
}

.mnav{
  display:flex;
  gap:6px;
  margin-top:10px;
  justify-content:flex-end;
}

.mnav button{
  width:30px;
  height:30px;
  border-radius:50%;
  border:2px solid var(--border);
  background:transparent;
  color:var(--text);
  font-size:14px;
  font-weight:700;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  transition:.12s;
}

.mnav button:hover{
  background:var(--accent);
  color:var(--bg);
  border-color:var(--accent);
}

.cal-grid{padding:0;}

.weekdays{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  border-bottom:2px solid var(--border);
}

.weekdays div{
  text-align:center;
  font-size:11px;
  font-weight:700;
  color:var(--subtext);
  padding:8px 4px;
  letter-spacing:.5px;
  border-right:1px solid var(--border);
}

.weekdays div:last-child{border-right:none;}

.daygrid{
  display:grid;
  grid-template-columns:repeat(7,1fr);
}

.cell{
  border-right:1px solid var(--border);
  border-bottom:1px solid var(--border);
  min-height:80px;
  padding:6px 8px 6px;
  cursor:pointer;
  position:relative;
  transition:.1s;
  background:var(--bg);
}

.cell:nth-child(7n){border-right:none;}

.cell:hover{
  background:var(--surface);
}

.cell.empty{
  cursor:default;
  background:var(--bg);
}

.cell.empty:hover{
  background:var(--bg);
}

.cell .dnum{
  font-size:13px;
  font-weight:700;
  color:var(--subtext);
  text-align:right;
  opacity:1;
}

.cell.has-data .dnum{
  color:var(--text);
}

.cell.today{
  background:var(--accent);
}

.cell.today .dnum{
  color:var(--bg);
  opacity:1;
}

.cell.today:hover{
  background:var(--accent-hover);
}

.cell .cdots{
  display:flex;
  flex-wrap:wrap;
  gap:3px;
  margin-top:5px;
}

.cdot{
  width:6px;
  height:6px;
  border-radius:50%;
}

.cell.today .cdot{
  outline:1px solid color-mix(in srgb,var(--bg) 60%,transparent);
}

.cell .cnet{
  position:absolute;
  bottom:6px;
  left:6px;
  right:6px;
  font-size:10px;
  font-family:'IBM Plex Mono',monospace;
  font-weight:600;
  color:var(--text);
  text-align:right;
}

.cell.today .cnet{
  color:var(--bg);
}

.cell .cbar{
  position:absolute;
  left:0;
  bottom:0;
  height:3px;
  background:var(--accent);
  transform-origin:left;
  opacity:.45;
}

.card{
  background:var(--bg);
  border-radius:18px;
  padding:20px 22px;
  margin-bottom:14px;
}

.clinic-filter{
  display:flex;
  gap:6px;
  flex-wrap:wrap;
  margin-top:12px;
}

.cf-chip{
  display:flex;
  align-items:center;
  gap:6px;
  border:none;
  border-radius:999px;
  padding:7px 13px;
  background:var(--surface);
  color:var(--subtext);
  font-family:'Sarabun',sans-serif;
  font-size:12px;
  font-weight:700;
  cursor:pointer;
  transition:.15s;
}

.cf-chip:hover{
  background:var(--surface2);
  color:var(--text);
}

.cf-chip.active{
  background:var(--accent);
  color:var(--bg);
}

.cf-chip .cdot{
  width:7px;
  height:7px;
}

.quick-df{
  background:var(--bg);
  border-radius:16px;
  padding:16px 18px;
  margin-top:12px;
}

.qd-title{
  font-size:12px;
  font-weight:800;
  color:var(--subtext);
  opacity:1;
  letter-spacing:.3px;
  margin-bottom:10px;
}

.qd-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(100px,1fr));
  gap:8px;
}

.qd-item{
  display:flex;
  flex-direction:column;
  gap:3px;
  border-radius:10px;
  padding:9px 11px;
  background:var(--surface);
}

.qd-item.hilite{
  background:var(--accent);
  border-color:var(--accent);
}

.qd-item.hilite .qd-l{
  color:color-mix(in srgb,var(--bg) 75%,var(--accent));
}

.qd-item.hilite .qd-v{
  color:var(--bg);
}

.qd-l{
  font-size:10px;
  font-weight:700;
  color:var(--subtext);
  opacity:1;
  letter-spacing:.3px;
}

.qd-v{
  font-family:'IBM Plex Mono',monospace;
  font-size:15px;
  font-weight:800;
  color:var(--text);
}

.qd-v.neg{
  color:var(--red);
}

.stat-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(130px,1fr));
  gap:10px;
  margin-bottom:16px;
}

.stat{
  border: 4px solid var(--surface2);
  border-radius:12px;
  padding:13px 14px;
  background:transparent;
}

.stat .sl{
  font-size:11px;
  font-weight:700;
  color: var(--text);
  opacity:1;
  margin-bottom:5px;
  letter-spacing:.3px;
}

.stat .sv{
  font-size:19px;
  font-weight:800;
  /* color:var(--text); */
  font-family:'IBM Plex Mono',monospace;
}

.stat.hilite{
  background: var(--accent);
  border-color: var(--accent);
}

.stat.hilite .sl{
  color: var(--bg);
}

.stat.hilite .sv{
  color:var(--bg);
}

.stat.deduct .sv{
  color:var(--red);
}

/* ---------- Section ---------- */

.sec-title{
  display:flex;
  align-items:center;
  gap:8px;
  font-size:13px;
  font-weight:800;
  color:var(--text);
  margin:20px 0 15px;
}

.sec-title .badge{
  background: var(--subtext);
  color: var(--bg);
  font-family:
  'IBM Plex Mono',monospace;
  font-size:10px;
  padding:3px 8px;
  border-radius:6px;
}

/* ---------- Tax ---------- */

.tax-note{
  background:transparent;
  border:none;
  border-radius:0;
  padding:18px 0 20px;
  margin-bottom:16px;
  font-size:13px;
  line-height:1.6;
  color:var(--text);
  font-weight:500;
}

.tax-note strong{
  color:var(--accent);
  font-weight:800;
}
/* ---------- Table ---------- */

table{
  width:100%;
  border-collapse:collapse;
  background:transparent;
  border-radius: 6px;
  overflow:hidden;
  border:none;
}

th,td{
  padding:9px 12px;
  text-align:left;
  font-size:12px;
  border-bottom:1px solid var(--border);
}

th{
  background: var(--surface2);
  color: var(--bg);
  font-weight:700;
  font-size:11px;
  letter-spacing:.3px;
}

tr:last-child td{
  border-bottom:none;
}

td{
  color:var(--text);
  font-weight:500;
}

td.r,th.r{
  text-align:right;
  font-family:'IBM Plex Mono',monospace;
}

td.net-col{
  font-weight:800;
  color:var(--text);
}

/* ---------- Clinic ---------- */

.clist{
  display:flex;
  flex-direction:column;
  gap: 10px;
  width:100%;
}

.ccard{
  border-radius:12px;
  padding:13px 15px;
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:14px;
  flex-wrap:wrap;
}

.ccard-main{
  min-width:0;
  flex:1 1 360px;
}

.ccard-actions{
  display:flex;
  gap:6px;
  flex-wrap:wrap;
  justify-content:flex-end;
  align-items:center;
}

.ccard .cn{
  display:flex;
  align-items:center;
  gap:7px;
  color:var(--text);
  font-size:15px;
  font-weight:800;
}

.swatch{
  width:12px;
  height:12px;
  border-radius:3px;
}

.pills{
  /* margin-right: 4px; */
  display:flex;
  flex-wrap:wrap;
  gap:5px;
  margin-top:7px;
}

.pill{
  border:1px solid var(--border);
  border-radius: 6px;
  padding:3px 9px;
  background: var(--accent);
  color: var(--bg);
  font-size:11px;
  font-weight:700;
}

.pill.off{
  opacity:.45;
}

.solid-ico{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  width:1em;
  min-width:1em;
  height:1em;
  background:transparent;
  color:currentColor;
  margin-right:.35em;
  vertical-align:-.12em;
}

.solid-ico i{
  color:currentColor;
  font-size:1em;
  line-height:1;
  margin:0;
}

.big .solid-ico{
  width:auto;
  height:auto;
  min-width:0;
  margin:0 auto 8px;
  color:var(--subtext);
  font-size:28px;
}

.big .solid-ico i{
  font-size:20px;
}

/* ---------- Constant ---------- */

.const-banner{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin-bottom:16px;
}

.cbadge{
  color:var(--subtext);
  padding:5px 12px;
  border-radius:8px;
  font-family:'IBM Plex Mono',monospace;
  font-size:11px;
  font-weight:700;
}

.btn{
  border:none;
  border-radius:9px;
  padding:9px 16px;
  font-family:'Sarabun',sans-serif;
  font-weight:700;
  font-size:13px;
  cursor:pointer;
  transition:.15s;
}

.btn-primary{
  background:var(--accent);
  color:var(--bg);
}

.btn-primary:hover{
  background:var(--accent-hover);
}

.btn-ghost{
  background:transparent;
  color:var(--text);
}

.btn-ghost:hover{
  background:var(--surface2);
  color:var(--bg);
}

.btn-danger {
     background:var(--surface2);
  color:var(--bg);
}

.btn-danger:hover{
  background:var(--red-lt);
}

.btn-sm{
  padding:5px 10px;
  font-size:12px;
}

.btn-icon{
  width:28px;
  height:28px;
  border-radius:7px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:14px;
  flex-shrink:0;
  border:1.5px solid var(--border);
  background:transparent;
  cursor:pointer;
  color:var(--subtext);
  transition:.1s;
}

.btn-icon:hover{
  border-color:var(--red);
  color:var(--red);
  background:var(--red-lt);
}

.action-icon{
  width:28px;
  height:28px;
  border:none;
  border-radius:6px;
  background:transparent;
  color:var(--accent);
  display:inline-flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  transition:.15s;
  box-shadow:none;
}

.action-icon i{
  font-size:16px;
  line-height:1;
  color:inherit;
  margin:0;
}

.action-icon:hover{
  transform:translateY(-1px);
  background:transparent;
  color:var(--accent-hover);
}

.summary-table th.action-cell,
.summary-table td.action-cell{
  width:46px;
  text-align:center;
  padding-left:6px;
  padding-right:6px;
}

.add-row{
  display:flex;
  justify-content:flex-end;
  margin-top:12px;
}

@media(min-width:900px){
  #content.clinics-view{
    max-width:760px;
    margin:0 auto;
  }

  #content.clinics-view .ccard{
    align-items:center;
  }
}

@media(max-width:640px){
  .ccard-actions{
    width:100%;
    justify-content:flex-start;
  }

  .add-row{
    justify-content:stretch;
  }

  .add-row .btn{
    width:100%;
  }
}

/* ---------- Modal ---------- */

.overlay{
  position:fixed;
  inset:0;
  background:color-mix(in srgb,var(--text) 38%,transparent);
  display:flex;
  align-items:flex-end;
  justify-content:center;
  z-index:50;
}

@media(min-width:600px){
  .overlay{
    align-items:center;
    padding:20px;
  }
}

.modal{
  background:var(--bg);
  border-radius:18px 18px 0 0;
  max-width:500px;
  width:100%;
  max-height:92vh;
  overflow-y:auto;
  padding:22px 20px 28px;
  border:1px solid var(--border);
}

@media(min-width:600px){
  .modal{
    border-radius:16px;
  }
}

.modal-h{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:16px;
}

.modal-h h2{
  font-size:18px;
  font-weight:800;
  color:var(--text);
}

/* ---------- Fields ---------- */

.field{
  margin-bottom:13px;
}

.field label{
  display:block;
  font-size:11px;
  font-weight:700;
  color:var(--subtext);
  margin-bottom:5px;
  letter-spacing:.3px;
}

.field input,
.field select{
  width:100%;
  border:1.5px solid var(--border);
  border-radius:9px;
  padding:9px 11px;
  font-family:'Sarabun',sans-serif;
  font-size:14px;
  background:var(--surface);
  color:var(--text);
}

.field input:focus,
.field select:focus{
  outline:none;
  border-color:var(--accent);
  background:var(--bg);
}

/* ---------- Segment ---------- */

.seg{
  display:flex;
  border:1.5px solid var(--border);
  border-radius:9px;
  overflow:hidden;
}

.seg button{
  flex:1;
  border:none;
  background:var(--surface);
  padding:9px;
  font-family:'Sarabun',sans-serif;
  font-size:13px;
  font-weight:700;
  cursor:pointer;
  color:var(--subtext);
  transition:.12s;
}

.seg button.active{
  background:var(--accent);
  color:var(--bg);
}

.shift-ico{
  margin-right:5px;
  color:inherit;
  font-size:13px;
  line-height:1;
}

/* ---------- Cases ---------- */

.cases-wrap{
  border:1.5px solid var(--border);
  border-radius:10px;
  overflow:hidden;
  margin-bottom:13px;
  background:var(--bg);
}

.cases-hd{
  display:grid;
  grid-template-columns:1fr 100px 30px;
  gap:8px;
  padding:7px 10px;
  background:var(--surface);
  font-size:11px;
  font-weight:800;
  color:var(--text);
  letter-spacing:.3px;
}

.case-row{
  display:grid;
  grid-template-columns:1fr 100px 30px;
  gap:8px;
  align-items:center;
  padding:7px 10px;
  border-top:1px solid var(--border);
}

.case-row input[type=text],
.case-row input[type=number]{
  width:100%;
  border:1.5px solid var(--border);
  border-radius:7px;
  padding:6px 8px;
  background:var(--surface);
  color:var(--text);
}

.case-row input[type=text]{
  font-family:'Sarabun',sans-serif;
  font-size:13px;
}

.case-row input[type=number]{
  font-family:'IBM Plex Mono',monospace;
  font-size:13px;
  text-align:right;
}

.case-row input:focus{
  outline:none;
  border-color:var(--accent);
  background:var(--bg);
}

.add-case-btn{
  display:flex;
  align-items:center;
  gap:6px;
  width:100%;
  border:none;
  background:transparent;
  padding:9px 10px;
  font-family:'Sarabun',sans-serif;
  font-size:13px;
  font-weight:700;
  color:var(--accent);
  cursor:pointer;
  border-top:1px solid var(--border);
}

.add-case-btn:hover{
  background:var(--surface);
}

.cases-total{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:8px 10px;
  background:var(--surface);
  border-top:1px solid var(--border);
  font-size:12px;
  font-weight:700;
  color:var(--text);
}

.cases-total .tv{
  font-family:'IBM Plex Mono',monospace;
  font-size:14px;
}

/* ---------- Deduct / Lab Boxes ---------- */

.ss-box,
.lab-box{
  border:1.5px solid var(--border);
  border-radius:10px;
  padding:12px 13px;
  margin-bottom:13px;
  background:var(--surface);
}

.ss-top{
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:8px;
}

.ss-label{
  font-size:13px;
  font-weight:700;
  color:var(--text);
}

.ss-hint{
  font-size:11px;
  color:var(--subtext);
  margin-top:2px;
}

.ss-count-row{
  display:flex;
  align-items:center;
  gap:10px;
  margin-top:10px;
}

.ss-count-row label{
  font-size:12px;
  font-weight:700;
  color:var(--text);
  white-space:nowrap;
}

.ss-count-row input{
  width:80px;
  border:1.5px solid var(--border);
  border-radius:7px;
  padding:6px 8px;
  font-family:'IBM Plex Mono',monospace;
  font-size:14px;
  font-weight:700;
  text-align:center;
  color:var(--text);
  background:var(--bg);
}

.ss-count-row input:focus{
  outline:none;
  border-color:var(--accent);
}

.ss-calc,
.lab-calc{
  margin-top:8px;
  padding:8px 10px;
  background:var(--red-lt);
  border-radius:8px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  font-size:12px;
  font-weight:700;
  color:var(--red);
}

.ss-calc .sv,
.lab-calc .lv{
  font-family:'IBM Plex Mono',monospace;
  font-size:15px;
}

.lab-box label{
  font-size:11px;
  font-weight:700;
  color:var(--subtext);
  display:block;
  margin-bottom:5px;
  letter-spacing:.3px;
}

.lab-box input{
  width:100%;
  border:1.5px solid var(--border);
  border-radius:8px;
  padding:8px 10px;
  font-family:'IBM Plex Mono',monospace;
  font-size:14px;
  background:var(--bg);
  color:var(--text);
}

.lab-box input:focus{
  outline:none;
  border-color:var(--accent);
}

/* ---------- Switch ---------- */

.switch{
  position:relative;
  width:40px;
  height:22px;
  flex-shrink:0;
}

.switch input{
  opacity:0;
  width:0;
  height:0;
}

.slider{
  position:absolute;
  inset:0;
  background:var(--border);
  border-radius:999px;
  cursor:pointer;
  transition:.15s;
}

.slider:before{
  content:'';
  position:absolute;
  width:16px;
  height:16px;
  left:3px;
  top:3px;
  background:var(--bg);
  border-radius:50%;
  transition:.15s;
}

input:checked+.slider{
  background:var(--accent);
}

input:checked+.slider:before{
  transform:translateX(18px);
}

/* ---------- Net ---------- */

.net-box{
  background:var(--accent);
  border-radius:12px;
  padding:14px 16px;
  margin-top:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.net-box .nl{
  font-size:13px;
  font-weight:700;
  color:color-mix(in srgb,var(--bg) 80%,var(--accent));
}

.net-box .nv{
  font-family:'IBM Plex Mono',monospace;
  font-size:24px;
  font-weight:800;
  color:var(--bg);
}

.formula{
  font-size:11px;
  color:var(--subtext);
  margin-top:6px;
  font-family:'IBM Plex Mono',monospace;
  padding:0 2px;
}

.formula .neg{
  color:var(--red);
}

.formula .pos{
  color:var(--green);
}

.modal-footer{
  display:flex;
  gap:8px;
  margin-top:16px;
}

.modal-footer .btn{
  flex:1;
}

.entry-card{
  background:var(--surface);
  border:1.5px solid var(--border);
  border-radius:12px;
  padding:14px 16px;
  margin-bottom:10px;
  transition:.15s;
}

.entry-card:hover{
  border-color:var(--surface2);
}

.ec-top{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:10px;
}

.ec-name{
  display:flex;
  align-items:center;
  gap:8px;
  font-size:14px;
  font-weight:800;
  color:var(--text);
}

.ec-meta{
  margin-top:4px;
  font-size:11px;
  color:var(--subtext);
  line-height:1.5;
}

.ec-meta i{
  color:var(--accent);
}

.ec-net{
  font-family:'IBM Plex Mono',monospace;
  font-size:18px;
  font-weight:800;
  color:var(--accent);
  white-space:nowrap;
}

.ec-cases{
  margin-top:12px;
  border-top:1px solid var(--border);
  padding-top:10px;
}

.case-line{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:5px 0;
  border-bottom:1px dashed var(--border);
}

.case-line:last-child{
  border-bottom:none;
}

.case-line .ca{
  color:var(--text);
}

.case-line .cv{
  font-family:'IBM Plex Mono',monospace;
  font-weight:700;
  color:var(--text);
}

.ec-deduct{
  margin-top:8px;
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  font-size:11px;
  color:var(--red);
}

.ec-note{
  margin-top:9px;
  padding-top:8px;
  border-top:1px solid var(--border);
  color:var(--subtext);
  font-size:12px;
  font-style:italic;
}

/* ---------- Empty ---------- */

.empty-state,
.empty-state-cream{
  text-align:center;
  padding:34px 12px;
}

.empty-state{
  color:var(--subtext);
}

.empty-state-cream{
  color:var(--subtext);
}

.empty-state .big,
.empty-state-cream .big{
  font-size:32px;
  margin-bottom:8px;
  opacity:.45;
}

/* ---------- Search history ---------- */
.gear-btn.active{color:var(--accent);}
.history-head{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;margin:28px 0 18px;}
.history-eyebrow{font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:700;color:var(--subtext);margin-bottom:6px;}
.history-head h2{font-family:'IBM Plex Mono',monospace;font-size:27px;font-weight:500;color:var(--text);}
.history-close{border:0;background:transparent;color:var(--subtext);font-size:17px;cursor:pointer;}
.history-search{display:flex;align-items:center;gap:12px;border-bottom:2px solid var(--surface2);padding:10px 2px 12px;transition:.15s;}
.history-search:focus-within{border-color:var(--accent);}
.history-search>i{color:var(--accent);font-size:18px;}
.history-search input{width:100%;border:0;outline:0;background:transparent;color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:20px;}
.history-search input::placeholder{color:var(--surface2);}
.history-filters{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin:15px 0 28px;}
.history-filter{border:0;border-radius:7px;background:var(--surface);color:var(--text);padding:8px 10px;font-size:11px;font-weight:700;outline:0;}
.history-count{margin-left:auto;font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--subtext);}
.history-group{margin-top:25px;}
.history-month{display:flex;align-items:center;gap:8px;font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:700;color:var(--subtext);margin-bottom:9px;}
.history-month span{background:var(--subtext);color:var(--bg);padding:3px 7px;border-radius:5px;font-size:9px;}
.history-results{display:flex;flex-direction:column;gap:3px;}
.history-result{display:grid;grid-template-columns:105px minmax(0,1fr) 105px;align-items:center;gap:16px;padding:13px 14px;border:0;border-bottom:1px solid var(--border);width:100%;background:transparent;color:var(--text);text-align:left;cursor:pointer;}
.history-result:nth-child(odd){background:var(--surface);}
.history-result:hover{background:var(--surface2);}
.history-date{font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:700;}
.history-shift{display:block;font-family:'Sarabun',sans-serif;font-size:10px;color:var(--subtext);margin-top:4px;}
.history-clinic{display:flex;align-items:center;gap:7px;font-weight:800;font-size:13px;}
.history-details{font-size:11px;color:var(--subtext);margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.history-money{text-align:right;}
.history-money strong{display:block;font-family:'IBM Plex Mono',monospace;font-size:13px;color:var(--accent);}
.history-money span{font-size:10px;color:var(--subtext);}
.history-empty{display:none;text-align:center;color:var(--subtext);padding:55px 10px;font-family:'IBM Plex Mono',monospace;font-size:12px;}
.history-empty i{display:block;font-size:26px;margin-bottom:12px;}
.history-hint{margin-top:32px;border-top:1px solid var(--border);padding-top:12px;font-size:10px;color:var(--subtext);}

/* ---------- Yearly overview ---------- */
.annual-head{display:flex;align-items:flex-end;justify-content:space-between;gap:18px;margin-bottom:18px;}
.annual-eyebrow{font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:700;color:var(--subtext);margin-bottom:6px;}
.annual-head h2{font-family:'IBM Plex Mono',monospace;font-size:27px;font-weight:500;line-height:1.15;color:var(--text);}
.annual-nav{display:flex;align-items:center;gap:7px;}
.annual-nav button{width:32px;height:32px;border:0;border-radius:7px;background:var(--surface);color:var(--text);cursor:pointer;}
.annual-nav button:hover{background:var(--accent);color:var(--bg);}
.annual-year{min-width:66px;text-align:center;font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:700;color:var(--text);}
.annual-stats{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:24px;margin:34px 0 46px;}
.annual-stat{min-width:0;}
.annual-stat-label{font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:700;color:var(--subtext);margin-bottom:8px;}
.annual-stat-value{font-family:'IBM Plex Mono',monospace;font-size:23px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.annual-stat-note{font-size:10px;color:var(--subtext);margin-top:5px;}
.annual-stat.primary .annual-stat-value{font-size:27px;color:var(--accent);}
.annual-section{margin-top:28px;}
.annual-section-head{display:flex;align-items:center;justify-content:space-between;gap:14px;margin-bottom:12px;}
.annual-section-title{display:flex;align-items:center;gap:8px;font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:600;color:var(--text);}
.annual-badge{background:var(--subtext);color:var(--bg);font-family:'IBM Plex Mono',monospace;font-size:9px;padding:4px 7px;border-radius:5px;}
.annual-metric{font-size:10px;color:var(--subtext);}
.annual-metric strong{font-family:'IBM Plex Mono',monospace;color:var(--accent);font-size:12px;}
.annual-chart-shell{border-top:1px solid var(--border);border-bottom:1px solid var(--border);padding:20px 0 9px;}
.annual-chart{height:225px;display:grid;grid-template-columns:repeat(12,minmax(0,1fr));align-items:end;gap:7px;position:relative;padding-top:18px;}
.annual-chart::before,.annual-chart::after{content:"";position:absolute;left:0;right:0;border-top:1px dashed var(--border);}
.annual-chart::before{top:33%;}.annual-chart::after{top:66%;}
.annual-month{height:100%;display:flex;flex-direction:column;justify-content:flex-end;align-items:center;gap:7px;position:relative;z-index:1;}
.annual-bar-wrap{width:100%;height:178px;display:flex;align-items:flex-end;justify-content:center;}
.annual-bar{width:min(23px,70%);height:var(--h);min-height:4px;background:var(--surface2);border-radius:2px 2px 0 0;position:relative;transition:.16s;}
.annual-bar.best,.annual-bar:hover{background:var(--accent);}
.annual-bar:hover{transform:translateY(-3px);}
.annual-bar span{display:none;position:absolute;left:50%;bottom:calc(100% + 7px);transform:translateX(-50%);background:var(--text);color:var(--bg);font-family:'IBM Plex Mono',monospace;font-size:9px;padding:5px 7px;border-radius:4px;white-space:nowrap;}
.annual-bar:hover span{display:block;}
.annual-month-label{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--subtext);}
.annual-insights{display:grid;grid-template-columns:repeat(3,1fr);gap:24px;margin-top:22px;}
.annual-insight{display:flex;align-items:center;gap:10px;}
.annual-insight i{width:18px;text-align:center;color:var(--accent);}
.annual-insight span{display:block;font-size:10px;color:var(--subtext);}
.annual-insight strong{font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:500;color:var(--text);}
.annual-table-wrap{overflow-x:auto;}
.annual-table{min-width:620px;}
.annual-table th{background:transparent;color:var(--subtext);font-family:'IBM Plex Mono',monospace;font-size:9px;}
.annual-table tbody tr:nth-child(odd) td{background:var(--surface);}
.annual-table td.net-col{color:var(--accent);}

@media(max-width:520px){
  .cal-header{padding:16px 16px 12px;}
  .cal-header .month-num{font-size:72px;}
  .cal-header .month-name{font-size:22px;}
  .cell{min-height:60px;padding:5px 5px 4px;}
  .cell .dnum{font-size:11px;}
  .cell .cnet{font-size:9px;}
  nav.tabs button{padding:7px 11px;font-size:12px;}
  .cases-hd{grid-template-columns:1fr 85px 30px;}
  .case-row{grid-template-columns:1fr 85px 30px;}
  .user-chip .uname{display:none;}
  .settings-panel{right:-10px;width:225px;}
  .annual-head{align-items:center;}
  .annual-head h2{font-size:21px;}
  .annual-stats{grid-template-columns:repeat(2,minmax(0,1fr));gap:22px 14px;margin:28px 0 38px;}
  .annual-stat-value{font-size:18px;}
  .annual-stat.primary .annual-stat-value{font-size:21px;}
  .annual-chart{height:195px;gap:3px;}
  .annual-bar-wrap{height:148px;}
  .annual-month-label{font-size:8px;}
  .annual-insights{grid-template-columns:1fr;gap:12px;}
  .annual-metric{display:none;}
  .history-head h2{font-size:21px;}
  .history-search input{font-size:16px;}
  .history-count{width:100%;margin:3px 0 0;}
  .history-result{grid-template-columns:82px minmax(0,1fr);gap:10px;padding:12px 10px;}
  .history-money{grid-column:2;text-align:left;display:flex;align-items:center;gap:8px;}
  .history-money strong{font-size:12px;}
  .history-details{white-space:normal;}
}

function hexToRgb(hex){
  const h=hex.replace('#','');
  return {r:parseInt(h.slice(0,2),16),g:parseInt(h.slice(2,4),16),b:parseInt(h.slice(4,6),16)};
}

function mixHex(hex,target,amt){
  const c1=hexToRgb(hex),c2=hexToRgb(target);
  const r=Math.round(c1.r+(c2.r-c1.r)*amt);
  const g=Math.round(c1.g+(c2.g-c1.g)*amt);
  const b=Math.round(c1.b+(c2.b-c1.b)*amt);
  return '#'+[r,g,b].map(v=>Math.max(0,Math.min(255,v)).toString(16).padStart(2,'0')).join('');
}

function loadThemeKey(){
  const saved=localStorage.getItem(THEME_KEY);
  return (saved && THEMES[saved]) ? saved : 'terrazzo';
}

function applyTheme(key){
  const th=THEMES[key]||THEMES.terrazzo;
  const root=document.documentElement.style;

  root.setProperty('--bg',th.bg);
  root.setProperty('--surface',th.surface);
  root.setProperty('--surface2',th.surface2);
  root.setProperty('--text',th.text);
  root.setProperty('--subtext',th.subtext);
  root.setProperty('--accent',th.accent);
  root.setProperty('--accent-hover',th.accentHover);
  root.setProperty('--border',th.border);

  root.setProperty('--cream',th.bg);
  root.setProperty('--cream-dk',th.surface);
  root.setProperty('--cream-dk2',th.border);

  root.setProperty('--blue',th.text);
  root.setProperty('--blue-dk',th.accent);
  root.setProperty('--blue-lt',th.surface);

  root.setProperty('--green',th.subtext);
  root.setProperty('--green-lt',mixHex(th.subtext,th.bg,0.76));

  root.setProperty('--red',th.danger);
  root.setProperty('--red-lt',mixHex(th.danger,th.bg,0.82));
  root.setProperty('--gold','#C9A227');

  localStorage.setItem(THEME_KEY,key);
  if(typeof S!=='undefined') S.themeKey=key;
}

function startListening(uidVal){
  clinicsLoaded=false; entriesLoaded=false;
  unsubClinics = onSnapshot(clinicsDocRef(uidVal), async snap=>{
    if(snap.exists()){
      clinics = snap.data().list || [];
    } else {
      clinics = defaultClinics();
      try{ await setDoc(clinicsDocRef(uidVal), {list:clinics}); }catch(e){}
    }
    clinicsLoaded=true;
    tryFirstRender();
    if(clinicsLoaded && entriesLoaded) renderContent();
  }, err=>{
    console.error(err);
    alert('เชื่อมต่อ Firestore ไม่สำเร็จ (คลินิก): '+err.message);
  });
  unsubEntries = onSnapshot(entriesDocRef(uidVal), snap=>{
    entries = snap.exists() ? (snap.data().data || {}) : {};
    entriesLoaded=true;
    tryFirstRender();
    if(clinicsLoaded && entriesLoaded) renderContent();
  }, err=>{
    console.error(err);
    alert('เชื่อมต่อ Firestore ไม่สำเร็จ (รายการ): '+err.message);
  });
}
function stopListening(){
  if(unsubClinics){unsubClinics();unsubClinics=null;}
  if(unsubEntries){unsubEntries();unsubEntries=null;}
}

function tryFirstRender(){
  if(clinicsLoaded && entriesLoaded && document.getElementById('content')===null){

}

function calc(e){
  const cases=e.cases||[];
  const gross=cases.reduce((s,c)=>s+(Number(c.amount)||0),0);
  const dfPct=Number(e.dfPct)||0;
  const dfIncome=Math.round(gross*dfPct/100);
  const totalCases=cases.length;
  const ssCases=Number(e.ssCaseCount)||0;
  const labTot=Number(e.labFeeTotal)||0;
  const labShare=Math.round(labTot*LAB_SPLIT_PCT/100);
  const ss=e.ssDeduct?ssCases*SS_PER_CASE:0;
  const wht=e.whtDeduct?Math.round(dfIncome*WHT_PCT/100):0;
  const net=dfIncome-ss-labShare;
  const netAfterWht=net-wht;
  return{gross,dfPct,dfIncome,totalCases,ssCases,labTot,labShare,ss,wht,net,netAfterWht};
}
function dayE(d){return entries[d]||[];}
function yearE(y){
  const out=[];
  Object.keys(entries).forEach(d=>{
    const yy=Number(d.split('-')[0]);
    if(yy===y) entries[d].forEach(e=>out.push({date:d,...e}));
  });
  return out;
}
function monthE(y,m){
  const out=[];
  Object.keys(entries).forEach(d=>{
    const[yy,mm]=d.split('-').map(Number);
    if(yy===y&&mm-1===m) entries[d].forEach(e=>out.push({date:d,...e}));
  });
  return out;
}

function downloadDataBackup(){
  const payload={
    app:'DF Tracker',
    version:1,
    exportedAt:new Date().toISOString(),
    clinics,
    entries
  };
  const blob=new Blob([JSON.stringify(payload,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const link=document.createElement('a');
  link.href=url;
  link.download=`df-tracker-backup-${new Date().toISOString().slice(0,10)}.json`;
  link.style.display='none';
  document.body.appendChild(link);
  link.click();
  link.remove();
  setTimeout(()=>URL.revokeObjectURL(url),1000);
}

async function importDataBackup(file){
  if(!file) return;
  try{
    const parsed=JSON.parse(await file.text());
    const payload=parsed?.data && !parsed.clinics ? parsed.data : parsed;
    const nextClinics=payload?.clinics;
    const nextEntries=payload?.entries;
    const validClinics=Array.isArray(nextClinics) && nextClinics.every(c=>c && typeof c==='object' && typeof c.id==='string' && typeof c.name==='string');
    const validEntries=nextEntries && typeof nextEntries==='object' && !Array.isArray(nextEntries) && Object.entries(nextEntries).every(([date,list])=>/^\d{4}-\d{2}-\d{2}$/.test(date) && Array.isArray(list));
    if(!validClinics || !validEntries) throw new Error('รูปแบบไฟล์ไม่ใช่ข้อมูลของ DF Tracker');
    const entryCount=Object.values(nextEntries).reduce((sum,list)=>sum+list.length,0);
    if(!confirm(`นำเข้า ${nextClinics.length} คลินิก และ ${entryCount} รายการ?\nข้อมูลปัจจุบันจะถูกแทนที่`)) return;
    if(!currentUser) throw new Error('กรุณาเข้าสู่ระบบก่อนนำเข้าข้อมูล');
    setSyncing(true);
    const batch=writeBatch(db);
    batch.set(clinicsDocRef(currentUser.uid),{list:nextClinics});
    batch.set(entriesDocRef(currentUser.uid),{data:nextEntries});
    await batch.commit();
    clinics=nextClinics;
    entries=nextEntries;
    S.settingsOpen=false;
    renderApp();
    alert('นำเข้าข้อมูลเรียบร้อยแล้ว');
  }catch(err){
    alert('นำเข้าข้อมูลไม่สำเร็จ: '+err.message);
  }finally{
    setSyncing(false);
  }
}

/* ═══════════ Search history ═══════════ */
function renderSearch(el){
  const years=[...new Set(Object.keys(entries).map(date=>Number(date.slice(0,4))).filter(Boolean))].sort((a,b)=>b-a);
  const searchMonths=['January','February','March','April','May','June','July','August','September','October','November','December'];
  el.innerHTML=`
    <div class="history-head"><div><div class="history-eyebrow">SEARCH HISTORY</div><h2>Find past entries</h2></div><button class="history-close" id="historyClose" aria-label="ปิดการค้นหา"><i class="fa-solid fa-xmark"></i></button></div>
    <label class="history-search"><i class="fa-solid fa-magnifying-glass"></i><input id="historyQuery" type="search" value="${esc(S.searchQuery)}" placeholder="Search clinic, case or note..." autocomplete="off"></label>
    <div class="history-filters">
      <select class="history-filter" id="historyClinic" aria-label="Clinic"><option value="all">All clinics</option>${clinics.map(c=>`<option value="${esc(c.id)}"${S.searchClinic===c.id?' selected':''}>${esc(c.name)}</option>`).join('')}</select>
      <select class="history-filter" id="historyYear" aria-label="Year"><option value="all">All years</option>${years.map(year=>`<option value="${year}"${String(S.searchYear)===String(year)?' selected':''}>${year+543}</option>`).join('')}</select>
      <select class="history-filter" id="historyShift" aria-label="Shift"><option value="all">All shifts</option><option value="evening"${S.searchShift==='evening'?' selected':''}>ช่วงเย็น</option><option value="fullday"${S.searchShift==='fullday'?' selected':''}>ทั้งวัน</option></select>
      <div class="history-count" id="historyCount"></div>
    </div>
    <div id="historyGroups"></div>
    <div class="history-empty" id="historyEmpty"><i class="fa-solid fa-magnifying-glass"></i>No matching entries</div>
    <div class="history-hint">Search includes clinic name, case description and notes. Select a result to edit the original entry.</div>`;

  const query=el.querySelector('#historyQuery');
  const clinicFilter=el.querySelector('#historyClinic');
  const yearFilter=el.querySelector('#historyYear');
  const shiftFilter=el.querySelector('#historyShift');
  const groups=el.querySelector('#historyGroups');
  const empty=el.querySelector('#historyEmpty');
  const count=el.querySelector('#historyCount');

  function paint(){
    const q=S.searchQuery.trim().toLowerCase();
    const matches=[];
    Object.entries(entries).forEach(([date,list])=>list.forEach(entry=>{
      const clinic=byId(entry.clinicId);
      const caseText=(entry.cases||[]).map(item=>item.desc||'').filter(Boolean).join(' · ');
      const searchable=`${clinic?.name||''} ${caseText} ${entry.note||''} ${date}`.toLowerCase();
      if(S.searchClinic!=='all'&&entry.clinicId!==S.searchClinic) return;
      if(S.searchYear!=='all'&&!date.startsWith(String(S.searchYear))) return;
      if(S.searchShift!=='all'&&entry.shift!==S.searchShift) return;
      if(q&&!searchable.includes(q)) return;
      matches.push({date,entry,clinic,caseText,totals:calc(entry)});
    }));
    matches.sort((a,b)=>b.date.localeCompare(a.date));
    count.textContent=`${matches.length} results · ฿${fmt(matches.reduce((sum,item)=>sum+item.totals.netAfterWht,0))} net`;
    const grouped={};
    matches.forEach(item=>{const key=item.date.slice(0,7);(grouped[key]??=[]).push(item);});
    groups.innerHTML=Object.entries(grouped).map(([key,list])=>{
      const[yy,mm]=key.split('-').map(Number);
      return `<section class="history-group"><div class="history-month"><span>${searchMonths[mm-1].slice(0,3).toUpperCase()}</span>${searchMonths[mm-1]} ${yy+543}</div><div class="history-results">${list.map(item=>{
        const{date,entry,clinic,caseText,totals}=item;
        const[dy,dm,dd]=date.split('-').map(Number);
        const deductions=totals.ss+totals.labShare+totals.wht;
        return `<button class="history-result" data-history-date="${date}" data-history-id="${esc(entry.id||'')}"><div class="history-date">${dd}/${dm}/${dy+543}<span class="history-shift"><i class="fa-solid fa-${entry.shift==='evening'?'moon':'sun'}"></i> ${entry.shift==='evening'?'ช่วงเย็น':'ทั้งวัน'}</span></div><div><div class="history-clinic"><i class="cdot" style="background:${clinic?.color||'#aaa'}"></i>${esc(clinic?.name||'(deleted)')}</div><div class="history-details">${esc(caseText||`${totals.totalCases} cases`)}${entry.note?' · '+esc(entry.note):''}</div></div><div class="history-money"><strong>฿${fmt(totals.netAfterWht)}</strong><span>${deductions?'หัก ฿'+fmt(deductions):'No deductions'}</span></div></button>`;
      }).join('')}</div></section>`;
    }).join('');
    empty.style.display=matches.length?'none':'block';
  }

  query.oninput=()=>{S.searchQuery=query.value;paint();};
  clinicFilter.onchange=()=>{S.searchClinic=clinicFilter.value;paint();};
  yearFilter.onchange=()=>{S.searchYear=yearFilter.value;paint();};
  shiftFilter.onchange=()=>{S.searchShift=shiftFilter.value;paint();};
  groups.onclick=event=>{
    const button=event.target.closest('[data-history-date]');
    if(!button) return;
    const date=button.dataset.historyDate;
    const entry=dayE(date).find(item=>String(item.id||'')===button.dataset.historyId);
    if(!entry){S.searchOpen=false;S.dayModal=date;renderApp();return;}
    S.searchOpen=false;
    S.entryEditor={date,entry:{...entry,cases:(entry.cases||[]).map(item=>({...item}))}};
    renderApp();
  };
  el.querySelector('#historyClose').onclick=()=>{S.searchOpen=false;renderApp();};
  paint();
  requestAnimationFrame(()=>query.focus());
}

function renderCalendar(el){
  const y=S.y,m=S.m;
  const startDow=new Date(y,m,1).getDay();

  const filt=S.clinicFilter;
  const me=monthE(y,m).filter(e=>filt==='all'||e.clinicId===filt);
  const netMap={};
  me.forEach(e=>{const{net}=calc(e);netMap[e.date]=(netMap[e.date]||0)+net;});
  const maxNet=Math.max(1,...Object.values(netMap));
  const today=ds(new Date().getFullYear(),new Date().getMonth(),new Date().getDate());

  let cells='';
  for(let i=0;i<startDow;i++) cells+=`<div class="cell empty"></div>`;
  for(let d=1;d<=dim;d++){
    const date=ds(y,m,d);
    const de=dayE(date).filter(e=>filt==='all'||e.clinicId===filt);
    const net=netMap[date]||0;
    const pct=de.length?Math.max(6,Math.min(100,net/maxNet*100)):0;
    const dots=de.map(e=>{const c=byId(e.clinicId);return`<span class="cdot" style="background:${c?c.color:'#aaa'}"></span>`;}).join('');
    const isToday=date===today;
    cells+=`
      <div class="cell ${isToday?'today':''} ${de.length?'has-data':''}" data-date="${date}">
        <div class="dnum">${d}</div>
        <div class="cdots">${dots}</div>
        ${de.length?`<div class="cbar" style="width:${pct}%"></div><div class="cnet">฿${fmt(net)}</div>`:''}
      </div>`;
  }
  const total=startDow+dim;
  const rem=(7-total%7)%7;
  for(let i=0;i<rem;i++) cells+=`<div class="cell empty"></div>`;

  // Quick DF summary for the filtered set
  let qGross=0,qDf=0,qSS=0,qLab=0,qNet=0,qCases=0;
  me.forEach(e=>{
    const{gross,dfIncome,ss,labShare,net,totalCases}=calc(e);
    qGross+=gross;qDf+=dfIncome;qSS+=ss;qLab+=labShare;qNet+=net;qCases+=totalCases;
  });
  const qDays=new Set(me.map(e=>e.date)).size;

  el.innerHTML=`
    <div class="cal-wrap">
      <div class="cal-header">
        <div class="month-num">${pad2(m+1)}</div>
        <div class="month-right">
          <div class="month-name">${MN[m].toUpperCase()}.</div>
          <div class="year-label">${y+543}</div>
          <div class="mnav">
            <button id="pM"><i class="fa-solid fa-chevron-left"></i></button>
            <button id="nM"><i class="fa-solid fa-chevron-right"></i></button>
          </div>
        </div>
      </div>
      <div class="cal-grid">
        <div class="weekdays">${WD.map(w=>`<div>${w}</div>`).join('')}</div>
        <div class="daygrid">${cells}</div>
      </div>
    </div>
    <div class="clinic-filter">
      <button class="cf-chip ${filt==='all'?'active':''}" data-filt="all">ทั้งหมด</button>
      ${clinics.map(c=>`
        <button class="cf-chip ${filt===c.id?'active':''}" data-filt="${c.id}">
          <span class="cdot" style="background:${c.color}"></span>${c.name}
        </button>`).join('')}
    </div>
    <div class="quick-df">
      <div class="qd-title">${filt==='all'?'สรุป DF ทั้งเดือน':'สรุป DF · '+(byId(filt)?.name||'')}</div>
      <div class="qd-grid">
        <div class="qd-item"><span class="qd-l">Gross</span><span class="qd-v">฿${fmt(qGross)}</span></div>
        <div class="qd-item"><span class="qd-l">DF Income</span><span class="qd-v">฿${fmt(qDf)}</span></div>
        <div class="qd-item"><span class="qd-l">หักปกส./แลป</span><span class="qd-v neg">−฿${fmt(qSS+qLab)}</span></div>
        <div class="qd-item hilite"><span class="qd-l">สุทธิ</span><span class="qd-v">฿${fmt(qNet)}</span></div>
      </div>
    </div>`;
  el.querySelector('#pM').onclick=()=>shiftM(-1);
  el.querySelector('#nM').onclick=()=>shiftM(1);
  el.querySelectorAll('.cell[data-date]').forEach(c=>c.onclick=()=>{S.dayModal=c.dataset.date;renderModals();});
  el.querySelectorAll('.cf-chip').forEach(b=>b.onclick=()=>{S.clinicFilter=b.dataset.filt;renderContent();});
}
function shiftM(d){let m=S.m+d,y=S.y;if(m<0){m=11;y--;}if(m>11){m=0;y++;}S.m=m;S.y=y;renderContent();}

function clinicMonthRows(clinicId,y,m){
  return monthE(y,m)
    .filter(e=>e.clinicId===clinicId)
    .sort((a,b)=>a.date.localeCompare(b.date))
    .map(e=>{
      const{gross,dfIncome,ss,labShare,wht,net,netAfterWht,totalCases}=calc(e);
      return {
        date:e.date,
        gross,
        dfIncome,
        ss,
        labShare,
        wht,
        net,
        netAfterWht,
        totalCases
      };
    });
}

function downloadClinicSlip(clinicId){
  const clinic=byId(clinicId);
  if(!clinic){ alert('ไม่พบข้อมูลคลินิก'); return; }
  const rows=clinicMonthRows(clinicId,S.y,S.m);
  const totals=rows.reduce((a,r)=>{
    a.gross+=r.gross;
    a.dfIncome+=r.dfIncome;
    a.ss+=r.ss;
    a.labShare+=r.labShare;
    a.wht+=r.wht;
    a.net+=r.net;
    a.netAfterWht+=r.netAfterWht;
    a.cases+=r.totalCases;
    return a;
  },{gross:0,dfIncome:0,ss:0,labShare:0,wht:0,net:0,netAfterWht:0,cases:0});
  const receiptLines=rows.reduce((n,r)=>n+1+((r.labShare+r.ss+r.wht)>0?1:0),0);
  const width=600;
  const height=Math.max(760,430 + Math.max(receiptLines,1)*42);
  const exportScale=2;
  const canvas=document.createElement('canvas');
  canvas.width=width*exportScale;
  canvas.height=height*exportScale;
  const ctx=canvas.getContext('2d');
  ctx.scale(exportScale,exportScale);
  const bg='#FFFFFF';
  const surface='#F2F2F2';
  const border='#D8D8D8';
  const text='#111111';
  const sub='#6A6A6A';
  const accent='#111111';
  const danger='#111111';
  const font="'Sarabun', 'Tahoma', sans-serif";

  function roundRect(x,y,w,h,r,fill,stroke){
    ctx.beginPath();
    ctx.moveTo(x+r,y);
    ctx.lineTo(x+w-r,y);
    ctx.quadraticCurveTo(x+w,y,x+w,y+r);
    ctx.lineTo(x+w,y+h-r);
    ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
    ctx.lineTo(x+r,y+h);
    ctx.quadraticCurveTo(x,y+h,x,y+h-r);
    ctx.lineTo(x,y+r);
    ctx.quadraticCurveTo(x,y,x+r,y);
    if(fill){ctx.fillStyle=fill;ctx.fill();}
    if(stroke){ctx.strokeStyle=stroke;ctx.lineWidth=2;ctx.stroke();}
  }
  function txt(s,x,y,size=28,weight=600,color=text,align='left',style='normal'){
    ctx.font=`${style} ${weight} ${size}px ${font}`;
    ctx.fillStyle=color;
    ctx.textAlign='left';
    ctx.textBaseline='alphabetic';
    const value=String(s);
    const textWidth=ctx.measureText(value).width;
    const drawX=align==='right' ? x-textWidth : align==='center' ? x-(textWidth/2) : x;
    ctx.fillText(value,drawX,y);
  }
  function rule(y){
    ctx.save();
    ctx.strokeStyle=sub;
    ctx.lineWidth=1.5;
    ctx.setLineDash([5,4]);
    ctx.beginPath();
    ctx.moveTo(64,y);
    ctx.lineTo(width-64,y);
    ctx.stroke();
    ctx.restore();
  }
  function money(n){return '฿'+fmt(n);}
  function dateLabel(d){
    const[yy,mm,dd]=d.split('-').map(Number);
    return `${dd}/${mm}/${yy+543}`;
  }

  ctx.fillStyle=bg;
  ctx.fillRect(0,0,width,height);

  let y=92;
  txt(clinic.name.toUpperCase(),width/2,y,29,800,text,'center','italic');
  txt(MN[S.m],width/2,y+32,20,500,text,'center');
  y=178;
  txt('วันที่:',64,y,17,500,text);
  txt('DF',width-64,y,17,500,text,'right');
  rule(y+18);
  y+=58;

  if(!rows.length){
    txt('ยังไม่มีข้อมูลในเดือนที่เลือก',width/2,y+20,18,500,sub,'center');
    y+=70;
  } else {
    rows.forEach(r=>{
      const deductions=r.labShare+r.ss+r.wht;
      txt(dateLabel(r.date),64,y,18,500,text);
      txt(money(r.dfIncome),width-64,y,18,500,text,'right');
      y+=34;
      if(deductions){
        txt('- หักรวม',84,y,15,500,sub);
        txt('-'+money(deductions),width-64,y,15,500,sub,'right');
        y+=28;
      }
    });
  }

  y+=6;
  rule(y);
  y+=42;
  txt('รวมสุทธิ:',64,y,20,800,text);
  txt(money(totals.netAfterWht),width-64,y,22,800,text,'right');
  txt(`${MN[S.m]} ${S.y+543}`,width/2,height-70,17,500,sub,'center');

  const link=document.createElement('a');
  const safeName=clinic.name.replace(/[\\/:*?"<>|]+/g,'-').trim()||'clinic';
  link.download=`df-slip-${safeName}-${S.y}-${pad2(S.m+1)}.jpg`;
  link.href=canvas.toDataURL('image/jpeg',0.96);
  link.click();
}

          return`<tr>
            <td><span class="swatch" style="background:${c?c.color:'#aaa'}"></span> ${c?c.name:'(ลบแล้ว)'}</td>
            <td class="r">${b.days.size}</td>
            <td class="r">฿${fmt(b.gross)}</td>
            <td class="r">฿${fmt(b.dfIncome)}</td>
            <td class="r">฿${fmt(b.lab)}</td>
            <td class="r net-col">฿${fmt(b.net)}</td>
            <td class="action-cell">${c?`<button class="action-icon" data-slip="${id}" title="ดาวน์โหลดสลิป JPG" aria-label="ดาวน์โหลดสลิป ${c.name}"><i class="fa-solid fa-image"></i></button>`:''}</td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>`}`;
  el.querySelector('#pM').onclick=()=>shiftM(-1);
  el.querySelector('#nM').onclick=()=>shiftM(1);
  el.querySelectorAll('[data-slip]').forEach(b=>b.onclick=()=>downloadClinicSlip(b.dataset.slip));
}

/* ═══════════ Yearly / Tax ═══════════ */
function shiftYear(d){ S.taxYear+=d; renderContent(); }
function renderYearly(el){
  const y=S.taxYear;
  const ye=yearE(y);
  let tGross=0,tDf=0,tSS=0,tLab=0,tWht=0,tNet=0,tNetAfterWht=0;
  const monthlyNet=Array(12).fill(0);
  const byC={};
  ye.forEach(e=>{
    const{gross,dfIncome,ss,labShare,wht,net,netAfterWht}=calc(e);
    tGross+=gross;tDf+=dfIncome;tSS+=ss;tLab+=labShare;tWht+=wht;tNet+=net;tNetAfterWht+=netAfterWht;
    const monthIndex=Number(e.date.slice(5,7))-1;
    if(monthIndex>=0&&monthIndex<12) monthlyNet[monthIndex]+=netAfterWht;
    byC[e.clinicId]=byC[e.clinicId]||{dfIncome:0,deductions:0,netAfterWht:0,days:new Set()};
    const b=byC[e.clinicId];
    b.dfIncome+=dfIncome;b.deductions+=ss+labShare+wht;b.netAfterWht+=netAfterWht;b.days.add(e.date);
  });
  const days=new Set(ye.map(e=>e.date)).size;
  const totalDeductions=tSS+tLab+tWht;
  const monthLabels=['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
  const maxMonth=Math.max(...monthlyNet,0);
  const bestIndex=maxMonth?monthlyNet.indexOf(maxMonth):-1;
  const previousNet=yearE(y-1).reduce((sum,e)=>sum+calc(e).netAfterWht,0);
  const growth=previousNet?((tNetAfterWht-previousNet)/previousNet)*100:null;
  const growthLabel=growth===null?'—':`${growth>=0?'+':''}${growth.toFixed(1)}%`;
  const sortedClinics=Object.entries(byC).sort((a,b)=>b[1].netAfterWht-a[1].netAfterWht);

  el.innerHTML=`
    <div class="annual-head">
      <div><div class="annual-eyebrow">YEARLY OVERVIEW</div><h2>Annual income overview</h2></div>
      <div class="annual-nav">
        <button id="pY" aria-label="ปีก่อน"><i class="fa-solid fa-chevron-left"></i></button>
        <div class="annual-year">${y+543}</div>
        <button id="nY" aria-label="ปีหน้า"><i class="fa-solid fa-chevron-right"></i></button>
      </div>
    </div>
    <div class="annual-stats">
      <div class="annual-stat"><div class="annual-stat-label">WORK DAYS</div><div class="annual-stat-value">${days} days</div><div class="annual-stat-note">Avg. ${days?Math.round((days/12)*10)/10:0} days / month</div></div>
      <div class="annual-stat"><div class="annual-stat-label">SECTION 40(2) INCOME</div><div class="annual-stat-value">฿${fmt(tDf)}</div><div class="annual-stat-note">Before deductions</div></div>
      <div class="annual-stat"><div class="annual-stat-label">TOTAL DEDUCTIONS</div><div class="annual-stat-value">฿${fmt(totalDeductions)}</div><div class="annual-stat-note">ปกส. · Lab · WHT</div></div>
      <div class="annual-stat primary"><div class="annual-stat-label">NET INCOME</div><div class="annual-stat-value">฿${fmt(tNetAfterWht)}</div><div class="annual-stat-note">After all deductions</div></div>
    </div>

    <div class="annual-section">
      <div class="annual-section-head"><div class="annual-section-title"><span class="annual-badge">12 MONTHS</span> Monthly net income</div><div class="annual-metric">Total <strong>฿${fmt(tNetAfterWht)}</strong></div></div>
      <div class="annual-chart-shell"><div class="annual-chart">
        ${monthlyNet.map((value,index)=>`<div class="annual-month"><div class="annual-bar-wrap"><div class="annual-bar ${index===bestIndex?'best':''}" style="--h:${maxMonth?Math.max(3,(value/maxMonth)*100):0}%"><span>฿${fmt(value)}</span></div></div><div class="annual-month-label">${monthLabels[index]}</div></div>`).join('')}
      </div></div>
      <div class="annual-insights">
        <div class="annual-insight"><i class="fa-solid fa-crown"></i><div><span>Best month</span><strong>${bestIndex>=0?`${monthLabels[bestIndex]} · ฿${fmt(maxMonth)}`:'—'}</strong></div></div>
        <div class="annual-insight"><i class="fa-solid fa-calendar-day"></i><div><span>Average per work day</span><strong>${days?'฿'+fmt(tNetAfterWht/days):'—'}</strong></div></div>
        <div class="annual-insight"><i class="fa-solid fa-arrow-trend-up"></i><div><span>Year-over-year</span><strong>${growthLabel}</strong></div></div>
      </div>
    </div>

    <div class="annual-section">
      <div class="annual-section-head"><div class="annual-section-title"><span class="annual-badge">BY CLINIC</span> Clinic comparison</div><div class="annual-metric">Sorted by net income</div></div>
      ${!sortedClinics.length?`<div class="empty-state"><div class="big"><span class="solid-ico"><i class="fa-solid fa-receipt"></i></span></div>ยังไม่มีข้อมูลปีนี้</div>`:`
      <div class="annual-table-wrap"><table class="annual-table">
      <thead><tr><th>CLINIC</th><th class="r">DAYS</th><th class="r">40(2) INCOME</th><th class="r">ปกส. / LAB / WHT</th><th class="r">NET</th></tr></thead>
      <tbody>
        ${sortedClinics.map(([id,b])=>{
          const c=byId(id);
          return`<tr>
            <td><span class="swatch" style="background:${c?c.color:'#aaa'}"></span> ${c?c.name:'(deleted)'}</td>
            <td class="r">${b.days.size}</td>
            <td class="r">฿${fmt(b.dfIncome)}</td>
            <td class="r">฿${fmt(b.deductions)}</td>
            <td class="r net-col">฿${fmt(b.netAfterWht)}</td>
          </tr>`;
        }).join('')}
      </tbody>
      </table></div>`}
    </div>
    <div class="tax-note">
      <span class="solid-ico"><i class="fa-solid fa-clipboard-list"></i></span>เงินได้ประเภทนี้จัดเป็น <strong>มาตรา 40(2)</strong> — ใช้ยอด "เงินได้ 40(2) รวม" ด้านบนเป็นฐานยื่นภาษีเงินได้บุคคลธรรมดา ส่วนยอดหัก ณ ที่จ่ายใช้เป็นเครดิตภาษีตอนยื่นแบบได้
    </div>`;
  el.querySelector('#pY').onclick=()=>shiftYear(-1);
  el.querySelector('#nY').onclick=()=>shiftYear(1);
}


function renderModals(){
  let host=document.getElementById('mhost');
  if(!host){host=document.createElement('div');host.id='mhost';document.body.appendChild(host);}
  host.innerHTML='';
  if(S.dayModal)     host.appendChild(buildDayModal(S.dayModal));
  if(S.entryEditor)  host.appendChild(buildEntryEditor(S.entryEditor));
  if(S.clinicEditor) host.appendChild(buildClinicEditor(S.clinicEditor));
}

/* Entry editor */
function buildEntryEditor(ctx){
  const wrap=document.createElement('div');
  wrap.className='overlay';
  wrap.onclick=ev=>{if(ev.target===wrap){S.entryEditor=null;renderModals();}};
  const isNew=!ctx.entry;
  let draft=ctx.entry
    ?{...ctx.entry,cases:(ctx.entry.cases||[]).map(c=>({...c}))}
    :{id:uid(),clinicId:'',shift:'evening',dfPct:40,cases:[],ssDeduct:false,ssCaseCount:0,xrayFee:false,whtDeduct:false,labFeeTotal:0,note:''};

  function formula(){
    const{gross,dfPct,dfIncome,ssCases,ss,labShare,net}=calc(draft);
    let f=`฿${fmt(gross)} × ${dfPct}% = ฿${fmt(dfIncome)}`;
    if(ss>0)       f+=` <span class="neg">− ฿${fmt(ss)} (ปกส.×${ssCases})</span>`;
    if(labShare>0) f+=` <span class="neg">− ฿${fmt(labShare)} (แลป${LAB_SPLIT_PCT}%)</span>`;
    f+=` = <span class="pos">฿${fmt(net)}</span>`;
    return f;
  }

  function paint(){
    const{gross,dfIncome,totalCases,ssCases,ss,labShare,labTot,wht,net,netAfterWht}=calc(draft);
    const cl=byId(draft.clinicId);
    wrap.innerHTML=`
      <div class="modal">
        <div class="modal-h"><h2>${isNew?'เพิ่มรายการ':'แก้ไขรายการ'}</h2></div>
        <div class="field">
          <label>คลินิก</label>
          <select id="fClin">
            <option value=""${!draft.clinicId?' selected':''}>- เลือกคลินิก -</option>
            ${clinics.map(c=>`<option value="${c.id}"${c.id===draft.clinicId?' selected':''}>${c.name}</option>`).join('')}
          </select>
        </div>
        <div class="field">
          <label>DF % (สัดส่วนที่หมอได้)</label>
          <div style="display:flex;align-items:center;gap:10px;">
            <input type="number" id="fDF" value="${draft.dfPct||0}" min="0" max="100" style="width:90px;border:2px solid var(--blue);border-radius:9px;padding:8px 10px;font-family:'IBM Plex Mono',monospace;font-size:16px;font-weight:700;text-align:center;color:var(--blue);background:rgba(255,255,255,.05);"/>
            <span style="font-size:13px;color:var(--blue);opacity:.6;">% จาก Gross ฿${fmt(gross)} = <strong>฿${fmt(dfIncome)}</strong></span>
          </div>
        </div>
        <div class="field">
          <label>ช่วงที่ทำ</label>
          <div class="seg">
            <button type="button" data-sh="evening" class="${draft.shift==='evening'?'active':''}"><i class="fa-solid fa-moon shift-ico"></i>ช่วงเย็น</button>
            <button type="button" data-sh="fullday"  class="${draft.shift==='fullday' ?'active':''}"><i class="fa-solid fa-sun shift-ico"></i>ทั้งวัน</button>
          </div>
        </div>

        <div style="font-size:11px;font-weight:700;color:var(--blue);opacity:.6;margin-bottom:5px;letter-spacing:.3px;">รายการเคส</div>
        <div class="cases-wrap">
          <div class="cases-hd"><span>งานที่ทำ</span><span style="text-align:right;">ได้รับ (฿)</span><span></span></div>
          ${draft.cases.map((c,i)=>`
            <div class="case-row">
              <input type="text" class="cdesc" data-i="${i}" placeholder="เคส ${i+1}" value="${c.desc||''}"/>
              <input type="number" class="camt"  data-i="${i}" value="${c.amount||''}" placeholder="0" min="0"/>
              <button class="btn-icon" data-rm="${i}"><i class="fa-solid fa-xmark"></i></button>
            </div>`).join('')}
          ${totalCases>0?`<div class="cases-total"><span>รวม ${totalCases} เคส</span><span class="tv">฿${fmt(gross)}</span></div>`:''}
          <button class="add-case-btn" id="addCase"><i class="fa-solid fa-plus icon-inline"></i>เพิ่มเคส</button>
        </div>

        <div class="ss-box">
          <div class="ss-top">
            <div>
              <div class="ss-label">หักประกันสังคม</div>
              <div class="ss-hint">ระบุจำนวนเคสที่เป็นงาน ปกส. แยกจากเคสทั้งหมด</div>
            </div>
            <label class="switch"><input type="checkbox" id="fSS"${draft.ssDeduct?' checked':''}><span class="slider"></span></label>
          </div>
          ${draft.ssDeduct?`
            <div class="ss-count-row">
              <label>จำนวนเคส ปกส.</label>
              <input type="number" id="fSSCount" value="${draft.ssCaseCount||0}" min="0" placeholder="0"/>
              <span style="font-size:12px;color:var(--blue);opacity:.6;">เคส × ฿${SS_PER_CASE}</span>
            </div>
            ${ssCases>0?`<div class="ss-calc"><span>${ssCases} เคส × ฿${SS_PER_CASE}</span><span class="sv">−฿${fmt(ss)}</span></div>`:''}
          `:``}
        </div>

        <div class="lab-box">
          <label>ค่าแลปรวม (บาท) — หมอออก ${LAB_SPLIT_PCT}%</label>
          <input type="number" id="fLab" value="${draft.labFeeTotal||''}" placeholder="0" min="0"/>
          ${labTot>0?`<div class="lab-calc"><span>หมอออก ${LAB_SPLIT_PCT}% (คลินิก ${100-LAB_SPLIT_PCT}%)</span><span class="lv">−฿${fmt(labShare)}</span></div>`:''}
        </div>

        <div class="ss-box">
          <div class="ss-top">
            <div>
              <div class="ss-label">หัก ณ ที่จ่าย ${WHT_PCT}% (40(2))</div>
              <div class="ss-hint">คำนวณจาก DF Income — ใช้สำหรับสรุปยื่นภาษีรายปี</div>
            </div>
            <label class="switch"><input type="checkbox" id="fWht"${draft.whtDeduct?' checked':''}><span class="slider"></span></label>
          </div>
          ${draft.whtDeduct&&wht>0?`<div class="ss-calc wht-calc"><span>DF ฿${fmt(dfIncome)} × ${WHT_PCT}%</span><span class="sv">−฿${fmt(wht)}</span></div>`:''}
        </div>

        ${cl?.xrayFee?`<div style="margin-bottom:12px;"><span class="pill"><span class="solid-ico"><i class="fa-solid fa-camera"></i></span>คลินิกนี้ได้ค่าฟิล์ม</span></div>`:''}

        <div class="field">
          <label>หมายเหตุ</label>
          <input type="text" id="fNote" value="${draft.note||''}" placeholder="เคสพิเศษ, โน้ตอื่นๆ"/>
        </div>

        <div style="font-size:12px;color:var(--blue);opacity:.55;margin-top:10px;margin-bottom:4px;font-family:'IBM Plex Mono',monospace;">
          Gross ฿${fmt(gross)} × ${draft.dfPct||0}% → DF ฿${fmt(dfIncome)}
        </div>
        <div class="net-box">
          <div class="nl">รายได้สุทธิ</div>
          <div class="nv">฿${fmt(net)}</div>
        </div>
        <div class="formula">${formula()}</div>

        <div class="modal-footer">
          ${!isNew?`<button class="btn btn-danger" id="delE">ลบ</button>`:''}
          <button class="btn btn-ghost" id="cancelE">ยกเลิก</button>
          <button class="btn btn-primary" id="saveE">บันทึก</button>
        </div>
      </div>`;
    wire();
  }

  function wire(){
    wrap.querySelector('#fClin').onchange=e=>{
      draft.clinicId=e.target.value;
      const c=byId(draft.clinicId);
      if(c && isNew){draft.dfPct=c.dfPct||40;draft.ssDeduct=!!c.ssDeduct;draft.xrayFee=!!c.xrayFee;draft.whtDeduct=!!c.whtDeduct;}
      paint();
    };
    wrap.querySelector('#fDF').oninput=e=>{draft.dfPct=e.target.value;paint();};
    wrap.querySelectorAll('[data-sh]').forEach(b=>b.onclick=()=>{draft.shift=b.dataset.sh;paint();});
    wrap.querySelectorAll('.cdesc').forEach(inp=>inp.oninput=e=>{draft.cases[+e.target.dataset.i].desc=e.target.value;});
    wrap.querySelectorAll('.camt').forEach(inp=>inp.oninput=e=>{draft.cases[+e.target.dataset.i].amount=e.target.value;refreshNet();});
    wrap.querySelectorAll('[data-rm]').forEach(b=>b.onclick=()=>{draft.cases.splice(+b.dataset.rm,1);paint();});
    wrap.querySelector('#addCase').onclick=()=>{draft.cases.push({id:uid(),desc:'',amount:''});paint();};
    wrap.querySelector('#fSS').onchange=e=>{draft.ssDeduct=e.target.checked;paint();};
    wrap.querySelector('#fWht').onchange=e=>{draft.whtDeduct=e.target.checked;paint();};
    const ssc=wrap.querySelector('#fSSCount');if(ssc) ssc.oninput=e=>{draft.ssCaseCount=e.target.value;refreshNet();};
    wrap.querySelector('#fLab').oninput=e=>{draft.labFeeTotal=e.target.value;refreshNet();};
    wrap.querySelector('#fNote').oninput=e=>{draft.note=e.target.value;};
    wrap.querySelector('#cancelE').onclick=()=>{S.entryEditor=null;renderModals();};
    wrap.querySelector('#saveE').onclick=save;
    const del=wrap.querySelector('#delE');if(del) del.onclick=del2;
  }

  function refreshNet(){
    const{gross,dfIncome,totalCases,ssCases,ss,labShare,labTot,wht,net,netAfterWht}=calc(draft);
    const nv=wrap.querySelector('.nv');if(nv) nv.textContent=`฿${fmt(net)}`;
    const fo=wrap.querySelector('.formula');if(fo) fo.innerHTML=formula();
    const ct=wrap.querySelector('.cases-total');
    if(ct) ct.innerHTML=`<span>รวม ${totalCases} เคส</span><span class="tv">฿${fmt(gross)}</span>`;
    const sc=wrap.querySelector('.ss-calc:not(.wht-calc)');
    if(sc) sc.innerHTML=`<span>${ssCases} เคส × ฿${SS_PER_CASE}</span><span class="sv">−฿${fmt(ss)}</span>`;
    const lc=wrap.querySelector('.lab-calc');
    if(lc) lc.innerHTML=`<span>หมอออก ${LAB_SPLIT_PCT}% (คลินิก ${100-LAB_SPLIT_PCT}%)</span><span class="lv">−฿${fmt(labShare)}</span>`;
    const wc=wrap.querySelector('.wht-calc');
    if(wc) wc.innerHTML=`<span>DF ฿${fmt(dfIncome)} × ${WHT_PCT}%</span><span class="sv">−฿${fmt(wht)}</span>`;
  }

  function save(){
    if(!draft.clinicId){alert('กรุณาเลือกคลินิก');return;}
    const clean={...draft,cases:draft.cases.map(c=>({...c,amount:Number(c.amount)||0})),dfPct:Number(draft.dfPct)||0,labFeeTotal:Number(draft.labFeeTotal)||0,ssCaseCount:Number(draft.ssCaseCount)||0};
    const list=entries[ctx.date]||[];
    const idx=list.findIndex(e=>e.id===clean.id);
    if(idx>=0) list[idx]=clean; else list.push(clean);
    const newEntries={...entries,[ctx.date]:list};
    saveE(newEntries);S.entryEditor=null;renderModals();renderContent();
  }
  function del2(){
    if(!confirm('ลบรายการนี้?')) return;
    const newEntries={...entries};
    newEntries[ctx.date]=(newEntries[ctx.date]||[]).filter(e=>e.id!==draft.id);
    if(!newEntries[ctx.date].length) delete newEntries[ctx.date];
    saveE(newEntries);S.entryEditor=null;renderModals();renderContent();
  }
  paint(); return wrap;
}

/* Clinic editor */
function buildClinicEditor(c){
  const wrap=document.createElement('div');
  wrap.className='overlay';
  wrap.onclick=ev=>{if(ev.target===wrap){S.clinicEditor=null;renderModals();}};
  let d={...c};const isNew=!d.id;
  function paint(){
    wrap.innerHTML=`
      <div class="modal">
        <div class="modal-h"><h2>${isNew?'เพิ่มคลินิก':'แก้ไขคลินิก'}</h2></div>
        <div class="field"><label>ชื่อคลินิก</label><input type="text" id="cN" value="${d.name}" placeholder="ชื่อคลินิก"/></div>
        <div class="field">
          <label>DF % ของคลินิกนี้ (ค่าตั้งต้น)</label>
          <div style="display:flex;align-items:center;gap:10px;">
            <input type="number" id="cDF" value="${d.dfPct||0}" min="0" max="100" style="width:90px;border:2px solid var(--blue);border-radius:9px;padding:8px 10px;font-family:'IBM Plex Mono',monospace;font-size:16px;font-weight:700;text-align:center;color:var(--blue);background:rgba(255,255,255,.05);"/>
            <span style="font-size:12px;color:var(--blue);opacity:.6;">% จาก Gross — ปรับได้ทีละรายการ</span>
          </div>
        </div>
        <div class="field">
          <label>สีประจำคลินิก</label>
          <div style="display:flex;gap:7px;flex-wrap:wrap;margin-top:2px;">
            ${PAL.map(p=>`<div data-col="${p}" style="width:32px;height:32px;border-radius:8px;background:${p};cursor:pointer;border:3px solid ${d.color===p?'var(--blue)':'transparent'};transition:.1s;"></div>`).join('')}
          </div>
        </div>
        <div class="ss-box" style="margin-bottom:10px;">
          <div class="ss-top">
            <div><div class="ss-label">หักปกส. เป็นค่าตั้งต้น</div><div class="ss-hint">฿${SS_PER_CASE} × เคส ปกส. — ปรับได้ทีละวัน</div></div>
            <label class="switch"><input type="checkbox" id="cSS"${d.ssDeduct?' checked':''}><span class="slider"></span></label>
          </div>
        </div>
        <div class="ss-box">
          <div class="ss-top">
            <div><div class="ss-label">ได้ค่าฟิล์มเอ็กซเรย์</div><div class="ss-hint">บันทึกเป็นข้อมูล ไม่นำไปคำนวณ</div></div>
            <label class="switch"><input type="checkbox" id="cXr"${d.xrayFee?' checked':''}><span class="slider"></span></label>
          </div>
        </div>
        <div class="ss-box">
          <div class="ss-top">
            <div><div class="ss-label">หัก ณ ที่จ่าย ${WHT_PCT}% (เงินได้ 40(2))</div><div class="ss-hint">คลินิกนี้หักภาษี ณ ที่จ่ายจาก DF Income หรือไม่ — ใช้สำหรับสรุปยื่นภาษี</div></div>
            <label class="switch"><input type="checkbox" id="cWht"${d.whtDeduct?' checked':''}><span class="slider"></span></label>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-ghost" id="cancelC">ยกเลิก</button>
          <button class="btn btn-primary" id="saveC">บันทึก</button>
        </div>
      </div>`;
    wrap.querySelectorAll('[data-col]').forEach(el=>el.onclick=()=>{d.color=el.dataset.col;paint();});
    wrap.querySelector('#cN').oninput=e=>d.name=e.target.value;
    wrap.querySelector('#cDF').oninput=e=>d.dfPct=Number(e.target.value)||0;
    wrap.querySelector('#cSS').onchange=e=>d.ssDeduct=e.target.checked;
    wrap.querySelector('#cXr').onchange=e=>d.xrayFee=e.target.checked;
    wrap.querySelector('#cWht').onchange=e=>d.whtDeduct=e.target.checked;
    wrap.querySelector('#cancelC').onclick=()=>{S.clinicEditor=null;renderModals();};
    wrap.querySelector('#saveC').onclick=()=>{
      if(!d.name.trim()){alert('กรุณาใส่ชื่อคลินิก');return;}
      const clean={...d,id:d.id||uid()};
      const idx=clinics.findIndex(c=>c.id===clean.id);
      let newList;
      if(idx>=0){ newList=[...clinics]; newList[idx]=clean; }
      else{ newList=[...clinics, clean]; }
      saveC(newList);S.clinicEditor=null;renderModals();renderContent();
    };
  }
  paint(); return wrap;
}
</script>
</body>
</html>
